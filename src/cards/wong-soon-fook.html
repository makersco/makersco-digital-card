<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<script>(function(){var b=document.createElement('base');b.href=location.origin+(location.hostname.indexOf('github.io')>-1?'/makersco-digital-card/':'/');document.head.appendChild(b);})();</script>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Wong Soon Fook — Owner & Founder of Makers Co | Digital Business Card"/>
<title>Wong Soon Fook — Makers Co</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A96E;
  --gold-light:#E8CFA8;
  --gold-dark:#A07840;
  --gold-border:rgba(201,169,110,.22);
  --dark:#070504;
  --surface:#15100A;
  --text:#F5E9D6;
  --text2:rgba(245,233,214,.62);
  --text3:rgba(245,233,214,.34);
}
html{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:var(--dark);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;height:55vh;
  background:radial-gradient(ellipse at 50% -10%,rgba(201,169,110,.07) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Card flip ── */
.card-wrap{
  width:360px;height:430px;
  perspective:1400px;
  position:relative;z-index:1;
  flex-shrink:0;
}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.22,.61,.36,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:20px;
  background:linear-gradient(160deg,#15100A 0%,#1C140B 45%,#241808 100%);
  border:1px solid var(--gold-border);
  box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 40px rgba(201,169,110,.05);
  overflow:hidden;
}
.card-face::before{
  content:'';position:absolute;top:0;right:0;width:60px;height:60px;
  border-top:1px solid var(--gold-border);border-right:1px solid var(--gold-border);
  border-radius:0 20px 0 0;pointer-events:none;
}
.card-face::after{
  content:'';position:absolute;bottom:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dark),var(--gold),var(--gold-dark),transparent);
  opacity:.5;pointer-events:none;
}

/* ── Front ── */
.card-front{display:flex;flex-direction:column;padding:30px 26px 26px;transition:box-shadow .2s}
.card-wrap:hover .card-front{box-shadow:0 30px 70px rgba(0,0,0,.75),0 0 50px rgba(201,169,110,.08)}
.flip-btn{
  position:absolute;top:18px;right:18px;z-index:2;
  width:32px;height:32px;border-radius:50%;
  background:rgba(201,169,110,.08);border:1px solid var(--gold-border);
  color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.flip-btn svg{width:15px;height:15px}
.card-mark{height:13px;width:auto;display:block;max-width:190px}
.front-center{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:6px}
.card-name{
  font-family:'Times New Roman',Times,serif;
  font-size:27px;font-weight:600;line-height:1.25;letter-spacing:.01em;
  white-space:nowrap;
  background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card-title{font-family:'Times New Roman',Times,serif;font-size:13px;color:var(--text2);margin-top:8px;font-weight:400;letter-spacing:.02em}
.gold-rule{width:30px;height:1px;background:var(--gold);margin:16px 0;opacity:.6}
.card-tagline{font-family:'Times New Roman',Times,serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--text3);font-weight:600}

/* ── Back ── */
.card-back{transform:rotateY(180deg);display:flex;flex-direction:column;padding:24px 22px 20px}
.back-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.back-mark{height:13px;width:auto;display:block;max-width:190px}
.back-actions{flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center}
.back-row{
  display:flex;align-items:center;gap:13px;
  width:100%;padding:13px 14px;border-radius:14px;
  background:rgba(255,255,255,.025);border:1px solid var(--gold-border);
  cursor:pointer;text-decoration:none;color:var(--text);
  transition:background .15s,transform .15s;
  font-family:'Times New Roman',Times,serif;
}
.back-row:hover{background:rgba(201,169,110,.07);transform:translateY(-1px)}
.back-row:active{transform:scale(.985)}
.back-icon{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.18);
  color:var(--gold);
}
.back-icon.wa{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.25);color:#25d366}
.back-icon svg{width:18px;height:18px}
.back-text{display:flex;flex-direction:column;gap:2px;text-align:left}
.back-label{font-size:14px;font-weight:500;letter-spacing:.015em}
.back-sub{font-size:11px;color:var(--text3);font-family:'Inter',sans-serif}
.back-footer{font-size:10.5px;color:var(--text3);text-align:center;font-style:italic;margin-top:6px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#1C140B;border:1px solid var(--gold-border);color:var(--text);
  padding:9px 22px;border-radius:24px;font-size:13px;font-weight:600;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{transform:translateX(-50%) translateY(0)}

.flip-caption{font-size:10.5px;color:var(--text3);text-align:center;letter-spacing:.05em;margin:16px 0 4px;position:relative;z-index:1}
.powered{width:360px;margin:18px auto 0;text-align:center;font-size:10px;color:var(--text3);letter-spacing:.06em;position:relative;z-index:1}
.powered span{color:var(--gold);opacity:.8}

@media(max-width:400px){.card-wrap,.powered{width:100%!important}}
</style>
</head>
<body>

<!-- Card -->
<div class="card-wrap" id="cardWrap">
  <div class="card-inner" id="cardInner">

    <!-- Front: identity. Tap the corner icon to flip to contact actions. -->
    <div class="card-face card-front" id="cardFront">
      <button class="flip-btn" onclick="flipCard()" aria-label="Flip card">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 9a8 8 0 0 1 14.3-3.5M20 15a8 8 0 0 1-14.3 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 2v4h-4M6 22v-4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <img class="card-mark" src="src/assets/makersco-wordmark-only.png" alt="Makers Co"/>
      <div class="front-center">
        <div class="card-name">Wong Soon Fook</div>
        <div class="card-title">Owner &amp; Founder of Makers Co</div>
        <div class="gold-rule"></div>
        <div class="card-tagline">We Build · You Grow</div>
      </div>
    </div>

    <!-- Back: the actionable rows -->
    <div class="card-face card-back" id="cardBack">
      <div class="back-header">
        <img class="back-mark" src="src/assets/makersco-wordmark-only.png" alt="Makers Co"/>
        <button class="flip-btn" style="position:static" onclick="flipCard()" aria-label="Flip card">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 9a8 8 0 0 1 14.3-3.5M20 15a8 8 0 0 1-14.3 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 2v4h-4M6 22v-4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="back-actions">
        <button class="back-row" onclick="saveContact()">
          <span class="back-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/></svg></span>
          <span class="back-text"><span class="back-label">Save to Contacts</span><span class="back-sub">Add Wong Soon Fook to your phone</span></span>
        </button>
        <button class="back-row" onclick="openWhatsApp()">
          <span class="back-icon wa"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.78 1.21h.01c5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg></span>
          <span class="back-text"><span class="back-label">WhatsApp / Call</span><span class="back-sub">+60 17-299 6254</span></span>
        </button>
        <a class="back-row" href="https://home.makers-co.org/" target="_blank" rel="noopener">
          <span class="back-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M3 12h18M12 3c2.5 2.6 3.8 6 3.8 9s-1.3 6.4-3.8 9c-2.5-2.6-3.8-6-3.8-9s1.3-6.4 3.8-9z" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <span class="back-text"><span class="back-label">Visit Website</span><span class="back-sub">home.makers-co.org</span></span>
        </a>
      </div>
      <div class="back-footer">Building digital tools for Malaysian SMEs</div>
    </div>

  </div>
</div>

<div class="flip-caption">Use the ⤾ icon to flip and connect</div>
<div class="powered">Powered by <span>Makers Co</span> · Digital Business Cards</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  name:    "Wong Soon Fook",
  title:   "Owner & Founder of Makers Co",
  company: "Makers Co",
  phone:   "+60172996254",
  phone_display: "+60 17-299 6254",
  website: "https://home.makers-co.org/",
  wa_message: "Hi Soon Fook, I found your digital card and would like to connect!"
};

// ── Flip ────────────────────────────────────────────────────────────────────
function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
}

// ── vCard (no email — cross-platform: opens native Contacts on iOS & Android) ──
function saveContact() {
  const vcf = [
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${CONFIG.name}`,
    `N:${CONFIG.name.split(' ')[0]};${CONFIG.name.split(' ').slice(1).join(' ')};;;`,
    `ORG:${CONFIG.company}`,
    `TITLE:${CONFIG.title}`,
    `TEL;TYPE=CELL:${CONFIG.phone}`,
    `URL:${CONFIG.website}`,
    'END:VCARD'
  ].join('\r\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([vcf], {type:'text/vcard'})),
    download: `${CONFIG.name.replace(/\s+/g,'-')}.vcf`
  });
  a.click();
  showToast('Contact saved! ✓');
}

function openWhatsApp() {
  window.open(`https://wa.me/${CONFIG.phone.replace(/\D/g,'')}?text=${encodeURIComponent(CONFIG.wa_message)}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
