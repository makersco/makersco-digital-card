<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e5e7eb;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            gap: 0;
        }

        .panel-left {
            background: #111827;
            padding: 32px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .panel-right {
            background: #0a0a0f;
            padding: 32px;
            overflow-y: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        input[type="tel"] {
            width: 100%;
            padding: 12px 16px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 200ms, opacity 200ms;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="url"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: var(--accent-color, #6366f1);
        }

        input[type="color"] {
            width: 100%;
            height: 44px;
            padding: 4px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            min-height: 44px;
            padding: 12px 24px;
            background: var(--accent-color, #6366f1);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: transform 200ms, opacity 200ms;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.08);
        }

        .preview-container {
            background: #ffffff;
            padding: 32px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .preview-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #fbbf24;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #10b981;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 200ms, opacity 200ms;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #qrCanvas {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .panel-left {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }

            .preview-container {
                padding: 20px;
                overflow-x: auto;
            }
        }

        @media (max-width: 380px) {
            .panel-left,
            .panel-right {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel-left">
            <h1>Email Signature Generator</h1>
            <p class="subtitle">Create a professional HTML email signature</p>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Jane Smith" value="Jane Smith">
            </div>

            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" id="title" placeholder="Senior Product Designer" value="Senior Product Designer">
            </div>

            <div class="form-group">
                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Acme Inc" value="Acme Inc">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="+1 (555) 123-4567" value="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="jane@acme.com" value="jane@acme.com">
            </div>

            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" placeholder="https://acme.com" value="https://acme.com">
            </div>

            <div class="form-group">
                <label for="linkedin">LinkedIn URL (optional)</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/janesmith">
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp Number (optional)</label>
                <input type="tel" id="whatsapp" placeholder="+1 555 123 4567">
            </div>

            <div class="form-group">
                <label for="cardUrl">Digital Card URL</label>
                <input type="url" id="cardUrl" placeholder="https://card.acme.com/jane" value="https://card.acme.com/jane">
            </div>

            <div class="form-group">
                <label for="accentColor">Accent Color</label>
                <input type="color" id="accentColor" value="#6366f1">
            </div>

            <div class="button-group">
                <button onclick="copySignature()">Copy HTML</button>
                <button class="secondary" onclick="updatePreview()">Refresh Preview</button>
            </div>

            <div style="margin-top: 24px;">
                <div class="warning">
                    ⚠️ Test your signature in Gmail, Outlook, and Apple Mail before using
                </div>
            </div>
        </div>

        <div class="panel-right">
            <div class="preview-title">Live Preview</div>
            <div class="preview-container" id="previewContainer">
                <!-- Preview will be injected here -->
            </div>
        </div>
    </div>

    <canvas id="qrCanvas"></canvas>
    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        let qrDataURL = '';

        function getInitial(name) {
            return name.trim().charAt(0).toUpperCase() || 'U';
        }

        function generateQR(text) {
            const canvas = document.getElementById('qrCanvas');
            QRCode.toCanvas(canvas, text, {
                width: 128,
                margin: 1,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) {
                    console.error(error);
                    qrDataURL = '';
                } else {
                    qrDataURL = canvas.toDataURL('image/png');
                    updatePreview();
                }
            });
        }

        function generateSignatureHTML() {
            const name = document.getElementById('name').value || 'Your Name';
            const title = document.getElementById('title').value || 'Your Title';
            const company = document.getElementById('company').value || 'Your Company';
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const website = document.getElementById('website').value;
            const linkedin = document.getElementById('linkedin').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const cardUrl = document.getElementById('cardUrl').value;
            const accentColor = document.getElementById('accentColor').value;
            
            const initial = getInitial(name);
            
            let contactLinks = [];
            if (phone) contactLinks.push(`<a href="tel:${phone}" style="color: #6b7280; text-decoration: none;">${phone}</a>`);
            if (email) contactLinks.push(`<a href="mailto:${email}" style="color: #6b7280; text-decoration: none;">${email}</a>`);
            if (website) {
                const displayWebsite = website.replace(/^https?:\/\//, '').replace(/\/$/, '');
                contactLinks.push(`<a href="${website}" style="color: #6b7280; text-decoration: none;">${displayWebsite}</a>`);
            }
            
            let socialLinks = [];
            if (linkedin) socialLinks.push(`<a href="${linkedin}" style="color: ${accentColor}; text-decoration: none; font-size: 12px;">LinkedIn</a>`);
            if (whatsapp) socialLinks.push(`<a href="https://wa.me/${whatsapp.replace(/\D/g, '')}" style="color: ${accentColor}; text-decoration: none; font-size: 12px;">WhatsApp</a>`);

            const html = `
<table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0; padding: 0;">
    <tr>
        <td style="padding: 0;">
            <table cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                <tr>
                    <td style="width: 40px; height: 40px; background-color: ${accentColor}; border-radius: 50%; text-align: center; vertical-align: middle; color: #ffffff; font-size: 18px; font-weight: 700; line-height: 40px;">
                        ${initial}
                    </td>
                    <td style="padding-left: 12px; vertical-align: middle;">
                        <div style="font-size: 16px; font-weight: 700; color: #111827; line-height: 1.3; margin: 0;">
                            ${name}
                        </div>
                        <div style="font-size: 13px; color: #4b5563; line-height: 1.4; margin: 2px 0 0 0;">
                            ${title}
                        </div>
                        <div style="font-size: 12px; color: #6b7280; line-height: 1.4; margin: 2px 0 0 0;">
                            ${company}
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="padding: 12px 0;">
            <div style="height: 1px; background-color: ${accentColor}; opacity: 0.3;"></div>
        </td>
    </tr>
    <tr>
        <td style="padding: 0 0 12px 0;">
            <div style="font-size: 13px; color: #6b7280; line-height: 1.6;">
                ${contactLinks.join(' <span style="color: #d1d5db;">·</span> ')}
            </div>
            ${socialLinks.length > 0 ? `<div style="font-size: 12px; margin-top: 6px;">${socialLinks.join(' <span style="color: #d1d5db;">·</span> ')}</div>` : ''}
        </td>
    </tr>
    ${qrDataURL && cardUrl ? `
    <tr>
        <td style="padding: 8px 0;">
            <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="padding-right: 12px; vertical-align: middle;">
                        <a href="${cardUrl}" style="display: block;">
                            <img src="${qrDataURL}" alt="QR Code" style="width: 64px; height: 64px; display: block; border: none;" />
                        </a>
                    </td>
                    <td style="vertical-align: middle;">
                        <a href="${cardUrl}" style="display: inline-block; padding: 8px 20px; background-color: ${accentColor}; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 700; line-height: 1.4;">
                            View Digital Card →
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    ` : ''}
</table>`.trim();

            return html;
        }

        function updatePreview() {
            const signatureHTML = generateSignatureHTML();
            document.getElementById('previewContainer').innerHTML = signatureHTML;
        }

        function copySignature() {
            const signatureHTML = generateSignatureHTML();
            
            navigator.clipboard.writeText(signatureHTML).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('Failed to copy to clipboard. Please try again.');
                console.error('Copy failed:', err);
            });
        }

        function updateAccentColor() {
            const color = document.getElementById('accentColor').value;
            document.documentElement.style.setProperty('--accent-color', color);
            updatePreview();
        }

        // Event listeners
        document.getElementById('name').addEventListener('input', updatePreview);
        document.getElementById('title').addEventListener('input', updatePreview);
        document.getElementById('company').addEventListener('input', updatePreview);
        document.getElementById('phone').addEventListener('input', updatePreview);
        document.getElementById('email').addEventListener('input', updatePreview);
        document.getElementById('website').addEventListener('input', updatePreview);
        document.getElementById('linkedin').addEventListener('input', updatePreview);
        document.getElementById('whatsapp').addEventListener('input', updatePreview);
        document.getElementById('cardUrl').addEventListener('input', function() {
            const url = this.value;
            if (url) {
                generateQR(url);
            } else {
                updatePreview();
            }
        });
        document.getElementById('accentColor').addEventListener('input', updateAccentColor);

        // Initialize
        updateAccentColor();
        const initialCardUrl = document.getElementById('cardUrl').value;
        if (initialCardUrl) {
            generateQR(initialCardUrl);
        } else {
            updatePreview();
        }
    </script>
</body>
</html>
