<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0f1a;
            color: #e5e7eb;
            font-weight: 400;
            line-height: 1.5;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            gap: 0;
        }

        .panel {
            padding: 32px;
        }

        .panel-left {
            background: #111827;
            border-right: 1px solid #1f2937;
            overflow-y: auto;
        }

        .panel-right {
            background: #f9fafb;
            color: #111827;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 48px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f9fafb;
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f9fafb;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 200ms, transform 200ms;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            transform: translateY(-1px);
        }

        input[type="color"] {
            width: 100%;
            height: 44px;
            padding: 4px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 200ms;
        }

        input[type="color"]:hover {
            transform: scale(1.02);
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 200ms, transform 200ms;
            margin-top: 8px;
            min-height: 44px;
            font-family: inherit;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #1f2937;
            border: 1px solid #374151;
        }

        .preview-container {
            background: #ffffff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            max-width: 600px;
            width: 100%;
        }

        .warning {
            background: #fef3c7;
            color: #92400e;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 24px;
            border-left: 4px solid #f59e0b;
            font-weight: 600;
            max-width: 600px;
            width: 100%;
        }

        .signature-table {
            width: 600px;
            max-width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            border-collapse: collapse;
        }

        .signature-initial {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        .signature-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin: 0;
            line-height: 1.3;
        }

        .signature-title {
            font-size: 13px;
            color: #6b7280;
            margin: 2px 0;
            line-height: 1.3;
        }

        .signature-company {
            font-size: 12px;
            color: #9ca3af;
            margin: 2px 0;
            line-height: 1.3;
        }

        .signature-divider {
            height: 1px;
            margin: 12px 0;
        }

        .signature-links {
            font-size: 12px;
            line-height: 1.6;
        }

        .signature-link {
            color: #6b7280;
            text-decoration: none;
            display: inline-block;
            margin-right: 12px;
        }

        .signature-link:hover {
            color: #111827;
        }

        .signature-cta {
            display: inline-block;
            padding: 8px 16px;
            background: #3b82f6;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 12px;
            transition: opacity 200ms;
        }

        .signature-cta:hover {
            opacity: 0.9;
        }

        #qrcode {
            width: 64px;
            height: 64px;
        }

        #qrcode canvas,
        #qrcode img {
            width: 64px !important;
            height: 64px !important;
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #10b981;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 200ms, transform 200ms;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .panel-left {
                border-right: none;
                border-bottom: 1px solid #1f2937;
            }

            .signature-table {
                width: 100%;
            }

            .preview-container {
                padding: 20px;
            }
        }

        @media (max-width: 380px) {
            .panel {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .color-preview {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 8px;
            border: 1px solid #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel panel-left">
            <h1>Email Signature Generator</h1>
            <p class="subtitle">Create a professional email signature with live preview</p>

            <div class="section-title">Personal Information</div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" value="John Doe">
            </div>

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" id="title" placeholder="Senior Product Designer" value="Senior Product Designer">
            </div>

            <div class="form-group">
                <label>Company</label>
                <input type="text" id="company" placeholder="Acme Inc." value="Acme Inc.">
            </div>

            <div class="section-title">Contact Details</div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="+1 (555) 123-4567" value="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="john@acme.com" value="john@acme.com">
            </div>

            <div class="form-group">
                <label>Website</label>
                <input type="url" id="website" placeholder="https://acme.com" value="https://acme.com">
            </div>

            <div class="section-title">Social & Card</div>

            <div class="form-group">
                <label>LinkedIn URL</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/johndoe" value="">
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="whatsapp" placeholder="+15551234567" value="">
            </div>

            <div class="form-group">
                <label>Digital Card URL</label>
                <input type="url" id="cardUrl" placeholder="https://yourcard.com/johndoe" value="https://yourcard.com/johndoe">
            </div>

            <div class="section-title">Branding</div>

            <div class="form-group">
                <label>Accent Color <span class="color-preview" id="colorPreview"></span></label>
                <input type="color" id="accentColor" value="#3b82f6">
            </div>

            <button class="btn" onclick="copySignature()">Copy Email Signature</button>
            <button class="btn btn-secondary" onclick="previewSignature()">Preview in New Tab</button>
        </div>

        <div class="panel panel-right">
            <div class="warning">
                Test in Gmail, Outlook, and Apple Mail before using
            </div>

            <div class="preview-container">
                <div id="signaturePreview"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        let qrCodeInstance = null;

        function getInitial() {
            const name = document.getElementById('name').value.trim();
            return name ? name.charAt(0).toUpperCase() : 'A';
        }

        function generateQRCode() {
            const cardUrl = document.getElementById('cardUrl').value.trim();
            const qrContainer = document.getElementById('qrcode');
            
            if (!qrContainer) return;
            
            qrContainer.innerHTML = '';
            
            if (!cardUrl) return;

            try {
                new QRCode(qrContainer, {
                    text: cardUrl,
                    width: 64,
                    height: 64,
                    colorDark: '#111827',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch (e) {
                console.error('QR Code generation failed:', e);
            }
        }

        function generateSignatureHTML() {
            const name = document.getElementById('name').value.trim() || 'Your Name';
            const title = document.getElementById('title').value.trim() || 'Your Title';
            const company = document.getElementById('company').value.trim() || 'Your Company';
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const website = document.getElementById('website').value.trim();
            const linkedin = document.getElementById('linkedin').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const cardUrl = document.getElementById('cardUrl').value.trim();
            const accentColor = document.getElementById('accentColor').value;
            const initial = getInitial();

            let contactLinks = '';
            if (phone) contactLinks += `<a href="tel:${phone}" class="signature-link" style="color: #6b7280; text-decoration: none; margin-right: 12px;">${phone}</a>`;
            if (email) contactLinks += `<a href="mailto:${email}" class="signature-link" style="color: #6b7280; text-decoration: none; margin-right: 12px;">${email}</a>`;
            if (website) contactLinks += `<a href="${website}" class="signature-link" style="color: #6b7280; text-decoration: none; margin-right: 12px;">${website.replace(/^https?:\/\//, '')}</a>`;

            let socialLinks = '';
            if (linkedin) socialLinks += `<a href="${linkedin}" class="signature-link" style="color: #6b7280; text-decoration: none; margin-right: 12px;">LinkedIn</a>`;
            if (whatsapp) socialLinks += `<a href="https://wa.me/${whatsapp.replace(/\D/g, '')}" class="signature-link" style="color: #6b7280; text-decoration: none; margin-right: 12px;">WhatsApp</a>`;

            const qrDataUrl = getQRCodeDataURL();

            return `
<table class="signature-table" style="width: 600px; max-width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; border-collapse: collapse;">
    <tr>
        <td style="padding-right: 16px; vertical-align: top;">
            <div style="width: 40px; height: 40px; border-radius: 50%; background: ${accentColor}; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #ffffff; text-align: center; line-height: 40px;">
                ${initial}
            </div>
        </td>
        <td style="vertical-align: top;">
            <p style="font-size: 16px; font-weight: 700; color: #111827; margin: 0; line-height: 1.3;">${name}</p>
            <p style="font-size: 13px; color: #6b7280; margin: 2px 0; line-height: 1.3;">${title}</p>
            <p style="font-size: 12px; color: #9ca3af; margin: 2px 0; line-height: 1.3;">${company}</p>
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <div style="height: 1px; background: ${accentColor}; margin: 12px 0;"></div>
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <div style="font-size: 12px; line-height: 1.6;">
                ${contactLinks}
                ${socialLinks ? '<br>' + socialLinks : ''}
            </div>
        </td>
    </tr>
    ${cardUrl ? `
    <tr>
        <td colspan="2" style="padding-top: 12px;">
            <table style="border-collapse: collapse;">
                <tr>
                    ${qrDataUrl ? `<td style="padding-right: 12px; vertical-align: middle;"><img src="${qrDataUrl}" alt="QR Code" style="width: 64px; height: 64px; display: block; border: 1px solid #e5e7eb; border-radius: 4px;"></td>` : ''}
                    <td style="vertical-align: middle;">
                        <a href="${cardUrl}" style="display: inline-block; padding: 8px 16px; background: ${accentColor}; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 700;">View Digital Card →</a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    ` : ''}
</table>`;
        }

        function getQRCodeDataURL() {
            const qrContainer = document.getElementById('qrcode');
            if (!qrContainer) return '';
            
            const canvas = qrContainer.querySelector('canvas');
            if (!canvas) return '';
            
            try {
                return canvas.toDataURL('image/png');
            } catch (e) {
                console.error('Failed to get QR code data URL:', e);
                return '';
            }
        }

        function updatePreview() {
            const signatureHTML = generateSignatureHTML();
            document.getElementById('signaturePreview').innerHTML = signatureHTML;
            
            setTimeout(() => {
                generateQRCode();
                setTimeout(updatePreview, 100);
            }, 0);
        }

        function updateColorPreview() {
            const color = document.getElementById('accentColor').value;
            document.getElementById('colorPreview').style.backgroundColor = color;
        }

        function copySignature() {
            const signatureHTML = generateSignatureHTML();
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = signatureHTML;
            document.body.appendChild(tempDiv);
            
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard!');
            } catch (err) {
                navigator.clipboard.writeText(signatureHTML).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(() => {
                    showToast('Failed to copy');
                });
            }
            
            selection.removeAllRanges();
            document.body.removeChild(tempDiv);
        }

        function previewSignature() {
            const signatureHTML = generateSignatureHTML();
            const previewWindow = window.open('', '_blank');
            previewWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Email Signature Preview</title>
                    <style>
                        body {
                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                            padding: 40px;
                            background: #f9fafb;
                        }
                    </style>
                </head>
                <body>
                    ${signatureHTML}
                </body>
                </html>
            `);
            previewWindow.document.close();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.getElementById('name').addEventListener('input', updatePreview);
        document.getElementById('title').addEventListener('input', updatePreview);
        document.getElementById('company').addEventListener('input', updatePreview);
        document.getElementById('phone').addEventListener('input', updatePreview);
        document.getElementById('email').addEventListener('input', updatePreview);
        document.getElementById('website').addEventListener('input', updatePreview);
        document.getElementById('linkedin').addEventListener('input', updatePreview);
        document.getElementById('whatsapp').addEventListener('input', updatePreview);
        document.getElementById('cardUrl').addEventListener('input', () => {
            generateQRCode();
            setTimeout(updatePreview, 100);
        });
        document.getElementById('accentColor').addEventListener('input', () => {
            updateColorPreview();
            updatePreview();
        });

        window.addEventListener('DOMContentLoaded', () => {
            updateColorPreview();
            updatePreview();
        });
    </script>
</body>
</html>
