<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Background Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            font-weight: 400;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: 360px 1fr;
                gap: 32px;
            }
        }

        .panel {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        input[type="text"],
        input[type="color"] {
            width: 100%;
            padding: 12px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 400;
            transition: border-color 200ms;
        }

        input[type="text"]:focus,
        input[type="color"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        input[type="color"] {
            height: 48px;
            cursor: pointer;
            padding: 4px;
        }

        .layout-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms;
            min-height: 44px;
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .toggle-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            background: #0b0f1a;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #preview {
            width: 100%;
            max-width: 960px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 200ms;
            min-height: 44px;
        }

        .download-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .resolution-note {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-weight: 400;
        }

        @media (max-width: 380px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 24px;
            }

            .panel {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Virtual Background Generator</h1>
            <p class="subtitle">Create custom backgrounds for Zoom, Google Meet, and Microsoft Teams</p>
        </header>

        <div class="main-grid">
            <div class="panel">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your Name" value="Wong Soon Fook">
                </div>

                <div class="form-group">
                    <label for="title">Job Title</label>
                    <input type="text" id="title" placeholder="Your Title" value="Co-Founder & CEO">
                </div>

                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" placeholder="Company Name" value="MakersCo">
                </div>

                <div class="form-group">
                    <label for="cardUrl">Card URL</label>
                    <input type="text" id="cardUrl" placeholder="https://..." value="https://card.makersco.my/wong-soonfook">
                </div>

                <div class="form-group">
                    <label for="accentColor">Accent Color</label>
                    <input type="color" id="accentColor" value="#3b82f6">
                </div>

                <div class="form-group">
                    <label>Layout</label>
                    <div class="layout-toggle">
                        <button class="toggle-btn" data-layout="left">QR Left</button>
                        <button class="toggle-btn active" data-layout="right">QR Right</button>
                    </div>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="preview" width="1920" height="1080"></canvas>
                <button class="download-btn" id="downloadBtn">Download Background (PNG)</button>
                <p class="resolution-note">Optimised for Zoom, Google Meet, and Microsoft Teams</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('name');
        const titleInput = document.getElementById('title');
        const companyInput = document.getElementById('company');
        const cardUrlInput = document.getElementById('cardUrl');
        const accentColorInput = document.getElementById('accentColor');
        const downloadBtn = document.getElementById('downloadBtn');
        const layoutBtns = document.querySelectorAll('.toggle-btn');

        let currentLayout = 'right';
        let qrCodeDataUrl = '';

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('name')) nameInput.value = urlParams.get('name');
        if (urlParams.get('title')) titleInput.value = urlParams.get('title');
        if (urlParams.get('company')) companyInput.value = urlParams.get('company');
        if (urlParams.get('cardUrl')) cardUrlInput.value = urlParams.get('cardUrl');
        if (urlParams.get('accentColor')) accentColorInput.value = urlParams.get('accentColor');
        if (urlParams.get('layout')) {
            currentLayout = urlParams.get('layout');
            layoutBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.layout === currentLayout);
            });
        }

        // Layout toggle
        layoutBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentLayout = btn.dataset.layout;
                layoutBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                generateBackground();
            });
        });

        // Generate QR code
        async function generateQRCode(url) {
            return new Promise((resolve) => {
                QRCode.toDataURL(url, {
                    width: 300,
                    margin: 1,
                    color: {
                        dark: '#ffffff',
                        light: '#00000000'
                    }
                }, (err, dataUrl) => {
                    if (err) {
                        console.error(err);
                        resolve('');
                    } else {
                        resolve(dataUrl);
                    }
                });
            });
        }

        // Hex to RGB with alpha
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Darken color
        function darkenColor(hex, amount) {
            const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
            const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
            const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // Generate background
        async function generateBackground() {
            const name = nameInput.value || 'Your Name';
            const title = titleInput.value || 'Your Title';
            const company = companyInput.value || 'Company';
            const cardUrl = cardUrlInput.value || 'https://card.makersco.my';
            const accentColor = accentColorInput.value;

            // Generate QR code if URL changed
            if (cardUrl) {
                qrCodeDataUrl = await generateQRCode(cardUrl);
            }

            // Clear canvas
            ctx.clearRect(0, 0, 1920, 1080);

            const leftWidth = currentLayout === 'right' ? 1248 : 672;
            const rightWidth = 1920 - leftWidth;
            const rightX = currentLayout === 'right' ? leftWidth : 0;
            const leftX = currentLayout === 'right' ? 0 : rightWidth;

            // Right panel (lighter)
            const lighterColor = darkenColor(accentColor, -15);
            ctx.fillStyle = hexToRgba(lighterColor, 0.15);
            ctx.fillRect(rightX, 0, rightWidth, 1080);

            // Left panel (darker accent)
            const darkerColor = darkenColor(accentColor, 30);
            ctx.fillStyle = hexToRgba(darkerColor, 0.25);
            ctx.fillRect(leftX, 0, leftWidth, 1080);

            // Draw on left panel
            const textX = leftX + 80;
            const centerY = 540;

            // Name
            ctx.fillStyle = '#ffffff';
            ctx.font = '800 80px Outfit, sans-serif';
            ctx.fillText(name, textX, centerY - 60);

            // Title + Company
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.font = '400 40px Outfit, sans-serif';
            ctx.fillText(`${title} • ${company}`, textX, centerY + 20);

            // Accent line
            ctx.fillStyle = accentColor;
            ctx.fillRect(textX, centerY + 60, 400, 3);

            // Watermark
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '400 20px Outfit, sans-serif';
            ctx.fillText('makersco.my', textX, 1020);

            // Draw on right panel
            const qrCenterX = rightX + (rightWidth / 2);

            // "Scan to Connect" label
            ctx.fillStyle = '#ffffff';
            ctx.font = '600 24px Outfit, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Scan to Connect', qrCenterX, 320);

            // QR Code
            if (qrCodeDataUrl) {
                const qrImg = new Image();
                qrImg.onload = () => {
                    ctx.drawImage(qrImg, qrCenterX - 150, 360, 300, 300);
                    
                    // Card URL below QR
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '400 16px Outfit, sans-serif';
                    ctx.fillText(cardUrl, qrCenterX, 700);
                    
                    ctx.textAlign = 'left';
                };
                qrImg.src = qrCodeDataUrl;
            } else {
                ctx.textAlign = 'left';
            }
        }

        // Download handler
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'virtual-background.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Input listeners
        nameInput.addEventListener('input', generateBackground);
        titleInput.addEventListener('input', generateBackground);
        companyInput.addEventListener('input', generateBackground);
        cardUrlInput.addEventListener('input', generateBackground);
        accentColorInput.addEventListener('input', generateBackground);

        // Initial generation
        generateBackground();
    </script>
</body>
</html>
