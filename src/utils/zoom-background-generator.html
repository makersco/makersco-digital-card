<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Background Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
        }

        .panel {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, background 0.2s;
            min-height: 44px;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: #0b0f1a;
        }

        input[type="color"] {
            width: 100%;
            height: 48px;
            padding: 4px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            min-height: 44px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .layout-toggle {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px 20px;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .preview-panel {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #preview {
            width: 100%;
            max-width: 960px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .download-btn {
            width: 100%;
            max-width: 400px;
            padding: 16px 32px;
            background: #ffffff;
            border: none;
            border-radius: 8px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            min-height: 48px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .resolution-note {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        #qrcode {
            display: none;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 380px 1fr;
            }

            h1 {
                font-size: 40px;
            }
        }

        @media (max-width: 380px) {
            .panel {
                padding: 16px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>Virtual Background Generator</h1>
            <p class="subtitle">Create professional backgrounds for Zoom and Google Meet</p>

            <div class="panel">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="John Smith">
                </div>

                <div class="form-group">
                    <label for="title">Job Title</label>
                    <input type="text" id="title" placeholder="Senior Product Designer">
                </div>

                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" placeholder="Acme Inc.">
                </div>

                <div class="form-group">
                    <label for="accent">Accent Color</label>
                    <input type="color" id="accent" value="#4a5568">
                </div>

                <div class="form-group">
                    <label for="cardUrl">Card URL</label>
                    <input type="url" id="cardUrl" placeholder="https://makersco.my/yourcard">
                </div>

                <div class="form-group">
                    <label>QR Code Position</label>
                    <div class="layout-toggle">
                        <button class="toggle-btn" data-layout="left">Left</button>
                        <button class="toggle-btn active" data-layout="right">Right</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <canvas id="preview" width="1920" height="1080"></canvas>
            <button class="download-btn" onclick="downloadBackground()">Download Background (PNG)</button>
            <p class="resolution-note">Optimised for Zoom, Google Meet, and Microsoft Teams</p>
        </div>
    </div>

    <div id="qrcode"></div>

    <script>
        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        let qrDataUrl = null;
        let currentLayout = 'right';

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('name')) document.getElementById('name').value = urlParams.get('name');
        if (urlParams.get('title')) document.getElementById('title').value = urlParams.get('title');
        if (urlParams.get('company')) document.getElementById('company').value = urlParams.get('company');
        if (urlParams.get('url')) document.getElementById('cardUrl').value = urlParams.get('url');
        if (urlParams.get('accent')) document.getElementById('accent').value = urlParams.get('accent');

        // Layout toggle
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLayout = this.dataset.layout;
                generateBackground();
            });
        });

        // Input listeners
        ['name', 'title', 'company', 'accent', 'cardUrl'].forEach(id => {
            document.getElementById(id).addEventListener('input', generateBackground);
        });

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 74, g: 85, b: 104 };
        }

        function darken(hex, amount = 0.3) {
            const rgb = hexToRgb(hex);
            return `rgb(${Math.round(rgb.r * amount)}, ${Math.round(rgb.g * amount)}, ${Math.round(rgb.b * amount)})`;
        }

        function lighten(hex, amount = 1.2) {
            const rgb = hexToRgb(hex);
            return `rgb(${Math.min(255, Math.round(rgb.r * amount))}, ${Math.min(255, Math.round(rgb.g * amount))}, ${Math.min(255, Math.round(rgb.b * amount))})`;
        }

        async function generateQRCode(url) {
            return new Promise((resolve) => {
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                if (!url) {
                    resolve(null);
                    return;
                }

                try {
                    new QRCode(qrContainer, {
                        text: url,
                        width: 300,
                        height: 300,
                        colorDark: '#ffffff',
                        colorLight: 'transparent',
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    setTimeout(() => {
                        const qrImg = qrContainer.querySelector('img');
                        if (qrImg) {
                            qrImg.onload = () => resolve(qrImg);
                            if (qrImg.complete) resolve(qrImg);
                        } else {
                            resolve(null);
                        }
                    }, 100);
                } catch (e) {
                    resolve(null);
                }
            });
        }

        async function generateBackground() {
            const name = document.getElementById('name').value || 'Your Name';
            const title = document.getElementById('title').value || 'Your Title';
            const company = document.getElementById('company').value || 'Your Company';
            const accent = document.getElementById('accent').value;
            const cardUrl = document.getElementById('cardUrl').value;

            // Generate QR code
            if (cardUrl) {
                qrDataUrl = await generateQRCode(cardUrl);
            } else {
                qrDataUrl = null;
            }

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const leftWidth = currentLayout === 'right' ? canvas.width * 0.65 : canvas.width * 0.35;
            const rightWidth = canvas.width - leftWidth;

            if (currentLayout === 'right') {
                // Left panel - dark accent
                ctx.fillStyle = darken(accent);
                ctx.fillRect(0, 0, leftWidth, canvas.height);

                // Name
                ctx.fillStyle = '#ffffff';
                ctx.font = '800 80px "DM Sans", sans-serif';
                ctx.fillText(name, 80, 400);

                // Title + Company
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.font = '400 40px "DM Sans", sans-serif';
                ctx.fillText(`${title} at ${company}`, 80, 470);

                // Accent line
                ctx.fillStyle = accent;
                ctx.fillRect(80, 520, 400, 3);

                // Watermark
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '400 20px "DM Sans", sans-serif';
                ctx.fillText('makersco.my', 80, canvas.height - 60);

                // Right panel - lighter
                ctx.fillStyle = lighten(accent, 0.2);
                ctx.fillRect(leftWidth, 0, rightWidth, canvas.height);

                // QR section
                if (qrDataUrl) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '600 24px "DM Sans", sans-serif';
                    const qrX = leftWidth + (rightWidth / 2);
                    ctx.textAlign = 'center';
                    ctx.fillText('Scan to Connect', qrX, 300);

                    // Draw QR code
                    ctx.drawImage(qrDataUrl, qrX - 150, 340, 300, 300);

                    // Card URL
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '400 16px "DM Sans", sans-serif';
                    const displayUrl = cardUrl.replace(/^https?:\/\//, '');
                    ctx.fillText(displayUrl, qrX, 680);
                }
            } else {
                // QR on left
                ctx.fillStyle = lighten(accent, 0.2);
                ctx.fillRect(0, 0, leftWidth, canvas.height);

                // QR section
                if (qrDataUrl) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '600 24px "DM Sans", sans-serif';
                    const qrX = leftWidth / 2;
                    ctx.textAlign = 'center';
                    ctx.fillText('Scan to Connect', qrX, 300);

                    // Draw QR code
                    ctx.drawImage(qrDataUrl, qrX - 150, 340, 300, 300);

                    // Card URL
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '400 16px "DM Sans", sans-serif';
                    const displayUrl = cardUrl.replace(/^https?:\/\//, '');
                    ctx.fillText(displayUrl, qrX, 680);
                }

                // Right panel - dark accent
                ctx.fillStyle = darken(accent);
                ctx.fillRect(leftWidth, 0, rightWidth, canvas.height);

                // Name
                ctx.textAlign = 'left';
                ctx.fillStyle = '#ffffff';
                ctx.font = '800 80px "DM Sans", sans-serif';
                ctx.fillText(name, leftWidth + 80, 400);

                // Title + Company
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.font = '400 40px "DM Sans", sans-serif';
                ctx.fillText(`${title} at ${company}`, leftWidth + 80, 470);

                // Accent line
                ctx.fillStyle = accent;
                ctx.fillRect(leftWidth + 80, 520, 400, 3);

                // Watermark
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '400 20px "DM Sans", sans-serif';
                ctx.fillText('makersco.my', leftWidth + 80, canvas.height - 60);
            }

            ctx.textAlign = 'left';
        }

        function downloadBackground() {
            const link = document.createElement('a');
            link.download = 'virtual-background.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Initial render
        generateBackground();
    </script>
</body>
</html>
