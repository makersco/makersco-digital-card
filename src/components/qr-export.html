<div class="qr-export-component">
  <div class="qr-controls">
    <div class="color-picker">
      <label for="qr-fg-color">Foreground Color:</label>
      <input type="text" id="qr-fg-color" value="#000000" maxlength="7" placeholder="#000000">
    </div>
    <div class="color-picker">
      <label for="qr-bg-color">Background Color:</label>
      <input type="text" id="qr-bg-color" value="#ffffff" maxlength="7" placeholder="#ffffff">
    </div>
  </div>
  
  <div class="qr-preview">
    <canvas id="qr-preview-canvas"></canvas>
  </div>
  
  <div class="qr-actions">
    <button id="download-png-btn" class="btn-download">Download PNG</button>
    <button id="download-svg-btn" class="btn-download">Download SVG</button>
  </div>
</div>

<style>
  .qr-export-component {
    max-width: 500px;
    margin: 20px auto;
    padding: 24px;
    background: #f9fafb;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  
  .qr-controls {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  
  .color-picker {
    flex: 1;
    min-width: 200px;
  }
  
  .color-picker label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #374151;
  }
  
  .color-picker input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
  }
  
  .qr-preview {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: white;
    border-radius: 8px;
    margin-bottom: 20px;
    min-height: 280px;
  }
  
  #qr-preview-canvas {
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
  }
  
  .qr-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  
  .btn-download {
    padding: 12px 24px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .btn-download:hover {
    background: #1d4ed8;
  }
  
  .btn-download:active {
    background: #1e40af;
  }
</style>

<script>
(function() {
  const fgInput = document.getElementById('qr-fg-color');
  const bgInput = document.getElementById('qr-bg-color');
  const previewCanvas = document.getElementById('qr-preview-canvas');
  const pngBtn = document.getElementById('download-png-btn');
  const svgBtn = document.getElementById('download-svg-btn');
  
  const qrData = window.location.href;
  
  function isValidHex(hex) {
    return /^#[0-9A-F]{6}$/i.test(hex);
  }
  
  function updatePreview() {
    const fgColor = isValidHex(fgInput.value) ? fgInput.value : '#000000';
    const bgColor = isValidHex(bgInput.value) ? bgInput.value : '#ffffff';
    
    const qr = new QRCode({
      content: qrData,
      width: 256,
      height: 256,
      color: fgColor,
      background: bgColor,
      ecl: 'M'
    });
    
    const svg = qr.svg();
    const img = new Image();
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    
    img.onload = function() {
      previewCanvas.width = 256;
      previewCanvas.height = 256;
      const ctx = previewCanvas.getContext('2d');
      ctx.clearRect(0, 0, 256, 256);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
    };
    
    img.src = url;
  }
  
  function downloadPNG() {
    const fgColor = isValidHex(fgInput.value) ? fgInput.value : '#000000';
    const bgColor = isValidHex(bgInput.value) ? bgInput.value : '#ffffff';
    
    const qr = new QRCode({
      content: qrData,
      width: 1024,
      height: 1024,
      color: fgColor,
      background: bgColor,
      ecl: 'M'
    });
    
    const svg = qr.svg();
    const img = new Image();
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      
      canvas.toBlob(function(blob) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qr-card.png';
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    };
    
    img.src = url;
  }
  
  function downloadSVG() {
    const fgColor = isValidHex(fgInput.value) ? fgInput.value : '#000000';
    const bgColor = isValidHex(bgInput.value) ? bgInput.value : '#ffffff';
    
    const qr = new QRCode({
      content: qrData,
      width: 1024,
      height: 1024,
      color: fgColor,
      background: bgColor,
      ecl: 'M'
    });
    
    const svgString = qr.svg();
    const blob = new Blob([svgString], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'qr-card.svg';
    a.click();
    URL.revokeObjectURL(a.href);
  }
  
  fgInput.addEventListener('input', updatePreview);
  bgInput.addEventListener('input', updatePreview);
  pngBtn.addEventListener('click', downloadPNG);
  svgBtn.addEventListener('click', downloadSVG);
  
  updatePreview();
})();
</script>
