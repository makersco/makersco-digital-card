<div class="qr-export-component">
  <div class="qr-controls">
    <div class="control-group">
      <label for="qr-fg-color">Foreground Color</label>
      <input type="color" id="qr-fg-color" value="#000000">
      <input type="text" id="qr-fg-hex" value="#000000" maxlength="7" placeholder="#000000">
    </div>
    
    <div class="control-group">
      <label for="qr-bg-color">Background Color</label>
      <input type="color" id="qr-bg-color" value="#ffffff">
      <input type="text" id="qr-bg-hex" value="#ffffff" maxlength="7" placeholder="#ffffff">
    </div>
  </div>
  
  <div class="qr-preview">
    <div id="qr-preview-container"></div>
  </div>
  
  <div class="qr-actions">
    <button id="download-png-btn" class="btn-primary">Download PNG (1024×1024)</button>
    <button id="download-svg-btn" class="btn-secondary">Download SVG</button>
  </div>
</div>

<style>
.qr-export-component {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px;
  background: #f9fafb;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.qr-controls {
  display: flex;
  gap: 20px;
  margin-bottom: 24px;
}

.control-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.control-group label {
  font-size: 14px;
  font-weight: 600;
  color: #374151;
}

.control-group input[type="color"] {
  width: 60px;
  height: 40px;
  border: 2px solid #d1d5db;
  border-radius: 6px;
  cursor: pointer;
}

.control-group input[type="text"] {
  padding: 8px 12px;
  border: 2px solid #d1d5db;
  border-radius: 6px;
  font-family: 'Monaco', 'Courier New', monospace;
  font-size: 14px;
  text-transform: uppercase;
}

.qr-preview {
  background: white;
  padding: 24px;
  border-radius: 8px;
  margin-bottom: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 280px;
}

#qr-preview-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

#qr-preview-container canvas,
#qr-preview-container svg {
  max-width: 100%;
  height: auto;
  border-radius: 4px;
}

.qr-actions {
  display: flex;
  gap: 12px;
}

.qr-actions button {
  flex: 1;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: #3b82f6;
  color: white;
}

.btn-primary:hover {
  background: #2563eb;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-secondary {
  background: #10b981;
  color: white;
}

.btn-secondary:hover {
  background: #059669;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.btn-primary:active,
.btn-secondary:active {
  transform: translateY(0);
}
</style>

<script>
(function() {
  const fgColorPicker = document.getElementById('qr-fg-color');
  const bgColorPicker = document.getElementById('qr-bg-color');
  const fgHexInput = document.getElementById('qr-fg-hex');
  const bgHexInput = document.getElementById('qr-bg-hex');
  const previewContainer = document.getElementById('qr-preview-container');
  const downloadPngBtn = document.getElementById('download-png-btn');
  const downloadSvgBtn = document.getElementById('download-svg-btn');
  
  let currentFgColor = '#000000';
  let currentBgColor = '#ffffff';
  let qrData = window.location.href; // Default QR data
  
  // Sync color picker with hex input
  fgColorPicker.addEventListener('input', (e) => {
    currentFgColor = e.target.value;
    fgHexInput.value = currentFgColor;
    updatePreview();
  });
  
  bgColorPicker.addEventListener('input', (e) => {
    currentBgColor = e.target.value;
    bgHexInput.value = currentBgColor;
    updatePreview();
  });
  
  fgHexInput.addEventListener('input', (e) => {
    const hex = e.target.value;
    if (/^#[0-9A-F]{6}$/i.test(hex)) {
      currentFgColor = hex;
      fgColorPicker.value = hex;
      updatePreview();
    }
  });
  
  bgHexInput.addEventListener('input', (e) => {
    const hex = e.target.value;
    if (/^#[0-9A-F]{6}$/i.test(hex)) {
      currentBgColor = hex;
      bgColorPicker.value = hex;
      updatePreview();
    }
  });
  
  function updatePreview() {
    previewContainer.innerHTML = '';
    const qr = new QRCode(previewContainer, {
      text: qrData,
      width: 256,
      height: 256,
      colorDark: currentFgColor,
      colorLight: currentBgColor,
      correctLevel: QRCode.CorrectLevel.H
    });
  }
  
  function generateHighResPNG() {
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    document.body.appendChild(tempDiv);
    
    const qr = new QRCode(tempDiv, {
      text: qrData,
      width: 1024,
      height: 1024,
      colorDark: currentFgColor,
      colorLight: currentBgColor,
      correctLevel: QRCode.CorrectLevel.H
    });
    
    setTimeout(() => {
      const canvas = tempDiv.querySelector('canvas');
      if (canvas) {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'qr-card.png';
          a.click();
          URL.revokeObjectURL(url);
          document.body.removeChild(tempDiv);
        }, 'image/png');
      }
    }, 100);
  }
  
  function generateSVG() {
    const size = 1024;
    const qr = qrcode(0, 'H');
    qr.addData(qrData);
    qr.make();
    
    const moduleCount = qr.getModuleCount();
    const cellSize = size / moduleCount;
    
    let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
    svgContent += `<rect width="${size}" height="${size}" fill="${currentBgColor}"/>`;
    
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          const x = col * cellSize;
          const y = row * cellSize;
          svgContent += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="${currentFgColor}"/>`;
        }
      }
    }
    
    svgContent += '</svg>';
    
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qr-card.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
  
  downloadPngBtn.addEventListener('click', generateHighResPNG);
  downloadSvgBtn.addEventListener('click', generateSVG);
  
  // Initialize preview
  updatePreview();
})();
</script>
