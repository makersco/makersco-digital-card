<script>
(function() {
    const qrContainer = document.getElementById('qr-preview-container');
    const fgColorInput = document.getElementById('qr-fg-color');
    const bgColorInput = document.getElementById('qr-bg-color');
    const fgColorPicker = document.getElementById('qr-fg-picker');
    const bgColorPicker = document.getElementById('qr-bg-picker');
    const highResCheckbox = document.getElementById('qr-highres');
    const downloadPngBtn = document.getElementById('qr-download-png');
    const downloadSvgBtn = document.getElementById('qr-download-svg');
    
    let qrInstance = null;
    const defaultData = window.location.href;
    
    function updateQRCode() {
        qrContainer.innerHTML = '';
        
        const fgColor = fgColorInput.value;
        const bgColor = bgColorInput.value;
        const size = highResCheckbox.checked ? 1024 : 256;
        
        qrInstance = new QRCode(qrContainer, {
            text: defaultData,
            width: size,
            height: size,
            colorDark: fgColor,
            colorLight: bgColor,
            correctLevel: QRCode.CorrectLevel.H
        });
    }
    
    function syncColorInputs(textInput, pickerInput) {
        const color = textInput.value.trim();
        if (/^#[0-9A-Fa-f]{6}$/.test(color)) {
            pickerInput.value = color;
            updateQRCode();
        }
    }
    
    fgColorInput.addEventListener('input', () => syncColorInputs(fgColorInput, fgColorPicker));
    bgColorInput.addEventListener('input', () => syncColorInputs(bgColorInput, bgColorPicker));
    
    fgColorPicker.addEventListener('input', () => {
        fgColorInput.value = fgColorPicker.value;
        updateQRCode();
    });
    
    bgColorPicker.addEventListener('input', () => {
        bgColorInput.value = bgColorPicker.value;
        updateQRCode();
    });
    
    highResCheckbox.addEventListener('change', updateQRCode);
    
    downloadPngBtn.addEventListener('click', () => {
        const canvas = qrContainer.querySelector('canvas');
        if (!canvas) return;
        
        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'qr-card.png';
            link.click();
            URL.revokeObjectURL(url);
        }, 'image/png');
    });
    
    downloadSvgBtn.addEventListener('click', () => {
        const canvas = qrContainer.querySelector('canvas');
        if (!canvas) return;
        
        const size = canvas.width;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, size, size);
        const data = imageData.data;
        
        const fgColor = fgColorInput.value;
        const bgColor = bgColorInput.value;
        
        let svgRects = '';
        const moduleSize = 1;
        const modules = size;
        
        for (let y = 0; y < modules; y++) {
            for (let x = 0; x < modules; x++) {
                const idx = (y * modules + x) * 4;
                const r = data[idx];
                const g = data[idx + 1];
                const b = data[idx + 2];
                
                const isDark = (r + g + b) / 3 < 128;
                
                if (isDark) {
                    svgRects += `<rect x="${x}" y="${y}" width="${moduleSize}" height="${moduleSize}"/>`;
                }
            }
        }
        
        const svgContent = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${modules} ${modules}" width="${modules}" height="${modules}">
<rect width="${modules}" height="${modules}" fill="${bgColor}"/>
<g fill="${fgColor}">
${svgRects}
</g>
</svg>`;
        
        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'qr-card.svg';
        link.click();
        URL.revokeObjectURL(url);
    });
    
    updateQRCode();
})();
</script>
