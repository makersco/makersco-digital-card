<style>
.share-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  z-index: 9998;
  opacity: 0;
  transition: opacity 280ms ease-out;
}

.share-backdrop.active {
  opacity: 1;
}

.share-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111827;
  border-radius: 20px 20px 0 0;
  z-index: 9999;
  padding: 24px 20px 32px;
  transform: translateY(100%);
  transition: transform 280ms ease-out;
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
}

.share-panel.active {
  transform: translateY(0);
}

.share-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.share-panel-title {
  font-size: 18px;
  font-weight: 700;
  color: #f9fafb;
  margin: 0;
}

.share-close-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  color: #d1d5db;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 200ms ease-out;
}

.share-close-btn:hover {
  opacity: 0.7;
}

.share-link-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #9ca3af;
  font-size: 14px;
  font-weight: 400;
  margin-bottom: 24px;
  font-family: 'Geist', monospace;
  outline: none;
}

.share-options-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 400px;
  margin: 0 auto;
}

.share-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: opacity 200ms ease-out;
}

.share-option:hover {
  opacity: 0.7;
}

.share-option-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.share-option-icon.whatsapp {
  background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
}

.share-option-icon.telegram {
  background: linear-gradient(135deg, #0088cc 0%, #005f8c 100%);
}

.share-option-icon.sms {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
}

.share-option-icon.email {
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
}

.share-option-icon.native {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
}

.share-option-label {
  font-size: 14px;
  font-weight: 600;
  color: #d1d5db;
}

.share-option.hidden {
  display: none;
}

.share-copy-confirm {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #10b981;
  color: #ffffff;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  z-index: 10000;
  opacity: 0;
  transition: opacity 200ms ease-out;
}

.share-copy-confirm.show {
  opacity: 1;
}

@media (min-width: 768px) {
  .share-panel {
    max-width: 480px;
    left: 50%;
    transform: translate(-50%, 100%);
    border-radius: 20px;
    bottom: 20px;
  }
  
  .share-panel.active {
    transform: translate(-50%, 0);
  }
}
</style>

    <div class="share-option" data-action="sms">

<div class="share-copy-confirm" id="shareCopyConfirm">Copied!</div>

<script>
(function() {
  const backdrop = document.getElementById('shareBackdrop');
  const panel = document.getElementById('sharePanel');
  const closeBtn = document.getElementById('shareCloseBtn');
  const linkInput = document.getElementById('shareLinkInput');
  const copyConfirm = document.getElementById('shareCopyConfirm');
  const nativeShareOption = document.getElementById('nativeShareOption');
  
  // Hide native share on desktop
  if (!navigator.share) {
    nativeShareOption.classList.add('hidden');
  }
  
  // Set share URL (use current page URL or card-specific URL)
  const shareUrl = window.location.href;
  linkInput.value = shareUrl;
  
  // Open panel function (call this from a "Share" button: window.openSharePanel())
  window.openSharePanel = function() {
    backdrop.classList.add('active');
    panel.classList.add('active');
  };
  
  // Close panel
  function closePanel() {
    backdrop.classList.remove('active');
    panel.classList.remove('active');
  }
  
  closeBtn.addEventListener('click', closePanel);
  backdrop.addEventListener('click', closePanel);
  
  // Share actions
  document.querySelectorAll('.share-option').forEach(option => {
    option.addEventListener('click', function() {
      const action = this.dataset.action;
      const cardTitle = document.title || 'Digital Business Card';
      const message = `Check out my digital business card: ${shareUrl}`;
      
      switch(action) {
        case 'copy':
          navigator.clipboard.writeText(shareUrl).then(() => {
            copyConfirm.classList.add('show');
            setTimeout(() => {
              copyConfirm.classList.remove('show');
            }, 2000);
          });
          break;
          
        case 'whatsapp':
          window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
          break;
          
        case 'telegram':
          window.open(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(cardTitle)}`, '_blank');
          break;
          
        case 'sms':
          window.location.href = `sms:?body=${encodeURIComponent(message)}`;
          break;
          
        case 'email':
          window.location.href = `mailto:?subject=${encodeURIComponent(cardTitle)}&body=${encodeURIComponent(message)}`;
          break;
          
        case 'native':
          if (navigator.share) {
            navigator.share({
              title: cardTitle,
              text: 'Check out my digital business card',
              url: shareUrl
            }).catch(() => {});
          }
          break;
      }
    });
  });
})();
</script>
