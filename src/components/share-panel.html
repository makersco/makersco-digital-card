<!-- Share Panel Component -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700;800&display=swap');
  
  .share-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    z-index: 9998;
    opacity: 0;
    transition: opacity 250ms ease;
    pointer-events: none;
  }
  
  .share-backdrop.active {
    opacity: 1;
    pointer-events: auto;
  }
  
  .share-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111827;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    z-index: 9999;
    transform: translateY(100%);
    transition: transform 280ms cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
  }
  
  .share-panel.active {
    transform: translateY(0);
  }
  
  .share-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  
  .share-title {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    margin: 0;
  }
  
  .share-close {
    width: 36px;
    height: 36px;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 50%;
    color: #ffffff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 200ms ease, transform 150ms ease;
    padding: 0;
  }
  
  .share-close:hover {
    background: rgba(255, 255, 255, 0.12);
  }
  
  .share-close:active {
    transform: scale(0.95);
  }
  
  .share-link-display {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    font-weight: 400;
    margin-bottom: 24px;
    outline: none;
    font-family: 'Geist', monospace;
  }
  
  .share-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  
  .share-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 12px;
    border-radius: 12px;
    transition: background 200ms ease, transform 150ms ease;
    background: transparent;
    border: none;
    min-height: 44px;
  }
  
  .share-option:hover {
    background: rgba(255, 255, 255, 0.04);
  }
  
  .share-option:active {
    transform: scale(0.97);
  }
  
  .share-option.hidden {
    display: none;
  }
  
  .share-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 200ms ease;
  }
  
  .share-option:hover .share-icon {
    transform: scale(1.05);
  }
  
  .share-label {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    text-align: center;
  }
  
  .copy-confirmation {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(34, 197, 94, 0.95);
    color: #ffffff;
    padding: 12px 24px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
    z-index: 10000;
  }
  
  .copy-confirmation.show {
    opacity: 1;
  }
  
  @media (min-width: 768px) {
    .share-panel {
      left: 50%;
      transform: translate(-50%, 100%);
      width: 90%;
    }
    
    .share-panel.active {
      transform: translate(-50%, 0);
    }
  }
</style>

<div class="share-backdrop" id="shareBackdrop"></div>

<div class="share-panel" id="sharePanel">
  <div class="share-header">
    <h3 class="share-title">Share Card</h3>
    <button class="share-close" id="shareClose" aria-label="Close">✕</button>
  </div>
  
  <input 
    type="text" 
    class="share-link-display" 
    id="shareLinkDisplay" 
    readonly 
    value="https://yourcard.app/card/abc123"
  />
  
  <div class="share-options">
    <button class="share-option" id="shareCopy">

        </svg>

    <button class="share-option" id="shareWhatsApp">

        </svg>

      <span class="share-label">WhatsApp</span>
    </button>
    
    <button class="share-option" id="shareTelegram">
      <div class="share-icon" style="background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);">

        </svg>
      </div>
      <span class="share-label">Telegram</span>
    </button>
    
    <button class="share-option" id="shareSMS">
      <div class="share-icon" style="background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4C2.9 2 2.01 2.9 2.01 4L2 22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM9 11H7V9H9V11ZM13 11H11V9H13V11ZM17 11H15V9H17V11Z" fill="white"/>
        </svg>
      </div>
      <span class="share-label">SMS</span>
    </button>
    
    <button class="share-option" id="shareEmail">
      <div class="share-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z" fill="white"/>
        </svg>
      </div>
      <span class="share-label">Email</span>
    </button>
    
    <button class="share-option hidden" id="shareNative">
      <div class="share-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 16.08C17.24 16.08 16.56 16.38 16.04 16.85L8.91 12.7C8.96 12.47 9 12.24 9 12C9 11.76 8.96 11.53 8.91 11.3L15.96 7.19C16.5 7.69 17.21 8 18 8C19.66 8 21 6.66 21 5C21 3.34 19.66 2 18 2C16.34 2 15 3.34 15 5C15 5.24 15.04 5.47 15.09 5.7L8.04 9.81C7.5 9.31 6.79 9 6 9C4.34 9 3 10.34 3 12C3 13.66 4.34 15 6 15C6.79 15 7.5 14.69 8.04 14.19L15.16 18.35C15.11 18.56 15.08 18.78 15.08 19C15.08 20.61 16.39 21.92 18 21.92C19.61 21.92 20.92 20.61 20.92 19C20.92 17.39 19.61 16.08 18 16.08Z" fill="white"/>
        </svg>
      </div>
      <span class="share-label">Share</span>
    </button>
  </div>
</div>

<div class="copy-confirmation" id="copyConfirmation">Copied!</div>

<script>
(function() {
  const backdrop = document.getElementById('shareBackdrop');
  const panel = document.getElementById('sharePanel');
  const closeBtn = document.getElementById('shareClose');
  const linkDisplay = document.getElementById('shareLinkDisplay');
  const copyConfirmation = document.getElementById('copyConfirmation');
  
  // Share buttons
  const copyBtn = document.getElementById('shareCopy');
  const whatsappBtn = document.getElementById('shareWhatsApp');
  const telegramBtn = document.getElementById('shareTelegram');
  const smsBtn = document.getElementById('shareSMS');
  const emailBtn = document.getElementById('shareEmail');
  const nativeBtn = document.getElementById('shareNative');
  
  // Card data - customize these
  const cardData = {
    url: window.location.href || 'https://yourcard.app/card/abc123',
    name: 'John Doe',
    title: 'Product Designer',
    message: 'Check out my digital business card!'
  };
  
  // Update link display
  linkDisplay.value = cardData.url;
  
  // Show native share only on mobile
  if (navigator.share) {
    nativeBtn.classList.remove('hidden');
  }
  
  // Open panel function (call this from your "Share" button)
  window.openSharePanel = function() {
    backdrop.classList.add('active');
    panel.classList.add('active');
    document.body.style.overflow = 'hidden';
  };
  
  // Close panel
  function closeSharePanel() {
    backdrop.classList.remove('active');
    panel.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  closeBtn.addEventListener('click', closeSharePanel);
  backdrop.addEventListener('click', closeSharePanel);
  
  // Copy link
  copyBtn.addEventListener('click', async function() {
    try {
      await navigator.clipboard.writeText(cardData.url);
      copyConfirmation.classList.add('show');
      setTimeout(() => {
        copyConfirmation.classList.remove('show');
      }, 2000);
    } catch (err) {
      // Fallback for older browsers
      linkDisplay.select();
      document.execCommand('copy');
      copyConfirmation.classList.add('show');
      setTimeout(() => {
        copyConfirmation.classList.remove('show');
      }, 2000);
    }
  });
  
  // WhatsApp
  whatsappBtn.addEventListener('click', function() {
    const text = encodeURIComponent(`${cardData.message} ${cardData.url}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
  });
  
  // Telegram
  telegramBtn.addEventListener('click', function() {
    const text = encodeURIComponent(cardData.message);
    const url = encodeURIComponent(cardData.url);
    window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
  });
  
  // SMS
  smsBtn.addEventListener('click', function() {
    const body = encodeURIComponent(`${cardData.message} ${cardData.url}`);
    window.location.href = `sms:?&body=${body}`;
  });
  
  // Email
  emailBtn.addEventListener('click', function() {
    const subject = encodeURIComponent(`${cardData.name} - ${cardData.title}`);
    const body = encodeURIComponent(`${cardData.message}\n\n${cardData.url}`);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  });
  
  // Native share
  if (navigator.share) {
    nativeBtn.addEventListener('click', async function() {
      try {
        await navigator.share({
          title: `${cardData.name} - ${cardData.title}`,
          text: cardData.message,
          url: cardData.url
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('Share failed:', err);
        }
      }
    });
  }
})();
</script>
