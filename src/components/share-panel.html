<style>

.share-panel-backdrop {

}

}

.share-panel {

  z-index: 9999;

.share-panel.active {

}

.share-panel-title {

  font-weight: 700;

.share-panel-close {

  border: none;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;

}

.share-link-container {

}

.share-options-grid {

}

.share-option {

  align-items: center;
  gap: 8px;
  padding: 12px;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: opacity 200ms ease, transform 200ms ease;
  min-height: 44px;
}

.share-option:active {
  transform: scale(0.96);
  opacity: 0.8;
}

.share-option-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: opacity 200ms ease, transform 200ms ease;
}

.share-option:hover .share-option-icon {
  transform: scale(1.05);
  opacity: 0.9;
}

.share-option-label {

  font-weight: 600;
  color: #e2e8f0;
  text-align: center;
}

.icon-copy { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
.icon-whatsapp { background: linear-gradient(135deg, #25d366 0%, #1da851 100%); }
.icon-telegram { background: linear-gradient(135deg, #2aabee 0%, #229ed9 100%); }
.icon-sms { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
.icon-email { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
.icon-native { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

.share-option-copied {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: #0a0a0f;
  color: #10b981;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;

  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease, transform 200ms ease;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}

.share-option-copied.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

@media (min-width: 380px) {
  .share-options-grid {
    gap: 20px;
  }
}

@media (min-width: 768px) {
  .share-panel {
    left: 50%;
    transform: translate(-50%, 100%);
    width: 480px;
    border-radius: 20px;
    bottom: 40px;
  }
  
  .share-panel.active {
    transform: translate(-50%, 0);
  }
  
  .share-option.native-share {
    display: none;
  }
}

<script>
(function() {
  const backdrop = document.getElementById('shareBackdrop');
  const panel = document.getElementById('sharePanel');
  const closeBtn = document.getElementById('sharePanelClose');
  const linkInput = document.getElementById('shareLinkInput');
  const copiedNotification = document.getElementById('copiedNotification');
  const shareOptions = document.querySelectorAll('.share-option');
  
  linkInput.value = window.location.href;
  
  window.openSharePanel = function() {
    backdrop.classList.add('active');
    setTimeout(() => {
      panel.classList.add('active');
    }, 10);
  };
  
  function closeSharePanel() {
    panel.classList.remove('active');
    setTimeout(() => {
      backdrop.classList.remove('active');
    }, 280);
  }
  
  closeBtn.addEventListener('click', closeSharePanel);
  
  backdrop.addEventListener('click', function(e) {
    if (e.target === backdrop) {
      closeSharePanel();
    }
  });
  
  function showCopiedNotification() {
    copiedNotification.classList.add('show');
    setTimeout(() => {
      copiedNotification.classList.remove('show');
    }, 2000);
  }
  
  shareOptions.forEach(option => {
    option.addEventListener('click', function() {
      const action = this.getAttribute('data-action');
      const shareUrl = linkInput.value;
      const shareText = 'Check out my digital business card';
      
      switch(action) {
        case 'copy':
          navigator.clipboard.writeText(shareUrl).then(() => {
            showCopiedNotification();
          });
          break;
          
        case 'whatsapp':
          window.open(`https://wa.me/?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`, '_blank');
          break;
          
        case 'telegram':
          window.open(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`, '_blank');
          break;
          
        case 'sms':
          window.location.href = `sms:?&body=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
          break;
          
        case 'email':
          window.location.href = `mailto:?subject=${encodeURIComponent(shareText)}&body=${encodeURIComponent(shareUrl)}`;
          break;
          
        case 'native':
          if (navigator.share) {
            navigator.share({
              title: shareText,
              url: shareUrl
            }).catch(err => console.log('Share cancelled'));
          }
          break;
      }
    });
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && backdrop.classList.contains('active')) {
      closeSharePanel();
    }
  });
})();
</script>
