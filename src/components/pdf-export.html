<!-- PDF Export Module -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  .pdf-export-wrapper {
    margin: 32px 0;
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .pdf-download-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 44px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #3b4ecc 0%, #5865f2 100%);
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 240ms cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 8px rgba(59, 78, 204, 0.24);
    outline: none;
  }

  .pdf-download-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(59, 78, 204, 0.32);
  }

  .pdf-download-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .pdf-download-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .pdf-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: pdf-spin 600ms linear infinite;
  }

  @keyframes pdf-spin {
    to { transform: rotate(360deg); }
  }

  .pdf-btn-text {
    display: inline-block;
  }

  @media (max-width: 380px) {
    .pdf-download-btn {
      width: 100%;
      padding: 12px 20px;
    }
  }
</style>

<div class="pdf-export-wrapper">
  <button class="pdf-download-btn" id="pdfDownloadBtn" onclick="exportCardToPDF()">
    <span class="pdf-btn-text">Download PDF</span>
  </button>
</div>

<script>
async function exportCardToPDF() {
  const btn = document.getElementById('pdfDownloadBtn');
  const btnText = btn.querySelector('.pdf-btn-text');
  const originalText = btnText.textContent;
  
  // Start loading state
  btn.disabled = true;
  btnText.textContent = 'Generating...';
  btn.insertAdjacentHTML('afterbegin', '<span class="pdf-spinner"></span>');
  
  try {
    const cardWrapper = document.querySelector('.card-wrapper');
    if (!cardWrapper) {
      throw new Error('Card wrapper not found');
    }

    // Capture card as canvas
    const canvas = await html2canvas(cardWrapper, {
      scale: 3,
      useCORS: true,
      backgroundColor: null,
      logging: false,
      imageTimeout: 0
    });

    // Business card dimensions: 85mm × 54mm at 300 DPI
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: [85, 54]
    });

    const imgData = canvas.toDataURL('image/png', 1.0);
    pdf.addImage(imgData, 'PNG', 0, 0, 85, 54, '', 'FAST');

    // Extract contact info and add clickable links
    const phone = document.querySelector('[href^="tel:"]')?.getAttribute('href')?.replace('tel:', '');
    const email = document.querySelector('[href^="mailto:"]')?.getAttribute('href')?.replace('mailto:', '');
    const website = document.querySelector('a[href*="://"]')?.getAttribute('href');

    // Add invisible clickable areas (approximate positions - adjust based on your layout)
    if (phone) {
      pdf.link(10, 35, 30, 8, { url: `tel:${phone}` });
    }
    if (email) {
      pdf.link(10, 44, 35, 8, { url: `mailto:${email}` });
    }
    if (website) {
      pdf.link(50, 44, 30, 8, { url: website });
    }

    // Extract name for filename
    const nameElement = document.querySelector('[data-field="fullName"], .name, h1, h2');
    let filename = 'business-card.pdf';
    
    if (nameElement) {
      const fullName = nameElement.textContent.trim().toLowerCase();
      filename = fullName.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-card.pdf';
    }

    // Download PDF
    pdf.save(filename);

  } catch (error) {
    console.error('PDF export failed:', error);
    alert('Failed to generate PDF. Please try again.');
  } finally {
    // Reset button state
    const spinner = btn.querySelector('.pdf-spinner');
    if (spinner) spinner.remove();
    btnText.textContent = originalText;
    btn.disabled = false;
  }
}
</script>
