<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-elevated: #14141c;
            --bg-card-front: linear-gradient(135deg, #1a1a24 0%, #0f0f17 100%);
            --bg-card-back: linear-gradient(135deg, #14141c 0%, #1c1c28 100%);
            --surface-glass: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);

            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;

            --accent-gold: #c9a961;
            --accent-gold-hi: #d4b876;
            --accent-action: #6b7fd7;
            --accent-success: #4a9d7f;

            --radius-card: 20px;
            --radius-btn: 12px;
            --radius-badge: 20px;
            --radius-pill: 999px;

            --shadow-card: 0 20px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
            --shadow-btn: 0 4px 12px -2px rgba(0, 0, 0, 0.4);

            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --dur-flip: 700ms;
            --dur-ui: 200ms;

            --font-stack: "Geist", "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
        }

        @media (prefers-reduced-motion: reduce) {
            :root {
                --dur-flip: 0ms;
                --dur-ui: 0ms;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
            padding: var(--space-6) var(--space-4);
            max-width: 100%;
        }

        .card-stage {
            perspective: 1200px;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6) 0;
        }

        .card {
            position: relative;
            width: calc(100vw - 32px);
            max-width: 360px;
            height: 460px;
            transition: transform var(--dur-flip) var(--ease-spring);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card--flippable {
            transform-style: preserve-3d;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card__face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: var(--space-8);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
        }

        .card__face--front {
            background: var(--bg-card-front);
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
        }

        .card__face--back {
            background: var(--bg-card-back);
            transform: rotateY(180deg);
            justify-content: space-between;
        }

        .card__brand-mark {
            position: absolute;
            top: var(--space-6);
            right: var(--space-6);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: -0.5px;
        }

        .card__avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
            padding: 3px;
            background: var(--bg-elevated);
            overflow: hidden;
        }

        .card__avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-action) 100%);
        }

        .card__name {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .card__title {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
        }

        .card__company {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .card__flip-hint {
            position: absolute;
            bottom: var(--space-6);
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .card__flip-hint::before {
            content: '⟲';
            font-size: 16px;
        }

        .card__details {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .card__detail {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            font-size: 14px;
        }

        .card__detail-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: var(--accent-gold);
            margin-top: 2px;
        }

        .card__detail-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
        }

        .card__detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .card__detail-value {
            color: var(--text-primary);
            font-weight: 400;
        }

        .card__divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: var(--space-4) 0;
        }

        .card__tagline {
            font-size: 14px;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.5;
            text-align: center;
        }

        .card__badge {
            display: inline-block;
            padding: var(--space-2) var(--space-4);
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-badge);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-gold);
            align-self: center;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-2);
            max-width: 360px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 380px) {
            .actions {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 768px) {
            .app {
                padding: var(--space-10) var(--space-6);
            }

            .card {
                max-width: 400px;
            }

            .actions {
                max-width: 400px;
            }
        }

        .action {
            min-height: 56px;
            border: none;
            border-radius: var(--radius-btn);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-1);
            transition: transform var(--dur-ui) var(--ease-smooth), opacity var(--dur-ui) var(--ease-smooth);
            box-shadow: var(--shadow-btn);
        }

        .action:active {
            transform: scale(0.97);
        }

        @media (prefers-reduced-motion: reduce) {
            .action:active {
                transform: none;
            }
        }

        .action:focus-visible {
            outline: 2px solid var(--accent-gold-hi);
            outline-offset: 2px;
        }

        .action--call {
            background: var(--accent-action);
            color: white;
        }

        .action--email {
            background: var(--surface-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .action--whatsapp {
            background: var(--accent-success);
            color: white;
        }

        .action--save {
            background: var(--accent-gold);
            color: #0a0a0f;
        }

        .action__icon {
            font-size: 20px;
            line-height: 1;
        }

        .share-panel {
            max-width: 360px;
            margin: var(--space-6) auto 0;
            width: 100%;
        }

        @media (min-width: 768px) {
            .share-panel {
                max-width: 400px;
            }
        }

        .share-panel__title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-4);
            text-align: center;
        }

        .share-panel__row {
            display: flex;
            justify-content: center;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }

        .share-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-subtle);
            background: var(--surface-glass);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--dur-ui) var(--ease-smooth), background var(--dur-ui) var(--ease-smooth);
        }

        .share-btn:hover {
            background: var(--border-subtle);
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        @media (prefers-reduced-motion: reduce) {
            .share-btn:active {
                transform: none;
            }
        }

        .share-btn:focus-visible {
            outline: 2px solid var(--accent-gold-hi);
            outline-offset: 2px;
        }

        .qr-container {
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: var(--space-4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            width: fit-content;
        }

        .qr-container img {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: var(--space-6);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-btn);
            border: 1px solid var(--border-strong);
            box-shadow: var(--shadow-card);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: transform var(--dur-ui) var(--ease-smooth), opacity var(--dur-ui) var(--ease-smooth);
            z-index: 1000;
            max-width: calc(100vw - 32px);
        }

        .toast.is-visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="card-stage">
            <div class="card card--flippable" role="button" aria-pressed="false" tabindex="0">
                <article class="card__face card__face--front">
                    <div class="card__brand-mark">AF</div>
                    <figure class="card__avatar">
                        <img class="card__avatar-img" src="" alt="Ahmad Faris bin Razak">
                    </figure>
                    <h1 class="card__name">Ahmad Faris bin Razak</h1>
                    <p class="card__title">Founder & CEO</p>
                    <p class="card__company">Pixel Reka Sdn Bhd</p>
                    <span class="card__flip-hint">Tap to flip</span>
                </article>
                <article class="card__face card__face--back">
                    <ul class="card__details">
                        <li class="card__detail">
                            <svg class="card__detail-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            <div class="card__detail-content">
                                <span class="card__detail-label">Phone</span>
                                <span class="card__detail-value">+60123456789</span>
                            </div>
                        </li>
                        <li class="card__detail">
                            <svg class="card__detail-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <div class="card__detail-content">
                                <span class="card__detail-label">Email</span>
                                <span class="card__detail-value">faris@pixelreka.com.my</span>
                            </div>
                        </li>
                        <li class="card__detail">
                            <svg class="card__detail-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <div class="card__detail-content">
                                <span class="card__detail-label">Location</span>
                                <span class="card__detail-value">Kuala Lumpur, Malaysia</span>
                            </div>
                        </li>
                    </ul>
                    <div class="card__divider"></div>
                    <p class="card__tagline">Building digital solutions for Malaysian SMEs</p>
                    <span class="card__badge">He/Him</span>
                </article>
            </div>
        </section>

        <nav class="actions">
            <button class="action action--call" aria-label="Call Ahmad Faris">
                <span class="action__icon">📞</span>
                <span>Call</span>
            </button>
            <button class="action action--email" aria-label="Email Ahmad Faris">
                <span class="action__icon">✉️</span>
                <span>Email</span>
            </button>
            <button class="action action--whatsapp" aria-label="WhatsApp Ahmad Faris">
                <span class="action__icon">💬</span>
                <span>WhatsApp</span>
            </button>
            <button class="action action--save" aria-label="Save contact">
                <span class="action__icon">💾</span>
                <span>Save Contact</span>
            </button>
        </nav>

        <section class="share-panel">
            <h2 class="share-panel__title">Share</h2>
            <div class="share-panel__row">
                <button class="share-btn share-btn--copy" aria-label="Copy link">
                    <span>🔗</span>
                </button>
                <button class="share-btn share-btn--whatsapp" aria-label="Share via WhatsApp">
                    <span>💬</span>
                </button>
                <button class="share-btn share-btn--sms" aria-label="Share via SMS">
                    <span>💬</span>
                </button>
            </div>
            <div id="qrcode" class="qr-container"></div>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            phoneRaw: "60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            locationQuery: "Kuala Lumpur, Malaysia",
            whatsapp: "60123456789",
            tagline: "Building digital solutions for Malaysian SMEs",
            specialty: "He/Him",
            avatar: "",
            shareUrl: window.location.href
        };

        function flipCard() {
            const card = document.querySelector('.card--flippable');
            const isFlipped = card.classList.toggle('is-flipped');
            card.setAttribute('aria-pressed', isFlipped);
        }

        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location};;;`,
                `NOTE:${CONFIG.tagline}`,
                'END:VCARD'
            ].join('\n');

            return new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        }

        function downloadVCard() {
            const blob = generateVCard();
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved! Check your downloads.');
        }

        function initQR() {
            const qrContainer = document.getElementById('qrcode');
            if (qrContainer && typeof QRCode !== 'undefined') {
                new QRCode(qrContainer, {
                    text: CONFIG.shareUrl,
                    width: 160,
                    height: 160,
                    colorDark: '#f4f4f5',
                    colorLight: 'rgba(0,0,0,0)',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        function shareCard(channel) {
            const shareText = `Check out ${CONFIG.name}'s digital business card: ${CONFIG.shareUrl}`;
            
            switch(channel) {
                case 'copy':
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(window.location.href)
                            .then(() => showToast('Link copied to clipboard!'))
                            .catch(() => showToast('Failed to copy link'));
                    } else {
                        showToast('Clipboard not supported');
                    }
                    break;
                    
                case 'whatsapp':
                    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
                    window.open(whatsappUrl, '_blank');
                    break;
                    
                case 'sms':
                    const smsUrl = `sms:?body=${encodeURIComponent(shareText)}`;
                    window.location.href = smsUrl;
                    break;
            }
        }

        function callPhone() {
            window.location.href = `tel:${CONFIG.phoneRaw}`;
        }

        function emailContact() {
            window.location.href = `mailto:${CONFIG.email}`;
        }

        function whatsappContact() {
            const message = encodeURIComponent(`Hi ${CONFIG.name.split(' ')[0]}, I found your digital card and would like to connect!`);
            const whatsappUrl = `https://wa.me/${CONFIG.whatsapp}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('is-visible');
            
            setTimeout(() => {
                toast.classList.remove('is-visible');
            }, 2000);
        }

        function bindEvents() {
            const card = document.querySelector('.card--flippable');
            
            card.addEventListener('click', flipCard);
            
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    flipCard();
                }
            });

            document.querySelector('.action--call').addEventListener('click', callPhone);
            document.querySelector('.action--email').addEventListener('click', emailContact);
            document.querySelector('.action--whatsapp').addEventListener('click', whatsappContact);
            document.querySelector('.action--save').addEventListener('click', downloadVCard);

            document.querySelector('.share-btn--copy').addEventListener('click', () => shareCard('copy'));
            document.querySelector('.share-btn--whatsapp').addEventListener('click', () => shareCard('whatsapp'));
            document.querySelector('.share-btn--sms').addEventListener('click', () => shareCard('sms'));
        }

        function init() {
            bindEvents();
            initQR();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
