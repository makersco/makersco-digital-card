<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Ahmad Faris bin Razak — Founder & CEO</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-elevated: #13131a;
            --bg-recessed: #0e0e14;
            --surface-border: rgba(255,255,255,0.06);
            --surface-border-strong: rgba(255,255,255,0.12);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1aa;
            --text-tertiary: #6b6b76;
            --accent: #c9a961;
            --accent-soft: rgba(201,169,97,0.14);
            --accent-border: rgba(201,169,97,0.32);
            --success: #5b9279;
            --whatsapp: #3a8a6b;
            --danger: #a85a5a;
            --radius-card: 20px;
            --radius-btn: 12px;
            --radius-pill: 20px;
            --shadow-card: 0 24px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
            --ease-standard: cubic-bezier(0.2,0,0,1);
            --dur-flip: 680ms;
            --dur-interaction: 200ms;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-base);
            color: var(--text-secondary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            padding: var(--space-4);
        }

        .page {
            max-width: 360px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .page-header {
            text-align: center;
            padding: var(--space-4) 0;
        }

        .brand-mark {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-tertiary);
        }

        .card-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.586;
            perspective: 1200px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card-flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-spring);
            will-change: transform;
        }

        .card-flipper.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: var(--space-6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-face--front {
            background: var(--bg-elevated);
            box-shadow: var(--shadow-card);
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            position: relative;
        }

        .card-face--front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: radial-gradient(ellipse at top, var(--accent-soft), transparent);
            pointer-events: none;
        }

        .card-face--back {
            background: var(--bg-recessed);
            box-shadow: var(--shadow-card);
            transform: rotateY(180deg);
            justify-content: space-between;
            gap: var(--space-5);
        }

        .avatar-ring {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            z-index: 1;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-elevated);
            border: 3px solid var(--bg-elevated);
        }

        .card-name {
            font-size: clamp(24px, 6vw, 30px);
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.2;
            z-index: 1;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-align: center;
            z-index: 1;
        }

        .card-company {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            z-index: 1;
        }

        .badge {
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent-border);
            margin-top: var(--space-2);
            z-index: 1;
        }

        .flip-hint {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--surface-border);
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-btn);
            cursor: pointer;
            transition: all var(--dur-interaction) var(--ease-standard);
            z-index: 1;
        }

        .flip-hint:hover {
            border-color: var(--surface-border-strong);
            color: var(--text-secondary);
        }

        .flip-hint:active {
            transform: scale(0.97);
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .contact-row {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            padding: var(--space-3);
            background: var(--bg-elevated);
            border-radius: var(--radius-btn);
            border: 1px solid var(--surface-border);
        }

        .contact-row .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
        }

        .contact-row .value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }

        .tagline {
            font-size: 13px;
            font-weight: 300;
            font-style: italic;
            color: var(--text-tertiary);
            text-align: center;
            line-height: 1.6;
            padding-top: var(--space-3);
            border-top: 1px solid var(--surface-border);
        }

        .action-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-2);
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-1);
            min-height: 44px;
            padding: var(--space-3);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            text-decoration: none;
            border-radius: var(--radius-btn);
            border: 1px solid var(--surface-border-strong);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--dur-interaction) var(--ease-standard);
            -webkit-tap-highlight-color: transparent;
        }

        .btn--ghost {
            background: var(--bg-elevated);
        }

        .btn--ghost:hover {
            transform: translateY(-1px);
            border-color: var(--accent-border);
        }

        .btn--ghost:active {
            transform: scale(0.97);
        }

        .btn--solid {
            background: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .btn--solid:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn--solid:active {
            transform: scale(0.97);
        }

        .btn--whatsapp {
            background: var(--whatsapp);
            color: var(--text-primary);
            border-color: var(--whatsapp);
        }

        .btn--whatsapp:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn--whatsapp:active {
            transform: scale(0.97);
        }

        .btn--chip {
            flex-direction: row;
            font-size: 13px;
            min-height: 36px;
            padding: var(--space-2) var(--space-4);
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .btn-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .qr-panel,
        .share-panel {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            padding: var(--space-5);
            background: var(--bg-elevated);
            border-radius: var(--radius-card);
            border: 1px solid var(--surface-border);
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            text-align: center;
        }

        .qr-target {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            background: var(--text-primary);
            border-radius: var(--radius-btn);
            margin: 0 auto;
        }

        .share-row {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .share-row .btn {
            flex: 1;
            min-width: 100px;
        }

        .page-footer {
            text-align: center;
            padding: var(--space-6) 0;
        }

        .copyright {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        @media (min-width: 380px) {
            .page {
                max-width: 340px;
            }

            .btn-label {
                display: block;
            }
        }

        @media (min-width: 768px) {
            .page {
                max-width: 420px;
                gap: 28px;
            }

            .qr-target img {
                width: 200px !important;
                height: 200px !important;
            }
        }

        @media (max-width: 360px) {
            .btn-label {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <span class="brand-mark">Digital Card</span>
        </header>

        <section class="card-stage">
            <div class="card-flipper">

        <footer class="page-footer">

        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            pronouns: "He/Him",
            photo: "",
            color: "#6366f1",
            style: "dark-luxury",
            whatsapp_message: "Hi Faris, I found your digital card and would like to connect!",
            linkedin: "",
            instagram: "",
            custom_links: []
        };

        function hydrate() {
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            document.getElementById('contactPhone').textContent = CONFIG.phone;
            document.getElementById('contactEmail').textContent = CONFIG.email;
            document.getElementById('contactLocation').textContent = CONFIG.location;
            document.getElementById('cardBio').textContent = CONFIG.bio;
            
            const avatarImg = document.getElementById('avatarImg');
            if (CONFIG.photo) {
                avatarImg.src = CONFIG.photo;
            } else {
                avatarImg.src = 'data:image/svg+xml,' + encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#13131a" width="100" height="100"/><text x="50" y="50" text-anchor="middle" dy=".35em" fill="#c9a961" font-size="40" font-weight="800" font-family="system-ui">' + 
                    CONFIG.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() + 
                    '</text></svg>'
                );
            }

            document.getElementById('btnCall').href = 'tel:' + CONFIG.phone;
            document.getElementById('btnEmail').href = 'mailto:' + CONFIG.email;
            
            const waNumber = CONFIG.phone.replace(/[^0-9]/g, '');
            const waMessage = encodeURIComponent(CONFIG.whatsapp_message);
            const waLink = 'https://wa.me/' + waNumber + '?text=' + waMessage;
            document.getElementById('btnWhatsApp').href = waLink;
            
            const shareUrl = window.location.href;
            const shareText = encodeURIComponent('Check out ' + CONFIG.name + "'s digital card: " + shareUrl);
            document.getElementById('shareWA').href = 'https://wa.me/?text=' + shareText;
            document.getElementById('shareSMS').href = 'sms:?&body=' + shareText;
        }

        function flipCard(force) {
            const flipper = document.querySelector('.card-flipper');
            const isFlipped = flipper.classList.contains('is-flipped');
            
            if (force !== undefined) {
                flipper.classList.toggle('is-flipped', force);
            } else {
                flipper.classList.toggle('is-flipped');
            }
            
            const hints = document.querySelectorAll('.flip-hint');
            hints.forEach(hint => {
                hint.setAttribute('aria-pressed', flipper.classList.contains('is-flipped'));
            });
        }

        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                'FN:' + CONFIG.name,
                'N:' + CONFIG.name.split(' ').reverse().join(';') + ';;;',
                'ORG:' + CONFIG.company,
                'TITLE:' + CONFIG.title,
                'TEL;TYPE=CELL:' + CONFIG.phone,
                'EMAIL:' + CONFIG.email,
                'ADR;TYPE=WORK:;;' + CONFIG.location + ';;;;',
                'URL:' + CONFIG.website,
                'NOTE:' + CONFIG.bio,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        function downloadVCard() {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = CONFIG.name.toLowerCase().replace(/\s+/g, '-') + '.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function initQR() {
            const qrTarget = document.getElementById('qrTarget');
            qrTarget.innerHTML = '';
            new QRCode(qrTarget, {
                text: window.location.href,
                width: 176,
                height: 176,
                colorDark: '#0a0a0f',
                colorLight: '#f5f5f7',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function copyLink() {
            const btn = document.getElementById('copyLink');
            const originalText = btn.innerHTML;
            
            navigator.clipboard.writeText(window.location.href).then(() => {
                btn.innerHTML = '<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>Copied';
                btn.style.opacity = '0.7';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.opacity = '1';
                }, 1500);
            });
        }

        function shareCard(channel) {
            const shareUrl = window.location.href;
            const shareText = 'Check out ' + CONFIG.name + "'s digital card: " + shareUrl;
            
            if (channel === 'native' && navigator.share) {
                navigator.share({
                    title: CONFIG.name + ' — ' + CONFIG.title,
                    text: shareText,
                    url: shareUrl
                });
            } else if (channel === 'whatsapp') {
                window.open('https://wa.me/?text=' + encodeURIComponent(shareText), '_blank', 'noopener');
            } else if (channel === 'sms') {
                window.location.href = 'sms:?&body=' + encodeURIComponent(shareText);
            }
        }

        function bindEvents() {
            const cardStage = document.querySelector('.card-stage');
            const flipHints = document.querySelectorAll('.flip-hint');
            const actionBar = document.querySelector('.action-bar');
            
            cardStage.addEventListener('click', (e) => {
                if (actionBar.contains(e.target)) return;
                if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
                if (e.target.closest('.flip-hint')) {
                    flipCard();
                    return;
                }
                flipCard();
            });
            
            flipHints.forEach(hint => {
                hint.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        flipCard();
                    }
                });
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    flipCard(false);
                }
            });
            
            document.getElementById('saveContact').addEventListener('click', downloadVCard);
            document.getElementById('copyLink').addEventListener('click', copyLink);
        }

        hydrate();
        bindEvents();
        if (typeof QRCode !== 'undefined') {
            initQR();
        }
    </script>
</body>
</html>
