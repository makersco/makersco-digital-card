<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card — Glass Aurora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* Surface */
            --bg-gradient: radial-gradient(ellipse at 50% 0%, #302b63, #0f0c29);
            --bg-solid: #0f0c29;

            /* Glass layers */
            --glass-front: rgba(255, 255, 255, 0.08);
            --glass-back: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-soft: rgba(255, 255, 255, 0.10);
            --glass-highlight: rgba(255, 255, 255, 0.22);

            /* Accent */
            --accent: #818cf8;
            --accent-hover: #6f7bf0;
            --accent-soft: rgba(129, 140, 248, 0.14);
            --accent-glow: rgba(129, 140, 248, 0.32);

            /* Text */
            --text-primary: #f4f4f8;
            --text-secondary: rgba(244, 244, 248, 0.72);
            --text-muted: rgba(244, 244, 248, 0.52);
            --text-label: rgba(244, 244, 248, 0.60);

            /* Status */
            --status-online: #4ade80;
            --status-online-bg: rgba(74, 222, 128, 0.16);

            /* Motion */
            --ease-glass: cubic-bezier(0.22, 1, 0.36, 1);
            --dur-fast: 180ms;
            --dur-base: 240ms;
            --dur-flip: 280ms;

            /* Shape */
            --radius-card: 24px;
            --radius-chip: 20px;
            --radius-btn: 12px;
        }

        @property --sheen-angle {
            syntax: '<angle>';
            initial-value: 135deg;
            inherits: false;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-primary);
        }

        .card-container {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            aspect-ratio: 380 / 240;
            perspective: 1200px;
            cursor: pointer;
            margin: 0 auto 32px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-glass);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card:hover .card-inner:not(.flipped) {
            transform: translateY(-2px) scale(1.005);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-card);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }

        .card-face::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                var(--sheen-angle, 135deg),
                rgba(255, 255, 255, 0.28) 0%,
                rgba(129, 140, 248, 0.18) 40%,
                rgba(255, 255, 255, 0.04) 70%,
                rgba(129, 140, 248, 0.20) 100%
            );
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.9;
            transition: opacity var(--dur-base) var(--ease-glass);
        }

        .card:hover .card-face::before {
            opacity: 1;
            --sheen-angle: 200deg;
        }

        .card-face.front {
            background: var(--glass-front);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            padding: 24px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
        }

        .card-face.front::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.18), transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .card-face.back {
            background: var(--glass-back);
            border: 1px solid var(--glass-border-soft);
            backdrop-filter: blur(28px) saturate(130%);
            -webkit-backdrop-filter: blur(28px) saturate(130%);
            transform: rotateY(180deg);
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .front-content {
            position: relative;
            z-index: 2;
            display: contents;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--glass-back);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 10px;
            border-radius: var(--radius-chip);
            background: var(--status-online-bg);
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.08em;
            color: var(--status-online);
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-online);
            animation: pulse 1800ms ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (prefers-reduced-motion: reduce) {
            .status-dot {
                animation: none;
            }
        }

        .identity-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name {
            font-weight: 800;
            font-size: 24px;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .title {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .company {
            font-weight: 600;
            font-size: 13px;
            letter-spacing: -0.01em;
            color: var(--accent);
            margin-top: 8px;
        }

        .footer-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 32px;
        }

        .tap-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--text-label);
            text-transform: uppercase;
        }

        .chevron {
            width: 16px;
            height: 16px;
            stroke: var(--accent);
            transition: transform var(--dur-fast) var(--ease-glass);
        }

        .card:hover .chevron {
            transform: translateX(2px);
        }

        .contact-row {
            display: grid;
            grid-template-columns: 20px 64px 1fr;
            gap: 12px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--glass-border-soft);
            min-height: 44px;
            text-decoration: none;
            color: inherit;
            transition: background var(--dur-fast) ease-out;
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            stroke-width: 1.5px;
        }

        .contact-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--text-label);
            text-transform: uppercase;
        }

        .contact-value {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-primary);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .btn {
            height: 44px;
            border: none;
            border-radius: var(--radius-btn);
            font-family: 'DM Sans', system-ui, sans-serif;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-solid);
            border: 1px solid var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-glass {
            background: var(--glass-front);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--glass-highlight);
        }

        .btn-glass:active {
            transform: scale(0.97);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .qr-modal.active {
            display: flex;
        }

        .qr-content {
            background: var(--glass-front);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 32px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .qr-title {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .qr-subtitle {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            background: white;
            padding: 16px;
            border-radius: 12px;
        }

        #qrcode canvas,
        #qrcode img {
            border-radius: 8px;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-front);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            opacity: 0;
            transition: all var(--dur-base) var(--ease-glass);
            z-index: 2000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (min-width: 768px) {
            .card-container {
                max-width: 420px;
            }

            .name {
                font-size: 28px;
            }

            .title {
                font-size: 15px;
            }

            .company {
                font-size: 14px;
            }

            .contact-label {
                font-size: 11px;
            }

            .contact-value {
                font-size: 14px;
            }

            .actions {
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="card">
            <div class="card-inner" id="cardInner">
                <div class="card-face front">

                    </svg>
                    Copy Link

            </div>
            <button class="btn btn-glass" id="shareBtn">

                    <rect x="14" y="3" width="7" height="7" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="3" y="14" width="7" height="7" stroke-linecap="round" stroke-linejoin="round"/>

    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <div class="qr-title">Scan to Connect</div>
            <div class="qr-subtitle">Save contact instantly</div>
            <div id="qrcode"></div>
            <button class="btn btn-glass" onclick="closeQRModal()">Close</button>
        </div>
    </div>

    <div class="toast" id="toast">Link copied to clipboard!</div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#818cf8",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        // Initialize card with config data
        function initCard() {
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            document.getElementById('cardEmail').textContent = CONFIG.email;
            document.getElementById('cardPhone').textContent = CONFIG.phone;
            document.getElementById('cardWebsite').textContent = CONFIG.website.replace('https://', '').replace('http://', '');
            document.getElementById('cardLocation').textContent = CONFIG.location;

            // Set avatar initials
            const nameParts = CONFIG.name.split(' ');
            const initials = nameParts.length >= 2 
                ? nameParts[0][0] + nameParts[1][0]
                : nameParts[0].substring(0, 2);
            document.getElementById('avatar').textContent = initials.toUpperCase();

            // Set contact row hrefs
            document.getElementById('emailRow').href = `mailto:${CONFIG.email}`;
            document.getElementById('phoneRow').href = `tel:${CONFIG.phone}`;
            document.getElementById('webRow').href = CONFIG.website;
        }

        // Card flip functionality
        const card = document.getElementById('card');
        const cardInner = document.getElementById('cardInner');
        let isFlipped = false;

        card.addEventListener('click', function() {
            isFlipped = !isFlipped;
            cardInner.classList.toggle('flipped');
        });

        // Generate vCard data
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `N:${CONFIG.name.split(' ').reverse().join(';')}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR:;;${CONFIG.location};;;;`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Save contact button
        document.getElementById('saveContactBtn').addEventListener('click', function() {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved!');
        });

        // WhatsApp button
        document.getElementById('whatsappBtn').addEventListener('click', function() {
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phone = CONFIG.phone.replace(/[^\d+]/g, '');
            const url = `https://wa.me/${phone}?text=${message}`;
            window.open(url, '_blank');
        });

        // Copy link button
        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            const cardURL = window.location.href;
            navigator.clipboard.writeText(cardURL).then(function() {
                showToast('Link copied to clipboard!');
            }).catch(function(err) {
                console.error('Failed to copy:', err);
                showToast('Failed to copy link');
            });
        });

        // Share button
        document.getElementById('shareBtn').addEventListener('click', async function() {
            const shareData = {
                title: `${CONFIG.name} - Digital Business Card`,
                text: `Connect with ${CONFIG.name}, ${CONFIG.title} at ${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Share failed:', err);
                        fallbackShare();
                    }
                }
            } else {
                fallbackShare();
            }
        });

        function fallbackShare() {
            const cardURL = window.location.href;
            navigator.clipboard.writeText(cardURL).then(function() {
                showToast('Link copied to clipboard!');
            });
        }

        // QR Code functionality
        let qrGenerated = false;

        document.getElementById('qrBtn').addEventListener('click', function() {
            document.getElementById('qrModal').classList.add('active');
            
            if (!qrGenerated) {
                const qrcodeContainer = document.getElementById('qrcode');
                qrcodeContainer.innerHTML = '';
                
                const vcard = generateVCard();
                
                new QRCode(qrcodeContainer, {
                    text: vcard,
                    width: 200,
                    height: 200,
                    colorDark: "#0f0c29",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
                
                qrGenerated = true;
            }
        });

        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRModal();
            }
        });

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize card on page load
        document.addEventListener('DOMContentLoaded', initCard);

        // Keyboard accessibility for card flip
        card.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                card.click();
            }
        });

        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', 'Flip business card to see contact information');
    </script>
</body>
</html>
