<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* Surface */
            --bg-gradient-from: #302b63;
            --bg-gradient-to: #0f0c29;
            --bg-base: #0b0f1a;

            /* Glass layers */
            --card-front-bg: rgba(255, 255, 255, 0.08);
            --card-back-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.18);
            --card-border-hover: rgba(255, 255, 255, 0.28);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --glass-inner-shadow: rgba(255, 255, 255, 0.06);

            /* Accent */
            --accent: #818cf8;
            --accent-soft: rgba(129, 140, 248, 0.16);
            --accent-glow: rgba(129, 140, 248, 0.32);

            /* Text */
            --text-primary: rgba(255, 255, 255, 0.96);
            --text-secondary: rgba(229, 231, 240, 0.72);
            --text-muted: rgba(203, 209, 224, 0.52);
            --text-label: rgba(255, 255, 255, 0.58);

            /* Status */
            --status-online: #6ee7b7;
            --status-online-bg: rgba(110, 231, 183, 0.14);

            /* Shadow */
            --shadow-card: 0 24px 64px rgba(8, 6, 28, 0.48), 0 2px 8px rgba(0, 0, 0, 0.24);

            /* Radii */
            --radius-card: 24px;
            --radius-badge: 20px;
            --radius-button: 12px;
            --radius-icon: 12px;

            /* Motion */
            --ease-glass: cubic-bezier(0.32, 0.72, 0.24, 1);
            --dur-fast: 180ms;
            --dur-base: 240ms;
            --dur-flip: 700ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-from) 0%, var(--bg-gradient-to) 100%);
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(110, 231, 183, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
        }

        .card-wrapper {
            width: 360px;
            height: 220px;
            perspective: 1200px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-glass);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: 24px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-card);
            transition: transform var(--dur-base) var(--ease-glass),
                        border-color var(--dur-base) var(--ease-glass);
        }

        .card-wrapper:hover .card-front {
            left: 0;
            top: 0;
            transform: translateY(-2px) scale(1.005);
            border-color: var(--card-border-hover);
        }
        /* Back face always stays rotated — hover must not override it */
        .card-back {
            transform: rotateY(180deg) !important;
        }
        .card-wrapper:hover .card-inner.flipped .card-back {
            transform: rotateY(180deg) translateY(-2px) scale(1.005) !important;
        }

        .card-front {
            background: var(--card-front-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
        }

        .card-front::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight) 50%, transparent);
            pointer-events: none;
        }

        .card-front::after {
            content: "";
            position: absolute;
            top: -40px;
            right: -40px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            filter: blur(40px);
            opacity: 0.6;
            pointer-events: none;
        }

        .card-back {
            background: var(--card-back-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            transform: rotateY(180deg);
        }

        .card-back::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight) 50%, transparent);
            pointer-events: none;
        }

        .avatar {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: box-shadow var(--dur-base) var(--ease-glass);
        }

        .avatar:hover {
            box-shadow: 0 0 0 2px var(--accent-soft);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 28px;
            right: 24px;
            padding: 6px 12px;
            border-radius: var(--radius-badge);
            background: var(--status-online-bg);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--status-online);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-online);
            box-shadow: 0 0 8px var(--status-online);
            animation: pulse 2400ms ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .name-block {
            position: absolute;
            bottom: 64px;
            left: 24px;
            right: 24px;
        }

        .name {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .title-line {
            font-size: 15px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .title {
            font-weight: 400;
        }

        .divider {
            color: var(--text-muted);
        }

        .company {
            font-weight: 600;
            letter-spacing: -0.005em;
        }

        .btn-glass {
            position: absolute;
            bottom: 20px;
            right: 20px;
            height: 44px;
            padding: 0 18px;
            border-radius: var(--radius-button);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.005em;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-glass),
                        background var(--dur-fast) var(--ease-glass),
                        opacity var(--dur-fast) var(--ease-glass);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-glass:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
        }

        .btn-glass:active {
            transform: scale(0.97);
        }

        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .contact-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: var(--radius-icon);
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 16px;
        }

        .contact-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .contact-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-label);
        }

        .contact-value {
            font-weight: 400;
            font-size: 15px;
            color: var(--text-primary);
            cursor: copy;
            transition: color var(--dur-fast) ease;
            word-break: break-all;
        }

        .contact-value:hover {
            color: var(--accent);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 360px;
            margin: 0 auto;
        }

        .btn-action {
            height: 52px;
            border-radius: var(--radius-button);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.005em;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-glass),
                        box-shadow var(--dur-base) var(--ease-glass),
                        opacity var(--dur-fast) var(--ease-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-action:hover {
            transform: translateY(-1px);
        }

        .btn-action:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #0b0f1a;
            box-shadow: 0 4px 16px rgba(129, 140, 248, 0.24);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .qr-container {
            width: 360px;
            margin: 32px auto 0;
            padding: 24px;
            border-radius: var(--radius-card);
            background: var(--card-front-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .qr-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            letter-spacing: -0.005em;
        }

        #qrcode {
            padding: 16px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode canvas,
        #qrcode img {
            display: block;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 300;
            font-size: 13px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity var(--dur-fast) ease;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 20px;
            border-radius: var(--radius-button);
            background: var(--card-front-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: transform var(--dur-base) var(--ease-glass),
                        opacity var(--dur-base) var(--ease-glass);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .card-wrapper,
            .actions,
            .qr-container {
                width: 100%;
                max-width: 360px;
            }

            .name {
                font-size: 24px;
            }

            .title-line {
                font-size: 14px;
            }
        }

        .icon-svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
        }
    
/* ── MakersCo Spacing Fix ──────────────────────────────────────────────── */
/* Standardised spacing injected post-build to fix cramped layout           */

/* Page breathing room */
body {
  padding: 40px 24px 60px !important;
  min-height: 100vh;
}
@media (max-width: 480px) {
  body { padding: 32px 16px 48px !important; }
}

/* Card centring with consistent gap below */
.card-wrapper,
.card-scene,
.scene {
  margin: 0 auto 28px auto !important;
  max-width: 380px;
}

/* Card face inner padding — never let content touch edges */
.card-face,
.card__face,
.flip-card-face {
  padding: 22px 24px !important;
}

/* Info / contact panel below card */
.info-panel,
.contact-panel,
.card-info,
.back-info,
.detail-panel {
  margin-top: 20px !important;
  padding: 20px 20px !important;
  border-radius: 14px;
}

/* Contact rows inside info panel */
.contact-row,
.info-row,
.detail-row {
  padding: 10px 0 !important;
  gap: 12px !important;
}
.contact-row + .contact-row,
.info-row + .info-row,
.detail-row + .detail-row {
  border-top: 1px solid rgba(255,255,255,0.07);
}

/* Action buttons container */
.actions,
.action-row,
.action-buttons,
.card-actions,
.button-group,
.cta-group,
.btn-group {
  margin-top: 20px !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
}

/* Every button — consistent height and tap target */
.btn,
.cta-btn,
.action-btn,
.wa-btn,
.vcard-btn,
.share-btn,
.copy-btn,
.primary-btn,
.secondary-btn,
button:not(.flip-btn):not([class*="flip"]):not([class*="tab"]) {
  min-height: 48px !important;
  padding: 0 24px !important;
  border-radius: 12px !important;
  font-size: 14px !important;
  font-weight: 600 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;
  width: 100% !important;
  box-sizing: border-box !important;
  cursor: pointer !important;
  text-decoration: none !important;
}

/* Share / secondary row — horizontal pills */
.share-row,
.share-panel,
.share-options {
  display: flex !important;
  gap: 10px !important;
  margin-top: 10px !important;
  flex-wrap: wrap !important;
}
.share-row .btn,
.share-panel .btn,
.share-options .btn {
  flex: 1 !important;
  min-width: 80px !important;
  min-height: 44px !important;
  padding: 0 12px !important;
  font-size: 13px !important;
}

/* Flip hint text */
.flip-hint,
.card__flip-hint,
.flip-indicator,
.tap-hint {
  text-align: center !important;
  font-size: 11px !important;
  opacity: 0.5 !important;
  margin-top: 8px !important;
  margin-bottom: 4px !important;
  letter-spacing: 0.5px !important;
}

/* Section labels / headings */
.section-label,
.panel-title,
.section-title {
  font-size: 11px !important;
  text-transform: uppercase !important;
  letter-spacing: 1px !important;
  opacity: 0.5 !important;
  margin-bottom: 12px !important;
}

/* ── End MakersCo Spacing Fix ─────────────────────────────────────────── */

/* ── Glassmorphism front + back compact fix ──────────────────────────────── */
/* Front face: name 28px is too large for 220px card — scale down */
.card-front .name {
  font-size: 20px !important;
  line-height: 1.2 !important;
  margin-bottom: 2px !important;
}
.card-front .title-line {
  font-size: 12px !important;
  gap: 5px !important;
}
/* Move name-block up slightly so Flip button has clear space */
.card-front .name-block {
  bottom: 60px !important;
}
/* Flip button: keep absolute position but tighter */
#flipBtn.btn-glass {
  height: 32px !important;
  min-height: 32px !important;
  padding: 0 14px !important;
  font-size: 12px !important;
  width: auto !important;
  bottom: 16px !important;
  right: 16px !important;
}

/* ── Glassmorphism card-back compact fix ──────────────────────────────── */
/* Card faces must clip overflow — prevents content poking outside the card */
.card-face {
  overflow: hidden !important;
}

/* Back face: flex column so content + button share space properly */
.card-back {
  display: flex !important;
  flex-direction: column !important;
  justify-content: space-between !important;
  padding: 16px 20px !important;
}

/* Compact the contact section inside the card */
.card-back .contact-section {
  display: flex !important;
  flex-direction: column !important;
  gap: 6px !important;
  flex: 1 !important;
  justify-content: center !important;
}
.card-back .contact-row {
  padding: 5px 0 !important;
  padding-bottom: 0 !important;
  border-bottom: none !important;
  gap: 10px !important;
  align-items: center !important;
}
.card-back .contact-icon {
  width: 26px !important;
  height: 26px !important;
  flex-shrink: 0 !important;
}
.card-back .contact-icon svg {
  width: 13px !important;
  height: 13px !important;
}
.card-back .contact-label {
  font-size: 8px !important;
  line-height: 1.2 !important;
}
.card-back .contact-value {
  font-size: 11px !important;
  line-height: 1.3 !important;
}

/* Back button: remove absolute position, sit at bottom of flex column */
#backBtn.btn-glass {
  position: relative !important;
  bottom: auto !important;
  right: auto !important;
  top: auto !important;
  left: auto !important;
  align-self: flex-end !important;
  height: 30px !important;
  min-height: 30px !important;
  padding: 0 14px !important;
  font-size: 12px !important;
  width: auto !important;
  flex-shrink: 0 !important;
}
/* ── End glassmorphism card-back fix ──────────────────────────────────── */


/* ── Phase 4 Extras ─────────────────────────────────────────────────────── */
.extras-section{width:340px;margin:10px auto 0;display:flex;flex-direction:column;gap:9px}
.social-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:4px 0}
.social-btn{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;border:none;cursor:pointer;
  transition:transform .15s,opacity .15s;flex-shrink:0;
}
.social-btn:hover{transform:translateY(-2px);opacity:.85}
.social-btn svg{width:18px;height:18px;flex-shrink:0}
.extra-btn{
  width:100%;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:13px;font-weight:600;
  text-decoration:none;cursor:pointer;border:none;
  transition:transform .15s,opacity .15s;
}
.extra-btn:hover{transform:translateY(-1px);opacity:.9}
.extra-btn:active{transform:scale(.98)}
/* ── End Phase 4 Extras ──────────────────────────────────────────────────── */
</style>
</head>

                    </div>

                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                        </svg>
                    </button>

                <div class="card-face card-back">

                        <div class="contact-row">

        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#818cf8",
            whatsapp_message: "Hi Faris, I found your digital card!",
            social: {
                linkedin:  "https://linkedin.com/in/",
                instagram: "https://instagram.com/",
                twitter:   ""
            },
            custom_links: [
                { icon: "🌐", label: "Visit Website", url: "https://pixelreka.com.my" }
            ],
            booking_url: "",
            maps_url:    ""
        };
        window.CONFIG = CONFIG;

        // Initialize display
        document.getElementById('nameDisplay').textContent = CONFIG.name;
        document.getElementById('titleDisplay').textContent = CONFIG.title;
        document.getElementById('companyDisplay').textContent = CONFIG.company;
        document.getElementById('phoneDisplay').textContent = CONFIG.phone;
        document.getElementById('emailDisplay').textContent = CONFIG.email;
        document.getElementById('websiteDisplay').textContent = CONFIG.website.replace('https://', '').replace('http://', '');

        // Card flip functionality
        const cardInner = document.getElementById('cardInner');
        const flipBtn = document.getElementById('flipBtn');
        const backBtn = document.getElementById('backBtn');
        const cardWrapper = document.getElementById('cardWrapper');

        function flipCard() {
            cardInner.classList.toggle('flipped');
        }

        flipBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            flipCard();
        });

        backBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            flipCard();
        });

        cardWrapper.addEventListener('click', (e) => {
            if (e.target === cardWrapper || e.target.closest('.card-face')) {
                flipCard();
            }
        });

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Copy to clipboard functionality
        document.querySelectorAll('[data-copy]').forEach(element => {
            element.addEventListener('click', () => {
                const text = element.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(() => {
                    showToast('Failed to copy');
                });
            });
        });

        // Generate vCard
        function generateVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TITLE:${CONFIG.title}
ORG:${CONFIG.company}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location}
NOTE:${CONFIG.bio}
END:VCARD`;
            return vcard;
        }

        // Save contact button
        document.getElementById('saveContactBtn').addEventListener('click', () => {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved!');
        });

        // WhatsApp button
        document.getElementById('whatsappBtn').addEventListener('click', () => {
            const phoneNumber = CONFIG.phone.replace(/\D/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });

        // Copy link button
        document.getElementById('copyLinkBtn').addEventListener('click', () => {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy link');
            });
        });

        // Share button
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `${CONFIG.name} - Digital Business Card`,
                        text: `Connect with ${CONFIG.name}, ${CONFIG.title} at ${CONFIG.company}`,
                        url: window.location.href
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showToast('Share failed');
                    }
                }
            } else {
                const currentUrl = window.location.href;
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast('Link copied! Share it with others.');
                });
            }
        });

        // Generate QR code
        window.addEventListener('load', () => {
            const qrcodeContainer = document.getElementById('qrcode');
            const vcard = generateVCard();
            
            new QRCode(qrcodeContainer, {
                text: vcard,
                width: 160,
                height: 160,
                colorDark: "#0b0f1a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });

        // Update CSS custom property for accent color
        if (CONFIG.color) {
            const root = document.documentElement;
            const r = parseInt(CONFIG.color.slice(1, 3), 16);
            const g = parseInt(CONFIG.color.slice(3, 5), 16);
            const b = parseInt(CONFIG.color.slice(5, 7), 16);
            
            root.style.setProperty('--accent', CONFIG.color);
            root.style.setProperty('--accent-soft', `rgba(${r}, ${g}, ${b}, 0.16)`);
            root.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.32)`);
        }
    </script>

  function hexToRgb(hex) {
    var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [99,102,241];

      a.className = 'extra-btn';

    if (hasBooking) {
      var ab = document.createElement('a');
      ab.href = booking;
      ab.target = '_blank';
      ab.rel = 'noopener noreferrer';
      ab.className = 'extra-btn';
      ab.style.cssText = 'background:'+accentRgba+'0.12);border:1px solid '+accentRgba+'0.3);color:'+accent+';font-family:inherit;';

    if (hasLoc) {

      al.href = mapsUrl;
      al.target = '_blank';
      al.rel = 'noopener noreferrer';

      al.style.cssText = 'background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;font-family:inherit;';
      al.innerHTML = '<span style="font-size:16px">📍</span> ' + location;
      section.appendChild(al);
    }

    // Insert: find .qr-section and insert before it, or append to body
    var qr = document.querySelector('.qr-section');
    if (qr) {
      qr.parentNode.insertBefore(section, qr);
    } else {
      document.body.appendChild(section);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildSection);
  } else {
    buildSection();
  }
})();
</script>
<!-- End Phase 4 Extras -->

<script>
/* MakersCo: Make contact values tappable */
(function(){
  var C = window.CONFIG || {};
  function linkify(id, href, text) {
    var el = document.getElementById(id);
    if (!el || !href) return;
    el.innerHTML = '<a href="' + href + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + (text || el.textContent) + '</a>';
  }
  document.addEventListener('DOMContentLoaded', function(){
    if (C.phone) {
      linkify('phoneDisplay', 'tel:' + C.phone.replace(/\D/g,''));
    }
    if (C.email) {
      linkify('emailDisplay', 'mailto:' + C.email);
    }
    if (C.website) {
      var url = C.website.startsWith('http') ? C.website : 'https://' + C.website;
      linkify('websiteDisplay', url);
    }
    if (C.location) {
      linkify('locationDisplay', 'https://maps.google.com/?q=' + encodeURIComponent(C.location));
    }
  });
})();
</script>
