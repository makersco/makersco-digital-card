<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Glassmorphism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(ellipse at 50% 0%, #302b63, #0f0c29);
            --bg-base: #0f0c29;
            --card-front-bg: rgba(255, 255, 255, 0.08);
            --card-back-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.18);
            --card-border-hover: rgba(255, 255, 255, 0.28);
            --accent: #818cf8;
            --accent-soft: rgba(129, 140, 248, 0.16);
            --accent-ring: rgba(129, 140, 248, 0.32);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(245, 245, 247, 0.72);
            --text-muted: rgba(245, 245, 247, 0.52);
            --divider: rgba(255, 255, 255, 0.10);
            --shadow-card: 0 24px 48px -12px rgba(15, 12, 41, 0.64);
            --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.12);
            --blur-card: 24px;
            --radius-card: 24px;
            --radius-pill: 20px;
            --radius-btn: 12px;
            --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-spring: cubic-bezier(0.34, 1.32, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-base);
            z-index: -2;
        }

        .orb {
            position: fixed;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: -1;
            will-change: transform;
            animation: drift 18s var(--ease-out) infinite alternate;
        }

        .orb-1 {
            background: var(--accent);
            opacity: 0.22;
            top: 20%;
            left: 15%;
        }

        .orb-2 {
            background: #e0aaff;
            opacity: 0.14;
            bottom: 25%;
            right: 20%;
            animation-delay: -8s;
            animation-duration: 22s;
        }

        @keyframes drift {
            to {
                transform: translate3d(12px, -8px, 0);
            }
        }

        .card-wrapper {
            width: 360px;
            height: 560px;
            perspective: 1000px;
            margin-bottom: 32px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 400px;
                height: 600px;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 280ms var(--ease-out);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: 32px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-card), var(--shadow-inner);
            backdrop-filter: blur(var(--blur-card)) saturate(140%);
            will-change: transform;
            transition: transform 200ms var(--ease-out), border-color 200ms var(--ease-out);
        }

        .card-wrapper:hover .card-face {
            border-color: var(--card-border-hover);
        }

        .card-front {
            background: var(--card-front-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-back {
            background: var(--card-back-bg);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 56px;
        }

        .status-badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: var(--radius-pill);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .logo {
            width: 28px;
            height: 28px;
            opacity: 0.72;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            box-shadow: 0 0 0 2px var(--accent-ring), 0 8px 24px rgba(0, 0, 0, 0.32);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 4px;
        }

        .job-title {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 8px;
        }

        .company {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--accent);
            text-align: center;
            margin-bottom: 24px;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--divider);
            margin-bottom: 24px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-bottom: auto;
        }

        .btn {
            flex: 1;
            height: 44px;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
            border: 0;
            cursor: pointer;
            transition: transform 160ms var(--ease-out), opacity 160ms var(--ease-out);
            font-family: 'DM Sans', sans-serif;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-base);
            box-shadow: 0 8px 20px -8px var(--accent-ring), inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }

        .flip-hint {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .contact-row {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 200ms var(--ease-out), opacity 200ms var(--ease-out);
            cursor: pointer;
        }

        .contact-row:hover {
            transform: translateX(2px);
            background: rgba(255, 255, 255, 0.06);
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-soft);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-icon svg {
            width: 20px;
            height: 20px;
            color: var(--accent);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .contact-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            word-break: break-all;
        }

        .social-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: auto;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-btn);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 160ms var(--ease-out), opacity 160ms var(--ease-out);
        }

        .social-btn:hover {
            transform: translateY(-1px);
        }

        .social-btn:active {
            transform: scale(0.97);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            transition: color 160ms var(--ease-out);
        }

        .social-btn:hover svg {
            color: var(--accent);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .action-btn {
            width: 100%;
            height: 56px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-btn);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 160ms var(--ease-out), background 160ms var(--ease-out);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn:active {
            transform: scale(0.99);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 12, 41, 0.92);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }

        .qr-modal.active {
            display: flex;
        }

        .qr-content {
            background: var(--card-front-bg);
            backdrop-filter: blur(var(--blur-card)) saturate(140%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-card);
            padding: 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-card), var(--shadow-inner);
        }

        .qr-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .qr-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .qr-subtitle {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .qr-code-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .qr-close {
            width: 100%;
            height: 44px;
            background: var(--accent);
            color: var(--bg-base);
            border: 0;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: transform 160ms var(--ease-out);
        }

        .qr-close:hover {
            transform: translateY(-1px);
        }

        .qr-close:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .card-wrapper {
                width: 100%;
                max-width: 360px;
            }

            .actions {
                width: 100%;
            }
        }
    </style>
</head>

                    <button class="social-btn" onclick="window.open('https://github.com', '_blank')" title="GitHub">

                            <path d="M9 19C4 20.5 4 16.5 2 16M16 22V18.13C16.0375 17.6532 15.9731 17.1738 15.811 16.7238C15.6489 16.2738 15.3929 15.8634 15.06 15.52C18.2 15.17 21.5 13.98 21.5 8.52C21.4997 7.12383 20.9627 5.7812 20 4.77C20.4559 3.54851 20.4236 2.19835 19.91 1C19.91 1 18.73 0.65 16 2.48C13.708 1.85882 11.292 1.85882 9 2.48C6.27 0.65 5.09 1 5.09 1C4.57638 2.19835 4.54414 3.54851 5 4.77C4.03013 5.7887 3.49252 7.14346 3.5 8.55C3.5 13.97 6.8 15.16 9.94 15.55C9.611 15.89 9.35726 16.2954 9.19531 16.7399C9.03335 17.1844 8.96681 17.6581 9 18.13V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="action-btn" onclick="openWhatsApp()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382C17.015 14.153 14.98 13.154 14.574 13.006C14.168 12.858 13.874 12.784 13.58 13.241C13.286 13.698 12.514 14.635 12.252 14.929C11.99 15.223 11.728 15.262 11.271 15.033C10.814 14.804 9.336 14.331 7.588 12.774C6.234 11.561 5.321 10.066 5.059 9.609C4.797 9.152 5.031 8.908 5.26 8.679C5.467 8.472 5.717 8.143 5.946 7.881C6.175 7.619 6.249 7.425 6.397 7.131C6.545 6.837 6.471 6.575 6.357 6.346C6.243 6.117 5.331 4.082 4.963 3.168C4.595 2.254 4.227 2.37 3.971 2.358C3.715 2.346 3.421 2.346 3.127 2.346C2.833 2.346 2.376 2.46 1.97 2.917C1.564 3.374 0.487 4.373 0.487 6.408C0.487 8.443 1.993 10.401 2.222 10.695C2.451 10.989 5.321 15.233 9.55 17.013C13.779 18.793 13.779 18.183 14.574 18.106C15.369 18.029 17.015 17.091 17.345 16.114C17.675 15.137 17.675 14.304 17.561 14.114C17.447 13.924 17.153 13.81 16.696 13.581" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20.52 3.44901C18.245 1.17401 15.24 -0.0759888 12.03 -0.0759888C5.42 -0.0759888 0.03 5.31401 0.03 11.924C0.03 13.994 0.59 16.024 1.66 17.804L0 23.924L6.24 22.294C7.97 23.274 9.98 23.794 12.03 23.794C18.64 23.794 24.03 18.534 24.03 11.924C24.03 8.71401 22.78 5.72401 20.52 3.44901Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Message on WhatsApp
        </button>
        
        <button class="action-btn" onclick="copyLink()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 13C10.4295 13.5741 10.9774 14.0491 11.6066 14.3929C12.2357 14.7367 12.9315 14.9411 13.6467 14.9923C14.3618 15.0435 15.0796 14.9403 15.7513 14.6897C16.4231 14.4392 17.0331 14.047 17.54 13.54L20.54 10.54C21.4508 9.59695 21.9548 8.33394 21.9434 7.02296C21.932 5.71198 21.4061 4.45791 20.4791 3.53087C19.5521 2.60383 18.298 2.07799 16.987 2.0666C15.676 2.0552 14.413 2.55918 13.47 3.46997L11.75 5.17997" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <button class="action-btn" onclick="shareCard()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <div class="qr-header">
                <div class="qr-title">Scan to Save Contact</div>
                <div class="qr-subtitle">Scan with your camera to add this contact</div>
            </div>
            <div class="qr-code-container" id="qrCode"></div>
            <button class="qr-close" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#818cf8",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');
        let isFlipped = false;

        cardWrapper.addEventListener('click', function(e) {
            if (e.target.closest('.btn') || e.target.closest('.contact-row') || e.target.closest('.social-btn')) {
                return;
            }
            
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('flipped');
            } else {
                cardInner.classList.remove('flipped');
            }
        });

        function handleConnect(event) {
            event.stopPropagation();
            const qrModal = document.getElementById('qrModal');
            const qrCode = document.getElementById('qrCode');
            
            qrCode.innerHTML = '';
            
            const vCardData = generateVCard();
            
            new QRCode(qrCode, {
                text: vCardData,
                width: 256,
                height: 256,
                colorDark: "#0f0c29",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            qrModal.classList.add('active');
        }

        function handleSave(event) {
            event.stopPropagation();
            downloadVCard();
        }

        function generateVCard() {
            const vCard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=WORK,VOICE:${CONFIG.phone}`,
                `EMAIL;TYPE=INTERNET:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location}`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vCard;
        }

        function downloadVCard() {
            const vCardData = generateVCard();
            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showNotification('Contact saved successfully!');
        }

        function openWhatsApp() {
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phone = CONFIG.phone.replace(/\+/g, '').replace(/\s/g, '');
            const url = `https://wa.me/${phone}?text=${message}`;
            window.open(url, '_blank');
        }

        function copyLink() {
            const currentUrl = window.location.href;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showNotification('Link copied to clipboard!');
                }).catch(() => {
                    fallbackCopy(currentUrl);
                });
            } else {
                fallbackCopy(currentUrl);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showNotification('Link copied to clipboard!');
            } catch (err) {
                showNotification('Failed to copy link');
            }
            
            document.body.removeChild(textArea);
        }

        function shareCard() {
            const shareData = {
                title: CONFIG.name,
                text: `${CONFIG.name} - ${CONFIG.title} at ${CONFIG.company}`,
                url: window.location.href
            };
            
            if (navigator.share) {
                navigator.share(shareData).catch(() => {
                    copyLink();
                });
            } else {
                copyLink();
            }
        }

        function copyToClipboard(text, label) {
            event.stopPropagation();
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showNotification(`${label} copied to clipboard!`);
                }).catch(() => {
                    fallbackCopy(text);
                    showNotification(`${label} copied to clipboard!`);
                });
            } else {
                fallbackCopy(text);
                showNotification(`${label} copied to clipboard!`);
            }
        }

        function closeQR() {
            const qrModal = document.getElementById('qrModal');
            qrModal.classList.remove('active');
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 32px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--card-front-bg);
                backdrop-filter: blur(var(--blur-card)) saturate(140%);
                border: 1px solid var(--card-border);
                color: var(--text-primary);
                padding: 16px 24px;
                border-radius: var(--radius-btn);
                font-size: 14px;
                font-weight: 600;
                box-shadow: var(--shadow-card), var(--shadow-inner);
                z-index: 2000;
                animation: slideUp 0.3s var(--ease-out);
            `;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from {
                        opacity: 0;
                        transform: translateX(-50%) translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateX(-50%) translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s var(--ease-out) forwards';
                const fadeStyle = document.createElement('style');
                fadeStyle.textContent = `
                    @keyframes slideDown {
                        to {
                            opacity: 0;
                            transform: translateX(-50%) translateY(20px);
                        }
                    }
                `;
                document.head.appendChild(fadeStyle);
                
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 2500);
        }

        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQR();
            }
        });

        const avatar = document.getElementById('avatar');
        const nameParts = CONFIG.name.split(' ');
        if (nameParts.length >= 2) {
            avatar.textContent = nameParts[0][0] + nameParts[1][0];
        } else if (nameParts.length === 1) {
            avatar.textContent = nameParts[0].substring(0, 2).toUpperCase();
        }
    </script>
</body>
</html>
