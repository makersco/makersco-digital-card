<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(ellipse at 50% 0%, #302b63, #0f0c29);
            --bg-base: #0f0c29;
            --card-front-bg: rgba(255, 255, 255, 0.08);
            --card-back-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.18);
            --card-border-hover: rgba(255, 255, 255, 0.28);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --inner-stroke: rgba(255, 255, 255, 0.06);
            --accent: #818cf8;
            --accent-soft: #a5b4fc;
            --accent-glow: rgba(129, 140, 248, 0.28);
            --text-primary: #f5f3ff;
            --text-secondary: rgba(245, 243, 255, 0.72);
            --text-tertiary: rgba(245, 243, 255, 0.48);
            --label: rgba(245, 243, 255, 0.56);
            --blur: 24px;
            --radius-card: 24px;
            --radius-chip: 20px;
            --radius-button: 12px;
            --shadow-card: 0 24px 64px rgba(15, 12, 41, 0.48), inset 0 1px 0 var(--glass-highlight);
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
            --dur-fast: 160ms;
            --dur-base: 240ms;
            --dur-flip: 700ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "DM Sans", sans-serif;
            background: var(--bg-base);
            background-image: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .floating-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--accent-glow);
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            animation: orb-drift 12s var(--ease-in-out) infinite alternate;
            z-index: 0;
        }

        @keyframes orb-drift {
            0% { transform: translate3d(-50%, -50%, 0); }
            100% { transform: translate3d(-30%, -60%, 0); }
        }

        .card-wrapper {
            width: 320px;
            height: 480px;
            perspective: 1600px;
            margin: 40px auto;
            cursor: pointer;
            position: relative;
            z-index: 1;
            animation: card-entry 280ms var(--ease-out) backwards;
        }

        @keyframes card-entry {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 360px;
                height: 520px;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-in-out);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-card);
            transition: transform var(--dur-base) var(--ease-out);
        }

        .card-wrapper:hover .card-face {
            transform: translateY(-4px) scale(1.005);
        }

        .card-front {
            background: var(--card-front-bg);
            backdrop-filter: blur(var(--blur)) saturate(140%);
        }

        .card-front::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
            border-radius: var(--radius-card) var(--radius-card) 0 0;
            pointer-events: none;
        }

        .card-front::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: conic-gradient(from 140deg at 50% 50%,
                rgba(255, 255, 255, 0.32),
                rgba(129, 140, 248, 0.18),
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.32));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.9;
        }

        .card-back {
            background: var(--card-back-bg);
            backdrop-filter: blur(var(--blur)) saturate(140%);
            transform: rotateY(180deg);
        }

        .card-back::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: conic-gradient(from 140deg at 50% 50%,
                rgba(255, 255, 255, 0.32),
                rgba(129, 140, 248, 0.18),
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.32));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.9;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .brand-mark {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: var(--text-primary);
        }

        .status-badge {
            border-radius: var(--radius-chip);
            padding: 2px 10px;
            font: 700 11px/1.6 "DM Sans";
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: rgba(129, 140, 248, 0.14);
            border: 1px solid rgba(129, 140, 248, 0.32);
            color: var(--accent-soft);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 1600ms var(--ease-in-out) infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .avatar-container {
            margin-top: 72px;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            box-shadow: 0 0 0 6px rgba(129, 140, 248, 0.10);
            object-fit: cover;
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.4), rgba(165, 180, 252, 0.2));
        }

        .card-content {
            margin-top: 24px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        @media (min-width: 768px) {
            .name {
                font-size: 32px;
            }
        }

        .title {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        @media (min-width: 768px) {
            .title {
                font-size: 15px;
            }
        }

        .company {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--accent);
        }

        @media (min-width: 768px) {
            .company {
                font-size: 14px;
            }
        }

        .divider {
            height: 1px;
            width: 64px;
            background: rgba(255, 255, 255, 0.24);
            margin: 32px auto 24px;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 16px;
            background: var(--glass-highlight);
            border: 1px solid var(--inner-stroke);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .flip-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--label);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--label);
            margin-bottom: 16px;
        }

        .hairline {
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 16px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .contact-row {
            min-height: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: background var(--dur-fast) var(--ease-out);
        }

        .contact-row::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: rgba(255, 255, 255, 0.04);
            opacity: 0;
            transition: opacity var(--dur-fast) var(--ease-out);
        }

        .contact-row:hover::before {
            opacity: 1;
        }

        .contact-icon {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 10px;
            background: var(--glass-highlight);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            stroke-width: 1.5px;
            fill: none;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            position: relative;
            z-index: 1;
        }

        .button {
            flex: 1;
            height: 48px;
            padding: 0 20px;
            border-radius: var(--radius-button);
            font: 600 14px/1 "DM Sans";
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-base) var(--ease-out),
                        background var(--dur-base) var(--ease-out),
                        border-color var(--dur-base) var(--ease-out);
        }

        .button:active {
            transform: scale(0.97);
        }

        .button-primary {
            background: linear-gradient(180deg, rgba(129, 140, 248, 0.95), rgba(129, 140, 248, 0.78));
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 8px 24px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.24);
            color: #f5f3ff;
        }

        .button-primary:hover {
            box-shadow: 0 10px 28px rgba(129, 140, 248, 0.40), inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .button-ghost {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            color: var(--text-primary);
        }

        .button-ghost:hover {
            border-color: var(--card-border-hover);
            background: rgba(255, 255, 255, 0.10);
        }

        .actions-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }

        .action-button {
            flex: 1;
            height: 48px;
            padding: 0 20px;
            border-radius: var(--radius-button);
            font: 600 14px/1 "DM Sans";
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform var(--dur-fast) var(--ease-out),
                        background var(--dur-base) var(--ease-out),
                        border-color var(--dur-base) var(--ease-out);
            text-decoration: none;
        }

        .action-button:hover {
            border-color: var(--card-border-hover);
            background: rgba(255, 255, 255, 0.10);
        }

        .action-button:active {
            transform: scale(0.97);
        }

        .action-button svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            stroke-width: 1.5px;
            fill: none;
        }

        .qr-container {
            width: 160px;
            height: 160px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(15, 12, 41, 0.32);
        }

        #qrcode {
            width: 100%;
            height: 100%;
        }

        #qrcode canvas,
        #qrcode img {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0ms !important;
                transition-duration: 0ms !important;
            }
            
            .card-inner {
                transition-duration: 200ms !important;
            }
        }

        @media (max-width: 767px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .action-button {
                width: 100%;
            }
        }
    </style>
</head>

        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",

            bio: "Building digital solutions for Malaysian SMEs",

            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');

        cardWrapper.addEventListener('click', function(e) {
            if (!e.target.closest('a') && !e.target.closest('button')) {
                cardInner.classList.toggle('flipped');
            }
        });

        const currentUrl = window.location.href;
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 136,
            height: 136,
            colorDark: "#0f0c29",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generateVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
N:${CONFIG.name.split(' ').reverse().join(';')};;;
ORG:${CONFIG.company}
TITLE:${CONFIG.title}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        document.getElementById('saveContactBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            generateVCard();
        });

        document.getElementById('shareBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            if (navigator.share) {
                navigator.share({
                    title: `${CONFIG.name} - ${CONFIG.title}`,
                    text: `Check out ${CONFIG.name}'s digital business card`,
                    url: window.location.href
                }).catch(err => console.log('Error sharing:', err));
            } else {
                copyToClipboard(window.location.href);
                alert('Link copied to clipboard!');
            }
        });

        document.getElementById('whatsappBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const message = encodeURIComponent(CONFIG.whatsapp_message + ' ' + window.location.href);
            const whatsappUrl = `https://wa.me/${CONFIG.phone.replace(/\D/g, '')}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });

        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            copyToClipboard(window.location.href);
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;stroke-width:1.5px;fill:none;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        });

        document.getElementById('nativeShareBtn').addEventListener('click', function() {
            if (navigator.share) {
                navigator.share({
                    title: `${CONFIG.name} - ${CONFIG.title}`,
                    text: `Check out ${CONFIG.name}'s digital business card`,
                    url: window.location.href
                }).catch(err => console.log('Error sharing:', err));
            } else {
                copyToClipboard(window.location.href);
                const btn = this;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;stroke-width:1.5px;fill:none;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            }
        });

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        document.querySelectorAll('.contact-row, .button, .action-button').forEach(element => {
            element.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    </script>
</body>
</html>
