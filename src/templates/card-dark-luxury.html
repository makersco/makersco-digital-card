<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #0a0a0a;
            --card-front: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            --card-back: #111111;
            --card-border: rgba(201, 169, 98, 0.27);
            --card-border-hov: rgba(201, 169, 98, 0.42);
            --accent: #C9A962;
            --accent-soft: rgba(201, 169, 98, 0.12);
            --accent-line: rgba(201, 169, 98, 0.20);
            --accent-deep: #A88A48;
            --ink-primary: #F5F1E8;
            --ink-secondary: #B8B0A0;
            --ink-muted: #6E6862;
            --ink-divider: rgba(245, 241, 232, 0.08);
            --status-available: #8FA88A;
            --status-available-bg: rgba(143, 168, 138, 0.14);
            --shadow-card: 0 24px 48px -12px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(201, 169, 98, 0.06) inset;
            --shadow-hover: 0 32px 64px -16px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(201, 169, 98, 0.12) inset;
            --ease-luxe: cubic-bezier(0.22, 0.61, 0.36, 1);
            --dur-flip: 280ms;
            --dur-micro: 180ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-page);
            color: var(--ink-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card-wrapper {
            width: 340px;
            height: 540px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 380px;
                height: 600px;
            }
        }

        .card-shell {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-luxe);
        }

        .card-shell.flipped {
            transform: rotateY(180deg);
        }

        @media (hover: hover) {
            .card-wrapper:hover .card-shell:not(.flipped) {
                transform: translateY(-2px);
                transition: transform var(--dur-micro) var(--ease-luxe);
            }
            
            .card-wrapper:hover .card-shell.flipped {
                transform: rotateY(180deg) translateY(-2px);
                transition: transform var(--dur-micro) var(--ease-luxe);
            }
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: box-shadow var(--dur-micro) var(--ease-luxe);
        }

        @media (hover: hover) {
            .card-wrapper:hover .card-face {
                box-shadow: var(--shadow-hover);
            }
        }

        .card-face::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            border: 1px solid var(--card-border);
            pointer-events: none;
            transition: border-color var(--dur-micro) var(--ease-luxe);
        }

        @media (hover: hover) {
            .card-wrapper:hover .card-face::before {
                border-color: var(--card-border-hov);
            }
        }

        .card-front {
            background: var(--card-front);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--card-back);
            padding: 28px;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .monogram {
            width: 32px;
            height: 32px;
            border: 1px solid var(--accent-line);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: auto;
        }

        .identity-block {
            margin-top: auto;
        }

        .identity-hairline {
            width: 32px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 20px;
        }

        .name {
            font-weight: 300;
            font-size: 28px;
            letter-spacing: -0.02em;
            color: var(--ink-primary);
            margin-bottom: 6px;
            line-height: 1.1;
        }

        @media (min-width: 768px) {
            .name {
                font-size: 34px;
            }
        }

        .title {
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }

        @media (min-width: 768px) {
            .title {
                font-size: 14px;
            }
        }

        .company {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--ink-secondary);
        }

        @media (min-width: 768px) {
            .company {
                font-size: 12px;
            }
        }

        .corner-mark {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 16px;
            height: 16px;
        }

        .corner-mark::before,
        .corner-mark::after {
            content: '';
            position: absolute;
            background: var(--accent);
        }

        .corner-mark::before {
            bottom: 0;
            right: 0;
            width: 16px;
            height: 1px;
        }

        .corner-mark::after {
            bottom: 0;
            right: 0;
            width: 1px;
            height: 16px;
        }

        .section-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        @media (min-width: 768px) {
            .section-label {
                font-size: 11px;
            }
        }

        .section-hairline {
            width: 24px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 16px;
        }

        .contact-section {
            margin-bottom: 24px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 72px 1fr;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px solid var(--ink-divider);
            gap: 16px;
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row .label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .contact-row .value {
            font-weight: 400;
            font-size: 14px;
            color: var(--ink-primary);
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .contact-row .value {
                font-size: 15px;
            }
        }

        .contact-row .value a {
            color: var(--ink-primary);
            text-decoration: none;
            transition: color var(--dur-micro) var(--ease-luxe);
        }

        .contact-row .value a:hover {
            color: var(--accent);
        }

        .bar-section {
            margin-bottom: 24px;
        }

        .bar-number {
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 0.10em;
            color: var(--ink-secondary);
            margin-top: 8px;
        }

        @media (min-width: 768px) {
            .bar-number {
                font-size: 12px;
            }
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-top: auto;
            margin-bottom: 16px;
        }

        .qr-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 8px;
        }

        .qr-container {
            border: 1px solid var(--accent-line);
            border-radius: 2px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.95);
        }

        #qrcode {
            width: 64px;
            height: 64px;
        }

        #qrcode img {
            width: 100%;
            height: 100%;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding: 14px 24px;
            border-radius: 4px;
            min-height: 44px;
            cursor: pointer;
            transition: background var(--dur-micro) var(--ease-luxe),
                        border-color var(--dur-micro) var(--ease-luxe),
                        transform 120ms var(--ease-luxe);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0a;
            border: 0;
        }

        .btn-primary:hover {
            background: var(--accent-deep);
        }

        .btn-ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent-line);
        }

        .btn-ghost:hover {
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 380px;
        }

        .action-btn {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding: 14px 24px;
            border-radius: 4px;
            min-height: 44px;
            cursor: pointer;
            transition: background var(--dur-micro) var(--ease-luxe),
                        border-color var(--dur-micro) var(--ease-luxe),
                        transform 120ms var(--ease-luxe);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: transparent;
            border: 1px solid var(--accent-line);
            color: var(--accent);
        }

        .action-btn:hover {
            border-color: var(--accent);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .actions {
                flex-direction: row;
                justify-content: center;
            }
            
            .action-btn {
                flex: 1;
                max-width: 180px;
            }
        }

        .badge {
            border-radius: 20px;
            padding: 2px 10px;
            font-weight: 700;
            font-size: 9px;
            line-height: 1.6;
            letter-spacing: 0.20em;
            text-transform: uppercase;
            background: var(--status-available-bg);
            color: var(--status-available);
            display: inline-block;
            margin-top: 8px;
        }

        .tap-hint {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--ink-muted);
            text-align: center;
            margin-top: 16px;
            opacity: 0.6;
        }

        @media (min-width: 768px) {
            .tap-hint {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="card-wrapper" id="cardWrapper">
        <div class="card-shell" id="cardShell">
            <div class="card-face card-front">
                <div class="monogram" id="monogram">AF</div>
                
                <div class="identity-block">
                    <div class="identity-hairline"></div>
                    <div class="name" id="cardName">Ahmad Faris bin Razak</div>
                    <div class="title" id="cardTitle">Founder & CEO</div>
                    <div class="company" id="cardCompany">Pixel Reka Sdn Bhd</div>
                </div>

                <div class="corner-mark"></div>
            </div>

            <div class="card-face card-back">
                <div class="contact-section">
                    <div class="section-label">Contact</div>
                    <div class="section-hairline"></div>
                    
                    <div class="contact-row">
                        <div class="label">Direct</div>
                        <div class="value"><a href="#" id="phoneLink">+60 12 345 6789</a></div>
                    </div>
                    
                    <div class="contact-row">
                        <div class="label">Email</div>
                        <div class="value"><a href="#" id="emailLink">faris@pixelreka.com.my</a></div>
                    </div>
                    
                    <div class="contact-row">
                        <div class="label">Website</div>
                        <div class="value"><a href="#" id="websiteLink" target="_blank">pixelreka.com.my</a></div>
                    </div>
                    
                    <div class="contact-row">
                        <div class="label">Office</div>
                        <div class="value" id="location">Kuala Lumpur, Malaysia</div>
                    </div>
                </div>

                <div class="bar-section">
                    <div class="section-label">About</div>
                    <div class="section-hairline"></div>
                    <div class="bar-number" id="bio">Building digital solutions for Malaysian SMEs</div>
                </div>

                <div class="qr-section">
                    <div class="qr-label">Scan</div>
                    <div class="qr-container">
                        <div id="qrcode"></div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" id="saveContactBtn">Save Contact</button>
                    <button class="btn btn-ghost" id="flipBackBtn">Back</button>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <a href="#" class="action-btn" id="whatsappBtn">WhatsApp</a>
        <button class="action-btn" id="copyLinkBtn">Copy Link</button>
        <button class="action-btn" id="shareBtn">Share</button>
    </div>

    <div class="tap-hint">Tap card to flip</div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#C9A962",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        // Generate monogram from name
        function generateMonogram(name) {
            const parts = name.split(' ').filter(p => p.length > 0);
            if (parts.length >= 2) {
                return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        }

        // Initialize card content
        function initializeCard() {
            document.getElementById('monogram').textContent = generateMonogram(CONFIG.name);
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            
            const phoneLink = document.getElementById('phoneLink');
            phoneLink.textContent = CONFIG.phone;
            phoneLink.href = `tel:${CONFIG.phone.replace(/\s/g, '')}`;
            
            const emailLink = document.getElementById('emailLink');
            emailLink.textContent = CONFIG.email;
            emailLink.href = `mailto:${CONFIG.email}`;
            
            const websiteLink = document.getElementById('websiteLink');
            websiteLink.textContent = CONFIG.website.replace(/^https?:\/\//, '');
            websiteLink.href = CONFIG.website;
            
            document.getElementById('location').textContent = CONFIG.location;
            document.getElementById('bio').textContent = CONFIG.bio;
        }

        // Card flip functionality
        const cardWrapper = document.getElementById('cardWrapper');
        const cardShell = document.getElementById('cardShell');
        const flipBackBtn = document.getElementById('flipBackBtn');

        cardWrapper.addEventListener('click', function(e) {
            if (e.target.closest('.btn') || e.target.closest('.qr-container')) {
                return;
            }
            cardShell.classList.toggle('flipped');
        });

        flipBackBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            cardShell.classList.remove('flipped');
        });

        // Generate QR code
        function generateQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            const qrData = window.location.href;
            
            new QRCode(qrContainer, {
                text: qrData,
                width: 64,
                height: 64,
                colorDark: "#0a0a0a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        // Generate vCard
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location}`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Save contact functionality
        document.getElementById('saveContactBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // WhatsApp functionality
        document.getElementById('whatsappBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const phoneNumber = CONFIG.phone.replace(/[^0-9]/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });

        // Copy link functionality
        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            const url = window.location.href;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function() {
                    const btn = document.getElementById('copyLinkBtn');
                    const originalText = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(function() {
                        btn.textContent = originalText;
                    }, 2000);
                }).catch(function(err) {
                    console.error('Failed to copy:', err);
                    fallbackCopyToClipboard(url);
                });
            } else {
                fallbackCopyToClipboard(url);
            }
        });

        function fallbackCopyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copyLinkBtn');
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(function() {
                    btn.textContent = originalText;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
            
            document.body.removeChild(textarea);
        }

        // Share functionality
        document.getElementById('shareBtn').addEventListener('click', function() {
            if (navigator.share) {
                navigator.share({
                    title: `${CONFIG.name} - ${CONFIG.title}`,
                    text: `${CONFIG.bio}`,
                    url: window.location.href
                }).catch(function(err) {
                    console.log('Share cancelled or failed:', err);
                });
            } else {
                const btn = document.getElementById('shareBtn');
                const originalText = btn.textContent;
                btn.textContent = 'Use Copy Link';
                setTimeout(function() {
                    btn.textContent = originalText;
                }, 2000);
            }
        });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', function() {
            initializeCard();
            generateQRCode();
        });

        // Prevent text selection on double click
        cardWrapper.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
