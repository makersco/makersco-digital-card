<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #0a0a0a;
            --card-front-grad-start: #1a1a1a;
            --card-front-grad-end: #0d0d0d;
            --card-back: #111111;
            --accent: #C9A962;
            --accent-soft: rgba(201, 169, 98, 0.12);
            --accent-glow: rgba(201, 169, 98, 0.18);
            --border-card: rgba(201, 169, 98, 0.27);
            --border-hairline: rgba(201, 169, 98, 0.16);
            --text-primary: #F5F1E8;
            --text-secondary: rgba(245, 241, 232, 0.72);
            --text-muted: rgba(245, 241, 232, 0.48);
            --divider: rgba(201, 169, 98, 0.20);
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.56), 0 0 0 1px rgba(201, 169, 98, 0.08) inset;
            --ease-luxury: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-flip: cubic-bezier(0.32, 0.72, 0.24, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 280ms var(--ease-luxury) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-wrapper {
            width: 340px;
            height: 200px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 600ms var(--ease-flip);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 4px;
            box-shadow: var(--shadow-card);
        }

        .card-front {
            background: linear-gradient(135deg, var(--card-front-grad-start) 0%, var(--card-front-grad-end) 100%);
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
        }

        /* Corner brackets */
        .corner-bracket {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--accent);
        }

        .corner-bracket.top-left {
            top: 24px;
            left: 24px;
            border-right: none;
            border-bottom: none;
        }

        .corner-bracket.bottom-right {
            bottom: 24px;
            right: 24px;
            border-left: none;
            border-top: none;
        }

        /* Front header */
        .front-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .established {
            font-weight: 600;
            font-size: 9px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--text-muted);
            line-height: 1;
        }

        .monogram-badge {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-card);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(201, 169, 98, 0.04);
        }

        .monogram-badge span {
            font-weight: 300;
            font-size: 28px;
            color: var(--accent);
            line-height: 1;
        }

        /* Front content - centered */
        .front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            margin-top: -12px;
        }

        .ornament-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .ornament-divider::before,
        .ornament-divider::after {
            content: '';
            width: 32px;
            height: 1px;
            background: var(--divider);
        }

        .ornament-divider .symbol {
            font-size: 10px;
            color: var(--accent);
            opacity: 0.6;
            line-height: 1;
        }

        .name-block {
            text-align: center;
            margin-bottom: 16px;
        }

        .name {
            font-weight: 700;
            font-size: 32px;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            line-height: 0.95;
            margin-bottom: 12px;
        }

        .title {
            font-weight: 300;
            font-style: italic;
            font-size: 16px;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .title-hairline {
            width: 64px;
            height: 1px;
            background: var(--accent);
            margin: 16px auto;
        }

        .company-name {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1;
        }

        /* Front footer */
        .front-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .location-text {
            font-weight: 600;
            font-size: 9px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--text-muted);
            line-height: 1;
        }

        .tap-hint {
            font-weight: 600;
            font-size: 9px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--accent);
            line-height: 1;
            opacity: 0.7;
        }

        /* Back sections */
        .section {
            margin-bottom: 24px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            height: 1px;
            background: var(--border-hairline);
        }

        .section-label::before {
            width: 24px;
        }

        .section-label::after {
            flex: 1;
        }

        /* Contact rows */
        .contact-row {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-hairline);
            display: grid;
            grid-template-columns: 16px 1fr;
            column-gap: 12px;
            row-gap: 4px;
            transition: opacity 200ms var(--ease-luxury);
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row:hover {
            opacity: 0.8;
        }

        .contact-row .marker {
            width: 4px;
            height: 4px;
            background: var(--accent);
            transform: rotate(45deg);
            grid-row: 1 / 3;
            align-self: center;
            justify-self: center;
        }

        .contact-row .label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--accent);
            grid-column: 2;
            line-height: 1;
        }

        .contact-row .value {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-primary);
            grid-column: 2;
            line-height: 1.4;
            word-break: break-word;
        }

        .contact-row .value a {
            color: inherit;
            text-decoration: none;
            transition: color 180ms var(--ease-luxury);
        }

        .contact-row .value a:hover {
            color: var(--accent);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            background: transparent;
            border: 1px solid var(--border-card);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms var(--ease-luxury),
                        border-color 180ms var(--ease-luxury),
                        background 180ms var(--ease-luxury);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* QR Container */
        #qr-container {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            border: 1px solid var(--border-hairline);
        }

        #qr-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #qrcode {
            padding: 12px;
            background: white;
            border-radius: 4px;
        }

        .qr-label {
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Action buttons below card */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 340px;
            margin: 0 auto;
        }

        .action-btn {
            width: 100%;
            height: 48px;
            background: transparent;
            border: 1px solid var(--border-card);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms var(--ease-luxury),
                        border-color 180ms var(--ease-luxury),
                        background 180ms var(--ease-luxury);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.whatsapp {
            border-color: var(--accent);
            color: var(--accent);
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(201, 169, 98, 0.95);
            color: #0a0a0a;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            opacity: 0;
            transition: transform 280ms var(--ease-luxury),
                        opacity 280ms var(--ease-luxury);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .card-wrapper {
                width: 100%;
                max-width: 340px;
            }

            .action-buttons {
                width: 100%;
                max-width: 340px;
            }

            .name {
                font-size: 28px;
            }

            .title {
                font-size: 14px;
            }
        }

        /* Bio section on back */
        .bio-text {
            font-weight: 400;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <!-- FRONT FACE -->
                <div class="card-face card-front">
                    <div class="corner-bracket top-left"></div>
                    <div class="corner-bracket bottom-right"></div>

                    <div class="front-header">
                        <div class="established" id="establishedText">ESTABLISHED 2024</div>
                        <div class="monogram-badge">
                            <span id="monogram">AF</span>
                        </div>
                    </div>

                    <div class="front-content">
                        <div class="ornament-divider">
                            <span class="symbol">✦</span>
                        </div>

                        <div class="name-block">
                            <div class="name" id="cardName">AHMAD FARIS</div>
                            <div class="title" id="cardTitle">Founder & CEO</div>
                        </div>

                        <div class="title-hairline"></div>

                        <div class="company-name" id="cardCompany">PIXEL REKA SDN BHD</div>
                    </div>

                    <div class="front-footer">
                        <div class="location-text" id="locationHint">KUALA LUMPUR</div>
                        <div class="tap-hint">[tap]</div>
                    </div>
                </div>

                <!-- BACK FACE -->
                <div class="card-face card-back">
                    <div class="section">
                        <div class="section-label">CONTACT</div>
                        
                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="label">EMAIL</div>
                            <div class="value">
                                <a href="#" id="emailLink">faris@pixelreka.com.my</a>
                            </div>
                        </div>

                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="label">DIRECT</div>
                            <div class="value">
                                <a href="#" id="phoneLink">+60123456789</a>
                            </div>
                        </div>

                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="label">LOCATION</div>
                            <div class="value" id="locationValue">Kuala Lumpur, Malaysia</div>
                        </div>

                        <div class="contact-row" style="border-bottom: none;">
                            <div class="marker"></div>
                            <div class="label">WEB</div>
                            <div class="value">
                                <a href="#" id="websiteLink" target="_blank" rel="noopener">pixelreka.com.my</a>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-label">CONNECT</div>
                        <div class="button-group">
                            <button class="btn btn-primary" id="saveBtn">SAVE</button>
                            <button class="btn" id="vcardBtn">vCard</button>
                            <button class="btn" id="qrBtn">QR</button>
                        </div>
                        <div id="qr-container">
                            <div class="qr-label">SCAN TO SAVE</div>
                            <div id="qrcode"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn whatsapp" id="whatsappBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
                MESSAGE ON WHATSAPP
            </button>

            <button class="action-btn" id="copyLinkBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
                COPY LINK
            </button>

            <button class="action-btn" id="shareBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                </svg>
                SHARE
            </button>
        </div>
    </div>

    <div class="toast" id="toast">COPIED</div>

<script>
    const CONFIG = {
        name: "Ahmad Faris bin Razak",
        title: "Founder & CEO",
        company: "Pixel Reka Sdn Bhd",
        phone: "+60123456789",
        email: "faris@pixelreka.com.my",
        website: "https://pixelreka.com.my",
        location: "Kuala Lumpur, Malaysia",
        bio: "Building digital solutions for Malaysian SMEs",
        color: "#C9A962",
        whatsapp_message: "Hi Faris, I found your digital card!"
    };

    // Extract initials for monogram
    function getMonogram(name) {
        const parts = name.split(' ');
        if (parts.length >= 2) {
            return (parts[0][0] + parts[1][0]).toUpperCase();
        }
        return name.substring(0, 2).toUpperCase();
    }

    // Format name for display (uppercase first and middle)
    function formatNameDisplay(name) {
        const parts = name.split(' ');
        if (parts.length >= 3) {
            return `${parts[0].toUpperCase()} ${parts[1].toUpperCase()}`;
        }
        return name.toUpperCase();
    }

    // Extract location hint
    function getLocationHint(location) {
        const parts = location.split(',');
        return parts[0].trim().toUpperCase();
    }

    // Initialize card content
    function initializeCard() {
        document.getElementById('monogram').textContent = getMonogram(CONFIG.name);
        document.getElementById('cardName').textContent = formatNameDisplay(CONFIG.name);
        document.getElementById('cardTitle').textContent = CONFIG.title;
        document.getElementById('cardCompany').textContent = CONFIG.company.toUpperCase();
        document.getElementById('locationHint').textContent = getLocationHint(CONFIG.location);
        
        document.getElementById('emailLink').href = `mailto:${CONFIG.email}`;
        document.getElementById('emailLink').textContent = CONFIG.email;
        document.getElementById('phoneLink').href = `tel:${CONFIG.phone}`;
        document.getElementById('phoneLink').textContent = CONFIG.phone;
        document.getElementById('locationValue').textContent = CONFIG.location;
        
        const websiteDisplay = CONFIG.website.replace(/^https?:\/\//, '');
        document.getElementById('websiteLink').href = CONFIG.website;
        document.getElementById('websiteLink').textContent = websiteDisplay;
    }

    // Card flip functionality
    const cardWrapper = document.getElementById('cardWrapper');
    const cardInner = document.getElementById('cardInner');
    let isFlipped = false;

    cardWrapper.addEventListener('click', function() {
        isFlipped = !isFlipped;
        cardInner.classList.toggle('flipped');
    });

    // Generate vCard
    function generateVCard() {
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            `FN:${CONFIG.name}`,
            `ORG:${CONFIG.company}`,
            `TITLE:${CONFIG.title}`,
            `TEL;TYPE=CELL:${CONFIG.phone}`,
            `EMAIL:${CONFIG.email}`,
            `URL:${CONFIG.website}`,
            `ADR;TYPE=WORK:;;${CONFIG.location}`,
            `NOTE:${CONFIG.bio}`,
            'END:VCARD'
        ].join('\n');

        return vcard;
    }

    // Download vCard
    function downloadVCard() {
        const vcard = generateVCard();
        const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const filename = CONFIG.name.replace(/\s+/g, '_') + '.vcf';
        
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showToast('VCARD DOWNLOADED');
    }

    // Generate QR Code
    let qrGenerated = false;
    function toggleQR() {
        const qrContainer = document.getElementById('qr-container');
        const qrElement = document.getElementById('qrcode');
        
        if (!qrGenerated) {
            qrContainer.classList.add('active');
            qrElement.innerHTML = '';
            
            const vcard = generateVCard();
            new QRCode(qrElement, {
                text: vcard,
                width: 160,
                height: 160,
                colorDark: '#0a0a0a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            qrGenerated = true;
        } else {
            qrContainer.classList.toggle('active');
        }
    }

    // Save contact (download vCard)
    document.getElementById('saveBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        downloadVCard();
    });

    // vCard button
    document.getElementById('vcardBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        downloadVCard();
    });

    // QR button
    document.getElementById('qrBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleQR();
    });

    // WhatsApp button
    document.getElementById('whatsappBtn').addEventListener('click', function() {
        const message = encodeURIComponent(CONFIG.whatsapp_message);
        const phone = CONFIG.phone.replace(/[^\d+]/g, '');
        const whatsappURL = `https://wa.me/${phone}?text=${message}`;
        window.open(whatsappURL, '_blank');
    });

    // Copy link button
    document.getElementById('copyLinkBtn').addEventListener('click', function() {
        const currentURL = window.location.href;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(currentURL).then(function() {
                showToast('LINK COPIED');
            }).catch(function() {
                fallbackCopyTextToClipboard(currentURL);
            });
        } else {
            fallbackCopyTextToClipboard(currentURL);
        }
    });

    // Fallback copy function
    function fallbackCopyTextToClipboard(text) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.top = '0';
        textArea.style.left = '0';
        textArea.style.opacity = '0';
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
            document.execCommand('copy');
            showToast('LINK COPIED');
        } catch (err) {
            showToast('COPY FAILED');
        }
        
        document.body.removeChild(textArea);
    }

    // Share button
    document.getElementById('shareBtn').addEventListener('click', function() {
        const shareData = {
            title: `${CONFIG.name} - ${CONFIG.title}`,
            text: `${CONFIG.name}\n${CONFIG.title} at ${CONFIG.company}\n${CONFIG.bio}`,
            url: window.location.href
        };

        if (navigator.share) {
            navigator.share(shareData)
                .then(() => showToast('SHARED'))
                .catch((error) => {
                    if (error.name !== 'AbortError') {
                        fallbackShare();
                    }
                });
        } else {
            fallbackShare();
        }
    });

    // Fallback share
    function fallbackShare() {
        const currentURL = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(currentURL).then(function() {
                showToast('LINK COPIED TO SHARE');
            });
        } else {
            fallbackCopyTextToClipboard(currentURL);
        }
    }

    // Toast notification
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        
        setTimeout(function() {
            toast.classList.remove('show');
        }, 2500);
    }

    // Initialize on load
    initializeCard();

    // Prevent flip when clicking on links and buttons
    const backButtons = document.querySelectorAll('.card-back button, .card-back a');
    backButtons.forEach(function(element) {
        element.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });
</script>
</body>
</html>
