<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Faris bin Razak - Digital Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      /* Surfaces */
      --bg-page: #FAFAFA;
      --bg-card-front: #FFFFFF;
      --bg-card-back: #F9FAFB;
      --bg-elevated: #FFFFFF;
      --bg-subtle: #F3F4F6;

      /* Borders */
      --border-card: #E5E7EB;
      --border-soft: #EEF0F3;
      --border-divider: #F3F4F6;

      /* Text */
      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-tertiary: #6B7280;
      --text-muted: #9CA3AF;

      /* Accent */
      --accent: #6366f1;
      --accent-hover: #5457e0;
      --accent-soft: #EEF0FF;
      --accent-ring: rgba(99, 102, 241, 0.18);

      /* Status */
      --status-ok: #15803D;
      --status-ok-bg: #ECFDF5;
      --status-warn: #B45309;
      --status-warn-bg: #FEF3C7;

      /* Shadow */
      --shadow-card: 0 1px 2px rgba(17, 24, 39, 0.04),
                     0 8px 24px rgba(17, 24, 39, 0.06);
      --shadow-hover: 0 2px 4px rgba(17, 24, 39, 0.05),
                      0 16px 40px rgba(17, 24, 39, 0.08);

      /* Radius */
      --radius-card: 16px;
      --radius-control: 8px;
      --radius-badge: 20px;

      /* Motion */
      --ease-standard: cubic-bezier(0.2, 0.0, 0.0, 1.0);
      --ease-emphasis: cubic-bezier(0.2, 0.8, 0.2, 1.0);
      --dur-fast: 120ms;
      --dur-base: 200ms;
      --dur-flip: 280ms;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      font-feature-settings: "ss01", "cv11";
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card-wrapper {
      width: 100%;
      max-width: 360px;
      height: 220px;
      perspective: 1400px;
      margin: 0 auto;
      cursor: pointer;
      transition: transform var(--dur-base) var(--ease-standard);
    }

    .card-wrapper:hover {
      transform: translateY(-2px);
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform var(--dur-flip) var(--ease-emphasis);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-inner.animating {
      will-change: transform;
    }

    .card-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-card);
      background: var(--bg-card-front);
      border: 1px solid var(--border-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .card-wrapper:hover .card-face {
            left: 0;
            top: 0;
      box-shadow: var(--shadow-hover);
    }

    .card-face--back {
      transform: rotateY(180deg);
      background: var(--bg-card-back);
    }

    .card-face__inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .card-face--back .card-face__inner {
      padding: 20px 24px;
    }

    /* Accent Rail */
    .accent-rail {
      position: absolute;
      top: 24px;
      left: 0;
      width: 3px;
      height: 32px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .card-face--back .accent-rail {
      top: 20px;
      left: auto;
      right: 0;
      height: 24px;
      border-radius: 2px 0 0 2px;
    }

    /* Status Dot */
    .status-dot {
      position: absolute;
      top: 28px;
      right: 24px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-ok);
      animation: pulse 2400ms ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    /* Front Face Content */
    .card-name {
      font-weight: 700;
      font-size: 28px;
      line-height: 32px;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0 0 4px;
      padding-right: 32px;
    }

    .card-title {
      font-weight: 400;
      font-size: 15px;
      line-height: 22px;
      color: var(--text-secondary);
      margin: 0;
    }

    .card-divider {
      height: 1px;
      background: var(--border-divider);
      margin: 16px 0 12px;
      border: none;
    }

    .card-company {
      font-weight: 600;
      font-size: 11px;
      line-height: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* Flip Button */
    .flip-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-control);
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background-color var(--dur-base) var(--ease-standard),
                  color var(--dur-base) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-standard);
    }

    .flip-btn:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    .flip-btn:active {
      transform: scale(0.98);
    }

    .flip-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Back Face Content */
    .section-label {
      font-weight: 600;
      font-size: 11px;
      line-height: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-row {
      display: grid;
      grid-template-columns: 32px 1fr 16px;
      align-items: center;
      gap: 12px;
      height: 48px;
      padding: 0 4px;
      border-radius: var(--radius-control);
      transition: background-color var(--dur-base) var(--ease-standard);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .contact-row:hover {
      background: var(--accent-soft);
    }

    .contact-row__icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      color: var(--text-tertiary);
      background: var(--bg-subtle);
      border-radius: var(--radius-control);
    }

    .contact-row__icon svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.5px;
    }

    .contact-row__value {
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-row__chevron {
      color: var(--text-muted);
      opacity: 0;
      transition: opacity var(--dur-base) var(--ease-standard),
                  transform var(--dur-base) var(--ease-standard);
    }

    .contact-row__chevron svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.5px;
    }

    .contact-row:hover .contact-row__chevron {
      opacity: 1;
      transform: translateX(2px);
    }

    .qr-section {
      position: absolute;
      bottom: 20px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .qr-code {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-control);
      overflow: hidden;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
    }

    .qr-code canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .qr-label {
      font-weight: 300;
      font-size: 10px;
      line-height: 14px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Action Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .btn {
      height: 44px;
      padding: 0 20px;
      border-radius: var(--radius-control);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      line-height: 1;
      border: 1px solid;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color var(--dur-base) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-standard),
                  border-color var(--dur-base) var(--ease-standard);
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:focus-visible {
      outline: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #FFFFFF;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-primary:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-ring);
    }

    .btn-secondary {
      background: var(--bg-card-front);
      color: var(--text-primary);
      border-color: var(--border-card);
    }

    .btn-secondary:hover {
      background: var(--bg-subtle);
    }

    .btn-secondary:focus-visible {
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.5px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      border-radius: var(--radius-badge);
      padding: 2px 10px;
      font-weight: 700;
      font-size: 11px;
      line-height: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge--official {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: #FFFFFF;
      padding: 12px 20px;
      border-radius: var(--radius-control);
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-hover);
      opacity: 0;
      transition: transform var(--dur-base) var(--ease-standard),
                  opacity var(--dur-base) var(--ease-standard);
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 380px) {
      .card-wrapper {
        max-width: calc(100vw - 32px);
        height: 220px;
        aspect-ratio: 1.64 / 1;
      }

      .card-face__inner {
        padding: 20px;
      }

      .card-name {
        font-size: 24px;
        line-height: 30px;
      }

      .accent-rail {
        top: 20px;
      }

      .status-dot {
        top: 24px;
        right: 20px;
      }
    }

    @media (min-width: 768px) {
      .card-wrapper {
        max-width: 400px;
        height: 240px;
      }

      .container {
        gap: 48px;
      }

      .actions {
        max-width: 400px;
      }
    }
  
/* ── MakersCo Spacing Fix ──────────────────────────────────────────────── */
/* Standardised spacing injected post-build to fix cramped layout           */

/* Page breathing room */
body {
  padding: 40px 24px 60px !important;
  min-height: 100vh;
}
@media (max-width: 480px) {
  body { padding: 32px 16px 48px !important; }
}

/* Card centring with consistent gap below */
.card-wrapper,
.card-scene,
.scene {
  margin: 0 auto 28px auto !important;
  max-width: 380px;
}

/* Card face inner padding — never let content touch edges */
.card-face,
.card__face,
.flip-card-face {
  padding: 22px 24px !important;
}

/* Info / contact panel below card */
.info-panel,
.contact-panel,
.card-info,
.back-info,
.detail-panel {
  margin-top: 20px !important;
  padding: 20px 20px !important;
  border-radius: 14px;
}

/* Contact rows inside info panel */
.contact-row,
.info-row,
.detail-row {
  padding: 10px 0 !important;
  gap: 12px !important;
}
.contact-row + .contact-row,
.info-row + .info-row,
.detail-row + .detail-row {
  border-top: 1px solid rgba(255,255,255,0.07);
}

/* Action buttons container */
.actions,
.action-row,
.action-buttons,
.card-actions,
.button-group,
.cta-group,
.btn-group {
  margin-top: 20px !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
}

/* Every button — consistent height and tap target */
.btn,
.cta-btn,
.action-btn,
.wa-btn,
.vcard-btn,
.share-btn,
.copy-btn,
.primary-btn,
.secondary-btn,
button:not(.flip-btn):not([class*="flip"]):not([class*="tab"]) {
  min-height: 48px !important;
  padding: 0 24px !important;
  border-radius: 12px !important;
  font-size: 14px !important;
  font-weight: 600 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;
  width: 100% !important;
  box-sizing: border-box !important;
  cursor: pointer !important;
  text-decoration: none !important;
}

/* Share / secondary row — horizontal pills */
.share-row,
.share-panel,
.share-options {
  display: flex !important;
  gap: 10px !important;
  margin-top: 10px !important;
  flex-wrap: wrap !important;
}
.share-row .btn,
.share-panel .btn,
.share-options .btn {
  flex: 1 !important;
  min-width: 80px !important;
  min-height: 44px !important;
  padding: 0 12px !important;
  font-size: 13px !important;
}

/* Flip hint text */
.flip-hint,
.card__flip-hint,
.flip-indicator,
.tap-hint {
  text-align: center !important;
  font-size: 11px !important;
  opacity: 0.5 !important;
  margin-top: 8px !important;
  margin-bottom: 4px !important;
  letter-spacing: 0.5px !important;
}

/* Section labels / headings */
.section-label,
.panel-title,
.section-title {
  font-size: 11px !important;
  text-transform: uppercase !important;
  letter-spacing: 1px !important;
  opacity: 0.5 !important;
  margin-bottom: 12px !important;
}

/* ── End MakersCo Spacing Fix ─────────────────────────────────────────── */


/* ── Phase 4 Extras ─────────────────────────────────────────────────────── */
.extras-section{width:340px;margin:10px auto 0;display:flex;flex-direction:column;gap:9px}
.social-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:4px 0}
.social-btn{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;border:none;cursor:pointer;
  transition:transform .15s,opacity .15s;flex-shrink:0;
}
.social-btn:hover{transform:translateY(-2px);opacity:.85}
.social-btn svg{width:18px;height:18px;flex-shrink:0}
.extra-btn{
  width:100%;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:13px;font-weight:600;
  text-decoration:none;cursor:pointer;border:none;
  transition:transform .15s,opacity .15s;
}
.extra-btn:hover{transform:translateY(-1px);opacity:.9}
.extra-btn:active{transform:scale(.98)}
/* ── End Phase 4 Extras ──────────────────────────────────────────────────── */
</style>
</head>

<script>
  // Configuration
  const CONFIG = {
    name: "Ahmad Faris bin Razak",
    title: "Founder & CEO",
    company: "Pixel Reka Sdn Bhd",
    phone: "+60123456789",
    email: "faris@pixelreka.com.my",
    website: "https://pixelreka.com.my",
    location: "Kuala Lumpur, Malaysia",
    bio: "Building digital solutions for Malaysian SMEs",
    color: "#6366f1",
    whatsapp_message: "Hi Faris, I found your digital card!",
    social: {
      linkedin:  "https://linkedin.com/in/",
      twitter:   "",
      instagram: ""
    },
    custom_links: [
      { icon: "🌐", label: "Visit Website", url: "https://pixelreka.com.my" }
    ],
    booking_url: "",
    maps_url:    ""
  };
  window.CONFIG = CONFIG;

  // DOM Elements
  const cardInner = document.getElementById('cardInner');
  const cardWrapper = document.getElementById('cardWrapper');
  const flipBtn = document.getElementById('flipBtn');
  const flipBtnBack = document.getElementById('flipBtnBack');
  const saveContactBtn = document.getElementById('saveContactBtn');
  const whatsappBtn = document.getElementById('whatsappBtn');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const shareBtn = document.getElementById('shareBtn');
  const toast = document.getElementById('toast');

  // Initialize card content
  function initializeCard() {
    document.getElementById('cardName').textContent = CONFIG.name;
    document.getElementById('cardTitle').textContent = CONFIG.title;
    document.getElementById('cardCompany').textContent = CONFIG.company.toUpperCase();
    document.getElementById('contactPhone').textContent = CONFIG.phone;
    document.getElementById('contactEmail').textContent = CONFIG.email;
    document.getElementById('contactWebsite').textContent = CONFIG.website.replace('https://', '');
    document.getElementById('contactLocation').textContent = CONFIG.location;

    // Generate QR Code
    const qrContainer = document.getElementById('qrCode');
    const cardUrl = window.location.href;
    
    new QRCode(qrContainer, {
      text: cardUrl,
      width: 64,
      height: 64,
      colorDark: CONFIG.color,
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    // Set WhatsApp link
    const whatsappUrl = `https://wa.me/${CONFIG.phone.replace(/\+/g, '').replace(/\s/g, '')}?text=${encodeURIComponent(CONFIG.whatsapp_message)}`;
    whatsappBtn.href = whatsappUrl;
  }

  // Card flip functionality
  let isFlipped = false;

  function flipCard() {
    isFlipped = !isFlipped;
    cardInner.classList.add('animating');
    cardInner.classList.toggle('flipped');
    
    setTimeout(() => {
      cardInner.classList.remove('animating');
    }, 280);
  }

  cardWrapper.addEventListener('click', (e) => {
    // Don't flip if clicking on interactive elements
    if (e.target.closest('.flip-btn') || e.target.closest('.contact-row') || e.target.closest('a')) {
      return;
    }
    flipCard();
  });

  flipBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    flipCard();
  });

  flipBtnBack.addEventListener('click', (e) => {
    e.stopPropagation();
    flipCard();
  });

  // Save Contact (vCard)
  saveContactBtn.addEventListener('click', () => {
    const vCard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TITLE:${CONFIG.title}
ORG:${CONFIG.company}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;

    const blob = new Blob([vCard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast('Contact saved!');
  });

  // Copy Link
  copyLinkBtn.addEventListener('click', async () => {
    const url = window.location.href;
    try {
      await navigator.clipboard.writeText(url);
      showToast('Link copied to clipboard!');
    } catch (err) {
      // Fallback for older browsers
      const textarea = document.createElement('textarea');
      textarea.value = url;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('Link copied to clipboard!');
    }
  });

  // Share functionality
  shareBtn.addEventListener('click', async () => {
    const shareData = {
      title: CONFIG.name,
      text: `${CONFIG.name} - ${CONFIG.title} at ${CONFIG.company}`,
      url: window.location.href
    };

    try {
      if (navigator.share) {
        await navigator.share(shareData);
        showToast('Shared successfully!');
      } else {
        // Fallback - copy to clipboard
        await navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`);
        showToast('Details copied to clipboard!');
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Share failed:', err);
      }
    }
  });

  // Toast notification
  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // Keyboard accessibility
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isFlipped) {
      flipCard();
    }
  });

  // Initialize on load
  document.addEventListener('DOMContentLoaded', initializeCard);
</script>

<script>
(function(){

  // Social platform definitions
  var PLATFORMS = [
    { key:'linkedin',  label:'LinkedIn',  bg:'#0A66C2', fg:'#fff',
      svg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' },
    { key:'instagram', label:'Instagram', bg:'#E1306C', fg:'#fff',

    { key:'facebook',  label:'Facebook',  bg:'#1877F2', fg:'#fff',

    { key:'twitter',   label:'X / Twitter', bg:'#000', fg:'#fff',

    { key:'tiktok',    label:'TikTok',    bg:'#010101', fg:'#fff',
      svg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.77a4.85 4.85 0 01-1.01-.08z"/></svg>' },
    { key:'youtube',   label:'YouTube',   bg:'#FF0000', fg:'#fff',
      svg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>' },
    { key:'pinterest', label:'Pinterest', bg:'#E60023', fg:'#fff',
      svg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 01.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>' }
  ];

  // Accent color from CSS variable or fallback
  function getAccent() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue('--accent').trim() || '#6366f1';
  }

  function hexToRgb(hex) {
    var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [99,102,241];
  }

  function buildSection() {
    var social   = C.social || {};
    var links    = C.custom_links || [];
    var booking  = C.booking_url || '';
    var location = C.location || '';
    var mapsUrl  = C.maps_url || ('https://maps.google.com/?q=' + encodeURIComponent(location));

    var hasSocial  = PLATFORMS.some(function(p){ return social[p.key]; });
    var hasLinks   = links.length > 0;
    var hasBooking = !!booking;
    var hasLoc     = !!location;

    if (!hasSocial && !hasLinks && !hasBooking && !hasLoc) return;

    var accent = getAccent();
    var rgb    = hexToRgb(accent);
    var accentRgba = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',';

    var section = document.createElement('div');
    section.className = 'extras-section';

    // ── Social icons ──
    if (hasSocial) {
      var row = document.createElement('div');
      row.className = 'social-row';
      PLATFORMS.forEach(function(p) {
        var url = social[p.key];
        if (!url) return;
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'social-btn';
        a.title = p.label;
        a.style.cssText = 'background:'+accentRgba+'0.12);border:1px solid '+accentRgba+'0.3);color:'+accent+';';
        a.innerHTML = p.svg;
        row.appendChild(a);
      });
      section.appendChild(row);
    }

    // ── Custom link buttons ──
    links.forEach(function(link) {
      if (!link.url) return;
      var a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'extra-btn';
      a.style.cssText = 'background:'+accentRgba+'0.1);border:1px solid '+accentRgba+'0.25);color:'+accent+';font-family:inherit;';
      a.innerHTML = (link.icon ? '<span style="font-size:16px">'+link.icon+'</span> ' : '') + (link.label || link.url);
      section.appendChild(a);
    });

    // ── Booking button ──
    if (hasBooking) {
      var ab = document.createElement('a');
      ab.href = booking;
      ab.target = '_blank';
      ab.rel = 'noopener noreferrer';
      ab.className = 'extra-btn';
      ab.style.cssText = 'background:'+accentRgba+'0.12);border:1px solid '+accentRgba+'0.3);color:'+accent+';font-family:inherit;';

    if (qr) {
      qr.parentNode.insertBefore(section, qr);
    } else {
      document.body.appendChild(section);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildSection);
  } else {
    buildSection();
  }
})();
</script>

<script>
/* MakersCo: Make contact values tappable */
(function(){
  var C = window.CONFIG || {};
  function linkify(id, href, text) {
    var el = document.getElementById(id);
    if (!el || !href) return;
    el.innerHTML = '<a href="' + href + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + (text || el.textContent) + '</a>';
  }
  document.addEventListener('DOMContentLoaded', function(){
    if (C.phone) {
      linkify('phoneDisplay', 'tel:' + C.phone.replace(/\D/g,''));
    }
    if (C.email) {
      linkify('emailDisplay', 'mailto:' + C.email);
    }
    if (C.website) {
      var url = C.website.startsWith('http') ? C.website : 'https://' + C.website;
      linkify('websiteDisplay', url);
    }
    if (C.location) {
      linkify('locationDisplay', 'https://maps.google.com/?q=' + encodeURIComponent(C.location));
    }
  });
})();
</script>
