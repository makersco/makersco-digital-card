<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Minimal Clean</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #FAFAFA;
            --bg-card-front: #FFFFFF;
            --bg-card-back: #F9FAFB;
            --border-card: #E5E7EB;
            --border-soft: #EEF0F3;
            --accent: #5B61D0;
            --accent-hover: #4D53BD;
            --accent-soft: #EEF0FB;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --text-on-accent: #FFFFFF;
            --shadow-card: 0 1px 2px rgba(17, 24, 39, 0.04), 0 4px 16px rgba(17, 24, 39, 0.06);
            --radius-card: 16px;
            --radius-badge: 20px;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-flip: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .card-wrapper {
            width: 340px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 600ms var(--ease-flip);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .card-front {
            background: var(--bg-card-front);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--bg-card-back);
            padding: 24px;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        /* Card Front Styles */
        .front-header {
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .accent-bar {
            width: 3px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: var(--radius-badge);
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card-company {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-credentials {
            position: absolute;
            bottom: 0;
            right: 0;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* Card Back Styles */
        .contact-grid {
            display: grid;
            grid-template-columns: 64px 1fr;
            row-gap: 12px;
            column-gap: 16px;
            align-items: baseline;
            flex: 1;
        }

        .contact-row {
            display: contents;
        }

        .contact-row:not(:first-child) .contact-label,
        .contact-row:not(:first-child) .contact-value {
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            line-height: 1.4;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1.4;
            min-height: 44px;
            display: flex;
            align-items: center;
            word-break: break-word;
        }

        .contact-value a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom-color 180ms var(--ease-standard);
        }

        .contact-value a:hover {
            border-bottom-color: var(--accent);
        }

        .back-footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-footer-text {
            font-size: 11px;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .qr-code-container {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            width: 48px;
            height: 48px;
        }

        #qrcode img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Buttons */
        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            height: 44px;
            padding: 0 20px;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 180ms var(--ease-standard),
                        background-color 180ms var(--ease-standard),
                        border-color 180ms var(--ease-standard),
                        color 180ms var(--ease-standard),
                        opacity 180ms var(--ease-standard);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(0) !important;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-on-accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-card);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            transform: none;
        }

        /* Icon styles */
        .btn-icon {
            width: 16px;
            height: 16px;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 380px) {
            .card-wrapper {
                width: 100%;
                max-width: 340px;
            }

            .button-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Flip hint */
        .flip-hint {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            text-align: center;
            margin-top: -16px;
            animation: fadeIn 600ms var(--ease-standard) 800ms both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: var(--text-on-accent);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: transform 300ms var(--ease-standard),
                        opacity 300ms var(--ease-standard);
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(17, 24, 39, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading state */
        .btn.loading {
            position: relative;
            color: transparent;
            pointer-events: none;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 600ms linear infinite;
            color: var(--text-on-accent);
        }

        .btn-secondary.loading::after {
            color: var(--accent);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .button-group,
            .flip-hint {
                display: none;
            }

            .card-wrapper {
                box-shadow: none;
            }

            .card-inner {
                transform: none !important;
            }

            .card-back {
                display: none;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            :root {
                --border-card: #999999;
                --text-secondary: #333333;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .card-inner,
            .btn,
            .toast {
                transition-duration: 0.01ms !important;
            }

            .flip-hint {
                animation: none;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <!-- Front Face -->
                <div class="card-face card-front">
                    <div class="front-header">
                        <div class="accent-bar"></div>
                        <div class="status-badge" id="statusBadge">Available</div>
                    </div>
                    <div class="front-content">
                        <div class="card-name" id="cardName">Ahmad Faris bin Razak</div>
                        <div class="card-title" id="cardTitle">Founder & CEO</div>
                        <div class="card-company" id="cardCompany">Pixel Reka Sdn Bhd</div>
                        <div class="card-credentials">B.Sc.</div>
                    </div>
                </div>

                <!-- Back Face -->
                <div class="card-face card-back">
                    <div class="contact-grid">
                        <div class="contact-row">
                            <div class="contact-label">Email</div>
                            <div class="contact-value">
                                <a href="#" id="emailLink">faris@pixelreka.com.my</a>
                            </div>
                        </div>
                        <div class="contact-row">
                            <div class="contact-label">Phone</div>
                            <div class="contact-value">
                                <a href="#" id="phoneLink">+60 12 345 6789</a>
                            </div>
                        </div>
                        <div class="contact-row">
                            <div class="contact-label">Website</div>
                            <div class="contact-value">
                                <a href="#" id="websiteLink" target="_blank" rel="noopener">pixelreka.com.my</a>
                            </div>
                        </div>
                        <div class="contact-row">
                            <div class="contact-label">Location</div>
                            <div class="contact-value" id="locationValue">Kuala Lumpur, Malaysia</div>
                        </div>
                    </div>
                    <div class="back-footer">
                        <div class="back-footer-text">SSM Registration: 202401234567</div>
                        <div class="qr-code-container">
                            <div id="qrcode"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flip-hint">Tap card to flip</div>

        <div class="button-group">
            <div class="button-row">
                <button class="btn btn-primary" id="downloadBtn">
                    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Save Contact
                </button>
                <button class="btn btn-secondary" id="shareBtn">
                    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                    </svg>
                    Share
                </button>
            </div>
            <div class="button-row">
                <button class="btn btn-secondary" id="whatsappBtn">
                    <svg class="btn-icon" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    WhatsApp
                </button>
                <button class="btn btn-secondary" id="copyBtn">
                    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    Copy Link
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        // Configuration
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#6366f1",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        // DOM Elements
        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');
        const downloadBtn = document.getElementById('downloadBtn');
        const shareBtn = document.getElementById('shareBtn');
        const whatsappBtn = document.getElementById('whatsappBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const emailLink = document.getElementById('emailLink');
        const phoneLink = document.getElementById('phoneLink');
        const websiteLink = document.getElementById('websiteLink');

        // Initialize card content
        function initializeCard() {
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            document.getElementById('locationValue').textContent = CONFIG.location;
            
            emailLink.href = `mailto:${CONFIG.email}`;
            emailLink.textContent = CONFIG.email;
            
            phoneLink.href = `tel:${CONFIG.phone}`;
            phoneLink.textContent = formatPhoneNumber(CONFIG.phone);
            
            const displayWebsite = CONFIG.website.replace(/^https?:\/\//, '');
            websiteLink.href = CONFIG.website;
            websiteLink.textContent = displayWebsite;

            // Generate QR Code
            generateQRCode();
        }

        // Format phone number for display
        function formatPhoneNumber(phone) {
            // Format Malaysian phone numbers: +60 12 345 6789
            if (phone.startsWith('+60')) {
                const digits = phone.substring(3);
                if (digits.length === 9 || digits.length === 10) {
                    return `+60 ${digits.substring(0, 2)} ${digits.substring(2, 5)} ${digits.substring(5)}`;
                }
            }
            return phone;
        }

        // Generate QR Code
        function generateQRCode() {
            const qrcodeContainer = document.getElementById('qrcode');
            if (qrcodeContainer && typeof QRCode !== 'undefined') {
                qrcodeContainer.innerHTML = '';
                new QRCode(qrcodeContainer, {
                    text: CONFIG.website,
                    width: 48,
                    height: 48,
                    colorDark: "#111827",
                    colorLight: "#F9FAFB",
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
        }

        // Card flip functionality
        let isFlipped = false;
        cardWrapper.addEventListener('click', function(e) {
            // Don't flip if clicking on a link
            if (e.target.tagName === 'A') {
                return;
            }
            isFlipped = !isFlipped;
            cardInner.classList.toggle('flipped', isFlipped);
        });

        // Generate vCard data
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `N:${CONFIG.name.split(' ').reverse().join(';')}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location}`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Download vCard
        function downloadVCard() {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showToast('Contact saved successfully!');
        }

        // Share functionality
        async function shareCard() {
            const shareData = {
                title: `${CONFIG.name} - ${CONFIG.title}`,
                text: `${CONFIG.name}\n${CONFIG.title} at ${CONFIG.company}\n${CONFIG.bio}`,
                url: CONFIG.website
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                    showToast('Shared successfully!');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Error sharing:', err);
                        fallbackShare();
                    }
                }
            } else {
                fallbackShare();
            }
        }

        // Fallback share (copy to clipboard)
        function fallbackShare() {
            const shareText = `${CONFIG.name}\n${CONFIG.title} at ${CONFIG.company}\n\n${CONFIG.email}\n${CONFIG.phone}\n${CONFIG.website}`;
            copyToClipboard(shareText);
        }

        // Open WhatsApp
        function openWhatsApp() {
            const phone = CONFIG.phone.replace(/[^\d+]/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const url = `https://wa.me/${phone}?text=${message}`;
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // Copy link to clipboard
        function copyLink() {
            copyToClipboard(CONFIG.website);
        }

        // Copy to clipboard utility
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy:', err);
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        // Fallback copy method
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('Copied to clipboard!');
                } else {
                    showToast('Failed to copy');
                }
            } catch (err) {
                console.error('Fallback copy failed:', err);
                showToast('Failed to copy');
            }
            
            document.body.removeChild(textarea);
        }

        // Show toast notification
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Button loading state
        function setButtonLoading(button, isLoading) {
            if (isLoading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }

        // Event listeners
        downloadBtn.addEventListener('click', function() {
            setButtonLoading(this, true);
            setTimeout(() => {
                downloadVCard();
                setButtonLoading(downloadBtn, false);
            }, 300);
        });

        shareBtn.addEventListener('click', function() {
            shareCard();
        });

        whatsappBtn.addEventListener('click', function() {
            openWhatsApp();
        });

        copyBtn.addEventListener('click', function() {
            copyLink();
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                if (document.activeElement === cardWrapper) {
                    e.preventDefault();
                    cardWrapper.click();
                }
            }
        });

        // Make card wrapper focusable
        cardWrapper.setAttribute('tabindex', '0');
        cardWrapper.setAttribute('role', 'button');
        cardWrapper.setAttribute('aria-label', 'Flip business card');

        // Accessibility: announce flip state
        cardWrapper.addEventListener('click', function() {
            const state = isFlipped ? 'back' : 'front';
            cardWrapper.setAttribute('aria-label', `Business card ${state} side. Click to flip`);
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initializeCard();
        });

        // Handle visibility change (regenerate QR if needed)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                const qrContainer = document.getElementById('qrcode');
                if (qrContainer && !qrContainer.hasChildNodes()) {
                    generateQRCode();
                }
            }
        });

        // Prevent context menu on card (optional, for touch devices)
        cardWrapper.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Handle orientation change
        window.addEventListener('orientationchange', function() {
            setTimeout(() => {
                generateQRCode();
            }, 300);
        });

        // Analytics tracking (placeholder)
        function trackEvent(eventName, eventData) {
            // Implement your analytics tracking here
            console.log('Event:', eventName, eventData);
        }

        // Track button clicks
        downloadBtn.addEventListener('click', () => trackEvent('download_vcard', { name: CONFIG.name }));
        shareBtn.addEventListener('click', () => trackEvent('share_card', { name: CONFIG.name }));
        whatsappBtn.addEventListener('click', () => trackEvent('whatsapp_click', { name: CONFIG.name }));
        copyBtn.addEventListener('click', () => trackEvent('copy_link', { name: CONFIG.name }));
        cardWrapper.addEventListener('click', () => trackEvent('card_flip', { flipped: isFlipped }));

        // Service Worker registration (optional, for PWA functionality)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // Uncomment to register service worker
                // navigator.serviceWorker.register('/sw.js').then(function(registration) {
                //     console.log('ServiceWorker registered:', registration);
                // }).catch(function(error) {
                //     console.log('ServiceWorker registration failed:', error);
                // });
            });
        }

        // Add to home screen prompt (PWA)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            // You can show a custom install button here
            trackEvent('install_prompt_shown');
        });

        // Handle successful installation
        window.addEventListener('appinstalled', function() {
            deferredPrompt = null;
            trackEvent('app_installed');
        });

        // Performance optimization: lazy load QR code
        if ('IntersectionObserver' in window) {
            const qrObserver = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        generateQRCode();
                        qrObserver.disconnect();
                    }
                });
            });

            const cardBack = document.querySelector('.card-back');
            if (cardBack) {
                qrObserver.observe(cardBack);
            }
        }

        // Preconnect to external resources
        function addPreconnect(href) {
            const link = document.createElement('link');
            link.rel = 'preconnect';
            link.href = href;
            document.head.appendChild(link);
        }

        // Add preconnects for external resources
        addPreconnect('https://fonts.googleapis.com');
        addPreconnect('https://fonts.gstatic.com');

        // Error handling for external resources
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
                console.error('Failed to load resource:', e.target.src || e.target.href);
                trackEvent('resource_load_error', { 
                    resource: e.target.src || e.target.href 
                });
            }
        }, true);

        // Handle online/offline status
        window.addEventListener('online', function() {
            showToast('Back online');
            trackEvent('connection_restored');
        });

        window.addEventListener('offline', function() {
            showToast('You are offline');
            trackEvent('connection_lost');
        });

        // Prevent accidental navigation
        let hasInteracted = false;
        document.addEventListener('click', function() {
            hasInteracted = true;
        }, { once: true });

        window.addEventListener('beforeunload', function(e) {
            if (hasInteracted) {
                // Optionally confirm before leaving
                // e.preventDefault();
                // e.returnValue = '';
            }
        });

        // Debug mode (enable via console: window.DEBUG = true)
        if (window.DEBUG) {
            console.log('Digital Card Configuration:', CONFIG);
            console.log('Features available:', {
                clipboard: !!navigator.clipboard,
                share: !!navigator.share,
                serviceWorker: 'serviceWorker' in navigator,
                intersection: 'IntersectionObserver' in window
            });
        }
    </script>
</body>
</html>
