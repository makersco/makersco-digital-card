<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Minimal Clean</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #FAFAFA;
            --surface-front: #FFFFFF;
            --surface-back: #F9FAFB;
            --surface-sunken: #F3F4F6;
            --ink-primary: #111827;
            --ink-secondary: #4B5563;
            --ink-tertiary: #9CA3AF;
            --ink-divider: #E5E7EB;
            --accent: #6366F1;
            --accent-hover: #4F46E5;
            --accent-tint: #EEF2FF;
            --accent-ink: #FFFFFF;
            --status-on: #047857;
            --status-on-bg: #ECFDF5;
            --radius-card: 16px;
            --radius-chip: 20px;
            --radius-btn: 10px;
            --border-card: 1px solid #E5E7EB;
            --shadow-rest: 0 1px 2px rgba(17,24,39,0.04), 0 8px 24px rgba(17,24,39,0.06);
            --shadow-lift: 0 2px 4px rgba(17,24,39,0.05), 0 16px 40px rgba(17,24,39,0.08);
            --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
            --dur-fast: 140ms;
            --dur-base: 220ms;
            --dur-flip: 280ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card-wrapper {
            width: 340px;
            height: 200px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
            transition: transform var(--dur-base) var(--ease-out);
        }

        .card-wrapper:hover {
            transform: translateY(-2px);
        }

        .card-wrapper:hover .card-inner {
            box-shadow: var(--shadow-lift);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-out),
                        box-shadow var(--dur-base) var(--ease-out);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-rest);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            border: var(--border-card);
            overflow: hidden;
        }

        .card-front {
            background: var(--surface-front);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--surface-back);
            padding: 24px;
            transform: rotateY(180deg);
        }

        .accent-rule {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 32px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
            transform-origin: left center;
            transition: transform var(--dur-flip) var(--ease-out);
        }

        .card-inner.flipped .card-front .accent-rule {
            transform: scaleX(0);
        }

        .card-back .accent-rule {
            transform: scaleX(1.5);
            transition: transform var(--dur-flip) var(--ease-out);
        }

        .card-inner:not(.flipped) .card-back .accent-rule {
            transform: scaleX(0);
        }

        .hero-section {
            margin-top: 20px;
        }

        .name-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: var(--ink-primary);
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 10px;
            border-radius: var(--radius-chip);
            background: var(--status-on-bg);
            color: var(--status-on);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .title {
            font-size: 14px;
            font-weight: 400;
            color: var(--ink-secondary);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .company {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-tertiary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .flip-button {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--ink-tertiary);
            transition: color var(--dur-fast) var(--ease-out),
                        transform var(--dur-fast) var(--ease-out);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flip-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .flip-button:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }

        .flip-button:active {
            transform: scale(0.98);
        }

        .flip-button svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.5px;
        }

        .contact-rows {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 44px;
        }

        .contact-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .contact-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--ink-tertiary);
            text-transform: uppercase;
        }

        .contact-value-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--ink-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .contact-action {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--ink-tertiary);
            cursor: pointer;
            transition: color var(--dur-fast) var(--ease-out);
            position: relative;
        }

        .contact-action::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
        }

        .contact-action:hover {
            color: var(--accent);
        }

        .contact-action svg {
            width: 16px;
            height: 16px;
            stroke-width: 1.5px;
        }

        .contact-divider {
            height: 1px;
            background: var(--ink-divider);
            margin-top: 16px;
        }

        .contact-row:last-child .contact-divider {
            display: none;
        }

        .actions-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 340px;
            margin: 0 auto;
        }

        .button-row {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: var(--radius-btn);
            border: none;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out),
                        border-color var(--dur-fast) var(--ease-out);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--accent-ink);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink-primary);
            border: 1px solid var(--ink-divider);
        }

        .btn-ghost:hover {
            background: var(--surface-sunken);
            border-color: #D1D5DB;
        }

        .btn-ghost:active {
            transform: scale(0.98);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

        .qr-section {
            margin-top: 24px;
            text-align: center;
        }

        .qr-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--ink-tertiary);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: var(--radius-card);
            border: var(--border-card);
            box-shadow: var(--shadow-rest);
        }

        #qrcode canvas {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: var(--ink-primary);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-lift);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--dur-base) var(--ease-out),
                        transform var(--dur-base) var(--ease-out);
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 400px;
                height: 232px;
            }

            .name {
                font-size: 28px;
            }

            .actions-section {
                width: 400px;
            }
        }

        @media (max-width: 374px) {
            .card-wrapper {
                width: 100%;
                max-width: 340px;
            }

            .actions-section {
                width: 100%;
                max-width: 340px;
            }

            .name {
                font-size: 20px;
            }

            .status-pill {
                font-size: 9px;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="card-wrapper" onclick="toggleFlip()">
        <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
                <div class="accent-rule"></div>
                <div class="hero-section">
                    <div class="name-row">
                        <h1 class="name" id="cardName"></h1>
                        <div class="status-pill">
                            <span class="status-dot"></span>
                            <span>Available</span>
                        </div>
                    </div>
                    <p class="title" id="cardTitle"></p>
                    <p class="company" id="cardCompany"></p>
                </div>
                <button class="flip-button" onclick="toggleFlip(); event.stopPropagation();" aria-label="Flip card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21.888 13.5C21.164 18.311 17.013 22 12 22 6.477 22 2 17.523 2 12S6.477 2 12 2c4.1 0 7.625 2.468 9.168 6" stroke-linecap="round"/>
                        <path d="M17 8h5m0 0v-5m0 5l-5-5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="card-face card-back">
                <div class="accent-rule"></div>
                <div class="contact-rows">
                    <div class="contact-row">
                        <div class="contact-label">Email</div>
                        <div class="contact-value-wrapper">
                            <span class="contact-value" id="cardEmail"></span>
                            <div class="contact-action" onclick="copyToClipboard('email'); event.stopPropagation();" title="Copy email">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                        <div class="contact-divider"></div>
                    </div>
                    <div class="contact-row">
                        <div class="contact-label">Phone</div>
                        <div class="contact-value-wrapper">
                            <span class="contact-value" id="cardPhone"></span>
                            <div class="contact-action" onclick="copyToClipboard('phone'); event.stopPropagation();" title="Copy phone">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                        <div class="contact-divider"></div>
                    </div>
                    <div class="contact-row">
                        <div class="contact-label">Website</div>
                        <div class="contact-value-wrapper">
                            <span class="contact-value" id="cardWebsite"></span>
                            <div class="contact-action" onclick="openWebsite(); event.stopPropagation();" title="Open website">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke-linecap="round" stroke-linejoin="round"/>
                                    <polyline points="15 3 21 3 21 9" stroke-linecap="round" stroke-linejoin="round"/>
                                    <line x1="10" y1="14" x2="21" y2="3" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                        <div class="contact-divider"></div>
                    </div>
                </div>
                <button class="flip-button" onclick="toggleFlip(); event.stopPropagation();" aria-label="Flip card back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21.888 13.5C21.164 18.311 17.013 22 12 22 6.477 22 2 17.523 2 12S6.477 2 12 2c4.1 0 7.625 2.468 9.168 6" stroke-linecap="round"/>
                        <path d="M17 8h5m0 0v-5m0 5l-5-5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="actions-section">
        <div class="button-row">
            <button class="btn btn-primary" onclick="downloadVCard()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="7 10 12 15 17 10" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Save Contact
            </button>
        </div>
        <div class="button-row">
            <button class="btn btn-ghost" onclick="sendWhatsApp()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                WhatsApp
            </button>
            <button class="btn btn-ghost" onclick="shareCard()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="18" cy="5" r="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="6" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="18" cy="19" r="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Share
            </button>
        </div>
    </div>

    <div class="qr-section">
        <div class="qr-label">Scan to Save</div>
        <div id="qrcode"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#6366f1",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        function initCard() {
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            document.getElementById('cardEmail').textContent = CONFIG.email;
            document.getElementById('cardPhone').textContent = CONFIG.phone;
            
            const websiteDisplay = CONFIG.website.replace(/^https?:\/\//, '');
            document.getElementById('cardWebsite').textContent = websiteDisplay;

            if (CONFIG.color && CONFIG.color !== '#6366f1') {
                document.documentElement.style.setProperty('--accent', CONFIG.color);
                
                const hsl = hexToHSL(CONFIG.color);
                const darkerHSL = `hsl(${hsl.h}, ${hsl.s}%, ${Math.max(hsl.l - 8, 0)}%)`;
                document.documentElement.style.setProperty('--accent-hover', darkerHSL);
            }

            generateQRCode();
        }

        function hexToHSL(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            let r = parseInt(result[1], 16) / 255;
            let g = parseInt(result[2], 16) / 255;
            let b = parseInt(result[3], 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function toggleFlip() {
            const cardInner = document.getElementById('cardInner');
            cardInner.classList.toggle('flipped');
        }

        function generateQRCode() {
            const qrData = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TITLE:${CONFIG.title}
ORG:${CONFIG.company}
TEL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
NOTE:${CONFIG.bio}
END:VCARD`;

            new QRCode(document.getElementById("qrcode"), {
                text: qrData,
                width: 160,
                height: 160,
                colorDark: "#111827",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function downloadVCard() {
            const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TITLE:${CONFIG.title}
ORG:${CONFIG.company}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL;TYPE=INTERNET:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location};;;
NOTE:${CONFIG.bio}
END:VCARD`;

            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showToast('Contact saved to downloads');
        }

        function sendWhatsApp() {
            const phoneNumber = CONFIG.phone.replace(/\D/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message || `Hi ${CONFIG.name.split(' ')[0]}, I found your digital card!`);
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappURL, '_blank');
        }

        function shareCard() {
            const shareData = {
                title: `${CONFIG.name} - ${CONFIG.title}`,
                text: `${CONFIG.name}\n${CONFIG.title} at ${CONFIG.company}\n${CONFIG.bio}`,
                url: CONFIG.website
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .then(() => showToast('Card shared successfully'))
                    .catch(() => copyShareText());
            } else {
                copyShareText();
            }
        }

        function copyShareText() {
            const shareText = `${CONFIG.name}\n${CONFIG.title} at ${CONFIG.company}\n\n📧 ${CONFIG.email}\n📱 ${CONFIG.phone}\n🌐 ${CONFIG.website}\n\n${CONFIG.bio}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareText)
                    .then(() => showToast('Card details copied to clipboard'))
                    .catch(() => fallbackCopy(shareText));
            } else {
                fallbackCopy(shareText);
            }
        }

        function copyToClipboard(type) {
            let text = '';
            switch(type) {
                case 'email':
                    text = CONFIG.email;
                    break;
                case 'phone':
                    text = CONFIG.phone;
                    break;
                case 'website':
                    text = CONFIG.website;
                    break;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} copied!`))
                    .catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard!');
            } catch (err) {
                showToast('Copy failed - please try manually');
            }
            
            document.body.removeChild(textArea);
        }

        function openWebsite() {
            window.open(CONFIG.website, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.addEventListener('DOMContentLoaded', initCard);
    </script>
</body>
</html>
