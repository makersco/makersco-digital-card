<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #FAFAFA;
            --card-front: #FFFFFF;
            --card-back: #F9FAFB;
            --surface-sunk: #F3F4F6;
            --border-card: #E5E7EB;
            --border-soft: #EEF0F3;
            --divider: #F1F2F4;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #9CA3AF;
            --text-on-accent: #FFFFFF;
            --accent: #6366F1;
            --accent-hover: #4F46E5;
            --accent-tint: #EEF0FF;
            --accent-ring: rgba(99, 102, 241, 0.18);
            --status-on-bg: #ECFDF5;
            --status-on-fg: #047857;
            --status-off-bg: #F3F4F6;
            --status-off-fg: #6B7280;
            --shadow-card: 0 1px 2px rgba(17, 24, 39, 0.04), 0 8px 24px rgba(17, 24, 39, 0.06);
            --shadow-hover: 0 2px 4px rgba(17, 24, 39, 0.05), 0 16px 32px rgba(17, 24, 39, 0.08);
            --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
            --t-fast: 140ms;
            --t-base: 220ms;
            --t-flip: 280ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .card-wrapper {
            width: 360px;
            height: 560px;
            perspective: 1000px;
            margin: 0 auto 24px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 400px;
                height: 600px;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--t-flip) var(--ease-out);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card {
            transition: box-shadow var(--t-base) var(--ease-out);
        }

        .card-wrapper:hover .card {
            box-shadow: var(--shadow-hover);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .card-front {
            background: var(--card-front);
            padding: 32px;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--card-back);
            padding: 32px;
            transform: rotateY(180deg);
        }

        .accent-bar {
            position: absolute;
            top: 24px;
            left: 0;
            width: 3px;
            height: 32px;
            background: var(--accent);
        }

        .accent-bar-right {
            left: auto;
            right: 0;
        }

        .avatar-wrapper {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 1px solid var(--border-soft);
            overflow: hidden;
            margin-bottom: 24px;
            background: var(--surface-sunk);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        @media (max-width: 380px) {
            .hero-name {
                font-size: 24px;
            }
        }

        .hero-title {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-secondary);
        }

        @media (max-width: 380px) {
            .hero-title {
                font-size: 14px;
            }
        }

        .divider {
            height: 1px;
            background: var(--divider);
            margin: 24px 0;
        }

        .organisation {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        @media (max-width: 380px) {
            .organisation {
                font-size: 12px;
            }
        }

        .department {
            font-size: 13px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.6;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--status-on-bg);
            color: var(--status-on-fg);
            margin-top: 16px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .flip-affordance {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .chevron-down {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }

        .contact-rows {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 36px 1fr 16px;
            align-items: center;
            gap: 12px;
            min-height: 44px;
            padding: 4px 8px;
            margin: 0 -8px;
            border-radius: 12px;
            transition: background var(--t-fast) var(--ease-out);
            text-decoration: none;
            color: inherit;
        }

        .contact-row:hover {
            background: var(--surface-sunk);
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent-tint);
            color: var(--accent);
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .contact-content {
            min-width: 0;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }

        .contact-value {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-primary);
            margin-top: 2px;
            word-break: break-word;
        }

        .external-icon {
            width: 16px;
            height: 16px;
            stroke: var(--text-tertiary);
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }

        .credential-strip {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 300;
            color: var(--text-tertiary);
        }

        .button-row {
            display: flex;
            gap: 8px;
            width: 360px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .button-row {
                width: 400px;
            }
        }

        .btn {
            height: 44px;
            padding: 0 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border: none;
            transition: transform var(--t-fast) var(--ease-out),
                        background var(--t-fast) var(--ease-out);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-on-accent);
            flex: 1;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--accent-ring);
            outline-offset: 2px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-card);
            flex: 1;
        }

        .btn-secondary:hover {
            background: var(--surface-sunk);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .qr-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--divider);
        }

        .qr-container {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        #qrcode {
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
        }

        .share-actions {
            display: flex;
            gap: 8px;
            width: 360px;
            margin: 16px auto 0;
        }

        @media (min-width: 768px) {
            .share-actions {
                width: 400px;
            }
        }

        .btn-tertiary {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-card);
            height: 44px;
            padding: 0 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: transform var(--t-fast) var(--ease-out),
                        background var(--t-fast) var(--ease-out);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
        }

        .btn-tertiary:hover {
            background: var(--surface-sunk);
        }

        .btn-tertiary:active {
            transform: scale(0.98);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
        }

        .btn-whatsapp:hover {
            background: #20BA5A;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all var(--t-base) var(--ease-out);
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .spacer {
            flex: 1;
        }

        .bio-section {
            margin-top: 16px;
            padding: 16px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
        }

        .bio-text {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="card-wrapper" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
            <div class="card-face card-front card">

    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#6366f1",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        function initCard() {
            document.getElementById('heroName').textContent = CONFIG.name;
            document.getElementById('heroTitle').textContent = CONFIG.title;
            document.getElementById('organisation').textContent = CONFIG.company;
            document.getElementById('location').textContent = CONFIG.location;
            document.getElementById('phoneValue').textContent = formatPhoneDisplay(CONFIG.phone);
            document.getElementById('emailValue').textContent = CONFIG.email;
            document.getElementById('locationValueBack').textContent = CONFIG.location;
            document.getElementById('websiteValue').textContent = CONFIG.website.replace('https://', '').replace('http://', '');
            
            document.getElementById('phoneRow').href = 'tel:' + CONFIG.phone;
            document.getElementById('emailRow').href = 'mailto:' + CONFIG.email;
            document.getElementById('websiteRow').href = CONFIG.website;

            const avatarName = CONFIG.name.split(' ').slice(0, 2).join('+');
            document.getElementById('avatarImage').src = `https://ui-avatars.com/api/?name=${avatarName}&size=144&background=${CONFIG.color.substring(1)}&color=fff&bold=true`;

            generateQRCode();
        }

        function formatPhoneDisplay(phone) {
            const cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('60')) {
                const withoutCountry = cleaned.substring(2);
                return `+60 ${withoutCountry.substring(0, 2)}-${withoutCountry.substring(2, 5)} ${withoutCountry.substring(5)}`;
            }
            return phone;
        }

        function flipCard() {
            const cardInner = document.getElementById('cardInner');
            cardInner.classList.toggle('flipped');
        }

        function generateQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            const vCardData = generateVCardData();
            
            new QRCode(qrContainer, {
                text: vCardData,
                width: 160,
                height: 160,
                colorDark: CONFIG.color,
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function generateVCardData() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location};;;;`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        function downloadVCard() {
            const vCardData = generateVCardData();
            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showToast('Contact saved successfully!');
        }

        function openWhatsApp() {
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phone = CONFIG.phone.replace(/\D/g, '');
            const url = `https://wa.me/${phone}?text=${message}`;
            window.open(url, '_blank');
        }

        function copyLink() {
            const url = window.location.href;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('Link copied to clipboard!');
                }).catch(() => {
                    fallbackCopyLink(url);
                });
            } else {
                fallbackCopyLink(url);
            }
        }

        function fallbackCopyLink(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('Link copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy link');
            }
            
            document.body.removeChild(textArea);
        }

        function shareCard() {
            const shareData = {
                title: CONFIG.name,
                text: `${CONFIG.title} at ${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(() => {
                    copyLink();
                });
            } else {
                copyLink();
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', initCard);
    </script>
</body>
</html>
