<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card - Minimal Clean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="../../manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-page: #FAFAFA;
      --bg-card-front: #FFFFFF;
      --bg-card-back: #F9FAFB;
      --bg-row: #FFFFFF;
      --bg-row-hover: #F3F4F6;
      --border-card: #E5E7EB;
      --border-soft: #EEF0F3;
      --hairline: #F1F2F4;
      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-tertiary: #6B7280;
      --text-label: #9CA3AF;
      --accent: #6B70D6;
      --accent-hover: #5258C2;
      --accent-soft: #EEF0FB;
      --accent-ring: rgba(107, 112, 214, 0.18);
      --status-ok: #15803D;
      --status-ok-soft: #ECFDF5;
      --status-warn: #B45309;
      --status-warn-soft: #FFFBEB;
      --shadow-card: 0 1px 2px rgba(17, 24, 39, 0.04), 0 8px 24px rgba(17, 24, 39, 0.06);
      --shadow-hover: 0 2px 4px rgba(17, 24, 39, 0.05), 0 16px 40px rgba(17, 24, 39, 0.08);
      --radius-card: 20px;
      --radius-row: 12px;
      --radius-badge: 20px;
      --radius-btn: 12px;
      --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      --ease-emphasis: cubic-bezier(0.3, 0, 0, 1);
      --dur-fast: 140ms;
      --dur-base: 220ms;
      --dur-flip: 560ms;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card-container {
      width: 340px;
      height: 200px;
      transition: height 560ms cubic-bezier(0.4, 0, 0.2, 1);
      perspective: 1600px;
      margin: 0 auto 32px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: pointer;
      transition: transform var(--dur-base) var(--ease-standard);
      will-change: transform;
    }

    @media (hover: hover) and (pointer: fine) {
      .card:hover {
        transform: translateY(-2px);
      }
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform var(--dur-flip) var(--ease-emphasis);
      will-change: transform;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-card);
      background: var(--bg-card-front);
      box-shadow: var(--shadow-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-face--back {
      background: var(--bg-card-back);
      transform: rotateY(180deg);
      padding: 20px;
    }

    .status-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-badge);
      background: var(--status-ok-soft);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--status-ok);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-ok);
    }

    .identity-block {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .company {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-top: 12px;
    }

    .accent-hairline {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      transform-origin: right center;
      transition: transform var(--dur-base) var(--ease-emphasis);
    }

    @media (hover: hover) and (pointer: fine) {
      .card:hover .accent-hairline {
        transform: scaleX(1.75);
      }
    }

    .back-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 16px;
    }

    .back-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .back-identity {
      flex: 1;
      min-width: 0;
    }

    .back-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .back-meta {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .contact-rows {
      display: flex;
      flex-direction: column;
    }

    .contact-row {
      display: flex;
      align-items: center;
      min-height: 56px;
      padding: 8px 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: opacity var(--dur-fast) var(--ease-standard);
      border-bottom: 1px solid var(--hairline);
    }

    .contact-row:last-child {
      border-bottom: none;
    }

    .contact-row:active {
      opacity: 0.72;
    }

    .contact-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--accent);
      stroke-width: 1.5;
      fill: none;
    }

    .contact-text {
      flex: 1;
      margin-left: 12px;
      min-width: 0;
    }

    .contact-primary {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-meta {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .contact-chevron {
      width: 16px;
      height: 16px;
      stroke: var(--text-label);
      stroke-width: 1.5;
      fill: none;
      margin-left: 8px;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 12px;
      width: 340px;
      margin: 0 auto 24px;
    }

    .btn {
      height: 48px;
      padding: 0 20px;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      border: none;
      transition: transform var(--dur-fast) var(--ease-standard),
                  opacity var(--dur-fast) var(--ease-standard),
                  background var(--dur-fast) var(--ease-standard);
      flex: 1;
    }

    .btn-primary {
      background: var(--accent);
      color: #FFFFFF;
      border: 1px solid var(--accent);
    }

    @media (hover: hover) and (pointer: fine) {
      .btn-primary:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-ring);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-card);
    }

    @media (hover: hover) and (pointer: fine) {
      .btn-secondary:hover {
        background: var(--bg-row-hover);
      }
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .btn-secondary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
    }

    .secondary-actions {
      display: flex;
      gap: 12px;
      width: 340px;
      margin: 0 auto;
      justify-content: center;
    }

    .btn-icon {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: var(--radius-btn);
      background: transparent;
      border: 1px solid var(--border-card);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-standard);
    }

    @media (hover: hover) and (pointer: fine) {
      .btn-icon:hover {
        background: var(--bg-row-hover);
      }
    }

    .btn-icon:active {
      transform: scale(0.95);
    }

    .btn-icon:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-primary);
      stroke-width: 1.5;
      fill: none;
    }

    .qr-section {
      width: 340px;
      margin: 0 auto;
      padding: 20px;
      border-radius: var(--radius-card);
      background: var(--bg-card-front);
      border: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .qr-container {
      padding: 16px;
      background: #FFFFFF;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
    }

    .qr-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text-primary);
      color: #FFFFFF;
      padding: 12px 20px;
      border-radius: var(--radius-btn);
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease-emphasis),
                  transform var(--dur-base) var(--ease-emphasis);
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 1ms !important;
        animation: none !important;
      }
    }

    @media (min-width: 768px) {
      .card-container {
        width: 380px;
        height: 240px;
      }

      .actions,
      .secondary-actions,
      .qr-section {
        width: 380px;
      }

      .name {
        font-size: 32px;
      }

      .card-face {
        padding: 32px;
      }

      .card-face--back {
        padding: 24px;
      }

      .status-badge {
        top: 32px;
        left: 32px;
      }

      .identity-block {
        bottom: 32px;
        left: 32px;
        right: 32px;
      }

      .accent-hairline {
        bottom: 32px;
        right: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-face--front">
          <div class="status-badge">
            <span class="status-dot"></span>
            <span>Available</span>
          </div>
          <div class="identity-block">
            <div class="name" id="displayName"></div>
            <div class="title" id="displayTitle"></div>
            <div class="company" id="displayCompany"></div>
          </div>
          <div class="accent-hairline"></div>
        </div>

        <div class="card-face card-face--back">
          <div class="back-header">
            <div class="back-photo" id="backPhoto"></div>
            <div class="back-identity">
              <div class="back-name" id="backName"></div>
              <div class="back-meta" id="backMeta"></div>
            </div>
          </div>

          <div class="contact-rows">
            <button class="contact-row" id="phoneRow" type="button">
              <div class="contact-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div class="contact-text">
                <div class="contact-primary" id="phoneDisplay"></div>
                <div class="contact-meta">Mobile</div>
              </div>
              <svg class="contact-chevron" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <button class="contact-row" id="emailRow" type="button">
              <div class="contact-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </div>
              <div class="contact-text">
                <div class="contact-primary" id="emailDisplay"></div>
                <div class="contact-meta">Work email</div>
              </div>
              <svg class="contact-chevron" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <button class="contact-row" id="websiteRow" type="button">
              <div class="contact-icon">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
              </div>
              <div class="contact-text">
                <div class="contact-primary" id="websiteDisplay"></div>
                <div class="contact-meta">Website</div>
              </div>
              <svg class="contact-chevron" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <button class="contact-row" id="locationRow" type="button">
              <div class="contact-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <div class="contact-text">
                <div class="contact-primary" id="locationDisplay"></div>
                <div class="contact-meta">Location</div>
              </div>
              <svg class="contact-chevron" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="saveContactBtn">Save Contact</button>
    <button class="btn btn-secondary" id="flipBtn">View Contact</button>
  </div>

  <div class="secondary-actions">
    <button class="btn-icon" id="whatsappBtn" title="Message on WhatsApp">
      <svg viewBox="0 0 24 24">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
    </button>
    <button class="btn-icon" id="copyLinkBtn" title="Copy link">
      <svg viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
      </svg>
    </button>
    <button class="btn-icon" id="shareBtn" title="Share">
      <svg viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
    </button>
  </div>

  <div class="qr-section">
    <div class="qr-container" id="qrcode"></div>
    <div class="qr-label">Scan to save contact</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const CONFIG = {
      name: "Ahmad Faris bin Razak",
      title: "Founder & CEO",
      company: "Pixel Reka Sdn Bhd",
      phone: "+60123456789",
      email: "faris@pixelreka.com.my",
      website: "https://pixelreka.com.my",
      location: "Kuala Lumpur, Malaysia",
      bio: "Building digital solutions for Malaysian SMEs",
      color: "#6366f1",
      whatsapp_message: "Hi Faris, I found your digital card!",
      social: { linkedin: "", instagram: "", facebook: "", twitter: "", tiktok: "", youtube: "", pinterest: "" },
      gallery: [],
      video_url: "",
      video_caption: "",
      booking_url: "",
      maps_url: "",
      custom_links: []
    };

    // Populate card with data
    document.getElementById('displayName').textContent = CONFIG.name;
    document.getElementById('displayTitle').textContent = CONFIG.title;
    document.getElementById('displayCompany').textContent = CONFIG.company;
    document.getElementById('backName').textContent = CONFIG.name;
    document.getElementById('backMeta').textContent = CONFIG.company;
    
    // Get initials for photo
    const initials = CONFIG.name
      .split(' ')
      .filter(n => n.length > 0)
      .map(n => n[0])
      .slice(0, 2)
      .join('')
      .toUpperCase();
    document.getElementById('backPhoto').textContent = initials;

    // Populate contact rows
    document.getElementById('phoneDisplay').textContent = CONFIG.phone;
    document.getElementById('emailDisplay').textContent = CONFIG.email;
    document.getElementById('websiteDisplay').textContent = CONFIG.website.replace(/^https?:\/\//, '');
    document.getElementById('locationDisplay').textContent = CONFIG.location;

    // Card flip functionality
    const card = document.getElementById('card');
    const cardInner = document.getElementById('cardInner');
    const cardContainer = document.querySelector('.card-container');
    const flipBtn = document.getElementById('flipBtn');
    let isFlipped = false;

    function toggleFlip() {
      isFlipped = !isFlipped;
      cardInner.classList.toggle('flipped');
      flipBtn.textContent = isFlipped ? 'View Card' : 'View Contact';
      // Expand card to show all contact rows on back, contract on front
      cardContainer.style.height = isFlipped ? '320px' : '200px';
    }

    card.addEventListener('click', toggleFlip);
    flipBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFlip();
    });

    // Generate QR Code
    const qrcode = new QRCode(document.getElementById('qrcode'), {
      text: generateVCardData(),
      width: 128,
      height: 128,
      colorDark: CONFIG.color,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    // Generate vCard data
    function generateVCardData() {
      return `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
ORG:${CONFIG.company}
TITLE:${CONFIG.title}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;
    }

    // Save contact functionality
    document.getElementById('saveContactBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      const vCardData = generateVCardData();
      const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('Contact saved!');
    });

    // Contact row interactions
    document.getElementById('phoneRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.location.href = `tel:${CONFIG.phone}`;
    });

    document.getElementById('emailRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.location.href = `mailto:${CONFIG.email}`;
    });

    document.getElementById('websiteRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.open(CONFIG.website, '_blank');
    });

    document.getElementById('locationRow').addEventListener('click', function(e) {
      e.stopPropagation();
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(CONFIG.location)}`;
      window.open(mapsUrl, '_blank');
    });

    // WhatsApp button
    document.getElementById('whatsappBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      const phoneNumber = CONFIG.phone.replace(/\D/g, '');
      const message = encodeURIComponent(CONFIG.whatsapp_message);
      const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
      window.open(whatsappUrl, '_blank');
    });

    // Copy link button
    document.getElementById('copyLinkBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      const currentUrl = window.location.href;
      navigator.clipboard.writeText(currentUrl).then(function() {
        showToast('Link copied to clipboard!');
      }).catch(function(err) {
        showToast('Failed to copy link');
      });
    });

    // Share button
    document.getElementById('shareBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      if (navigator.share) {
        navigator.share({
          title: `${CONFIG.name} - Digital Business Card`,
          text: `Check out ${CONFIG.name}'s digital business card`,
          url: window.location.href
        }).catch(function(err) {
          if (err.name !== 'AbortError') {
            fallbackShare();
          }
        });
      } else {
        fallbackShare();
      }
    });

    function fallbackShare() {
      const currentUrl = window.location.href;
      navigator.clipboard.writeText(currentUrl).then(function() {
        showToast('Link copied for sharing!');
      }).catch(function(err) {
        showToast('Share not available');
      });
    }

    // Toast notification
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }

    // Prevent card flip when interacting with buttons inside back face
    document.querySelectorAll('.contact-row').forEach(function(row) {
      row.addEventListener('click', function(e) {
        e.stopPropagation();
      });
    });
  </script>

  <!-- Phase 4: Interactive components -->
  <div id="booking-container" style="padding:0 20px 8px"></div>
  <div id="social-container" style="padding:0 20px 8px"></div>
  <div id="gallery-container" style="padding:0 20px 16px"></div>
  <div id="video-container" style="padding:0 20px 16px"></div>
  <script type="module">
    import { initBookingLocation } from '../components/booking-location.js';
    import { initSocialLinks } from '../components/social-links.js';
    import { initGallery } from '../components/gallery.js';
    import { initVideoEmbed } from '../components/video-embed.js';
    document.addEventListener('DOMContentLoaded', () => {
      initBookingLocation('booking-container');
      initSocialLinks('social-container');
      initGallery('gallery-container');
      initVideoEmbed('video-container');
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js');
    }
  </script>
</body>
