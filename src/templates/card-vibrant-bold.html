<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Vibrant Bold</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* Surfaces */
            --bg: #0d0d0d;
            --card-back: #1a1a1a;
            --surface-elev: #1f1f1f;
            --surface-line: #262626;

            /* Accent system */
            --accent: #EC4899;
            --accent-deep: #BE1E6E;
            --accent-soft: #F472B6;
            --accent-ink: #FCE7F3;

            /* Supporting hues */
            --amber: #F59E0B;
            --violet: #7C3AED;

            /* Text */
            --text-hi: #FAFAFA;
            --text-mid: #A3A3A3;
            --text-lo: #737373;
            --text-on-accent: #1a1a1a;

            /* Card front gradient */
            --grad-front: linear-gradient(135deg, #EC4899 0%, #BE1E6E 55%, #7C3AED 100%);

            /* Motion */
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur-fast: 160ms;
            --dur-base: 220ms;
            --dur-flip: 280ms;

            /* Radius */
            --r-sm: 8px;
            --r-md: 16px;
            --r-lg: 24px;
            --r-pill: 999px;
            --r-badge: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-hi);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 480px;
            width: 100%;
            animation: fadeInUp var(--dur-flip) var(--ease-out);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-wrapper {
            width: 340px;
            height: 540px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 380px;
                height: 580px;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-snap);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--r-lg);
            overflow: hidden;
        }

        .card-front {
            background: var(--grad-front);
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            padding: 32px 24px;
            position: relative;
        }

        .card-back::after {
            content: "";
            position: absolute;
            right: -16px;
            bottom: -16px;
            width: 128px;
            height: 128px;
            background-image: radial-gradient(var(--accent) 1.5px, transparent 2px);
            background-size: 8px 8px;
            opacity: 0.18;
            pointer-events: none;
        }

        .front-badge {
            position: absolute;
            top: 24px;
            left: 24px;
            transform: rotate(-6deg);
            background: var(--text-hi);
            color: var(--accent-deep);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: var(--r-badge);
            transition: transform var(--dur-fast) var(--ease-snap);
            z-index: 10;
        }

        .front-badge:hover {
            transform: rotate(-6deg) scale(1.05);
        }

        .front-name {
            position: absolute;
            top: 180px;
            left: 24px;
            right: 24px;
            font-weight: 800;
            font-size: 40px;
            line-height: 0.92;
            letter-spacing: -0.04em;
            color: var(--text-hi);
        }

        @media (min-width: 768px) {
            .front-name {
                font-size: 56px;
            }
        }

        .front-role {
            position: absolute;
            top: 312px;
            left: 24px;
            right: 24px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent-ink);
            opacity: 0.9;
        }

        @media (min-width: 768px) {
            .front-role {
                font-size: 16px;
            }
        }

        .front-identity {
            position: absolute;
            bottom: 80px;
            left: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .front-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--text-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent-deep);
            flex-shrink: 0;
        }

        .front-handle {
            font-weight: 400;
            font-size: 16px;
            color: var(--text-hi);
        }

        .front-flip-hint {
            position: absolute;
            bottom: 24px;
            right: 24px;
            font-weight: 300;
            font-size: 12px;
            color: var(--text-hi);
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse 1400ms ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .section-label {
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 8px;
            position: relative;
            padding-bottom: 8px;
        }

        .section-label::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 32px;
            height: 2px;
            background: var(--accent);
        }

        @media (min-width: 768px) {
            .section-label {
                font-size: 12px;
            }
        }

        .contact-section {
            margin-bottom: 32px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 36px 1fr 16px;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--surface-line);
            min-height: 44px;
            transition: transform var(--dur-base) var(--ease-out);
            cursor: pointer;
        }

        .contact-row:hover {
            transform: translateX(2px);
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--r-sm);
            background: rgba(236, 72, 153, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 18px;
        }

        .contact-label {
            font-weight: 400;
            font-size: 14px;
            letter-spacing: -0.005em;
            color: var(--text-hi);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .contact-label {
                font-size: 15px;
            }
        }

        .contact-chevron {
            width: 14px;
            height: 14px;
            color: var(--text-lo);
            transition: all var(--dur-base) var(--ease-out);
        }

        .contact-row:hover .contact-chevron {
            color: var(--accent);
            transform: translateX(4px);
        }

        .works-section {
            margin-bottom: 24px;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 20px;
            padding: 2px 10px;
            font-weight: 700;
            font-size: 11px;
            line-height: 1.6;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: rgba(236, 72, 153, 0.16);
            color: var(--accent-soft);
        }

        .back-flip-hint {
            position: absolute;
            bottom: 24px;
            left: 24px;
            font-weight: 300;
            font-size: 12px;
            color: var(--text-mid);
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 700;
            font-size: 15px;
            line-height: 1;
            letter-spacing: 0.02em;
            padding: 14px 24px;
            border-radius: var(--r-pill);
            border: none;
            min-height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform var(--dur-fast) var(--ease-snap);
            text-decoration: none;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-on-accent);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-hi);
            border: 2px solid var(--text-hi);
        }

        .btn-secondary:hover {
            background: var(--text-hi);
            color: var(--bg);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .qr-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--surface-line);
            text-align: center;
        }

        .qr-label {
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 16px;
        }

        .qr-code {
            display: inline-block;
            padding: 16px;
            background: var(--text-hi);
            border-radius: var(--r-md);
        }

        #qrcode canvas {
            display: block;
        }

        .icon-phone::before { content: "📞"; }
        .icon-email::before { content: "✉️"; }
        .icon-web::before { content: "🌐"; }
        .icon-location::before { content: "📍"; }
        .icon-arrow::before { content: "→"; }
        .icon-flip-right::before { content: "▶"; }
        .icon-flip-left::before { content: "◀"; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--text-on-accent);
            padding: 12px 24px;
            border-radius: var(--r-pill);
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: all var(--dur-base) var(--ease-out);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 767px) {
            .front-name {
                top: 160px;
                font-size: 36px;
            }
            .front-role {
                top: 280px;
            }
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <div class="card-face card-front">
                    <div class="front-badge">AVAILABLE NOW</div>
                    <div class="front-name" id="frontName"></div>
                    <div class="front-role" id="frontRole"></div>
                    <div class="front-identity">
                        <div class="front-avatar" id="frontAvatar"></div>
                        <div class="front-handle" id="frontHandle"></div>
                    </div>
                    <div class="front-flip-hint">
                        <span>flip</span>
                        <span class="icon-flip-right"></span>
                    </div>
                </div>

                <div class="card-face card-back">
                    <div class="contact-section">
                        <div class="section-label">Contact</div>
                        <div class="contact-row" id="phoneRow">
                            <div class="contact-icon icon-phone"></div>
                            <div class="contact-label" id="phoneLabel"></div>
                            <div class="contact-chevron icon-arrow"></div>
                        </div>
                        <div class="contact-row" id="emailRow">
                            <div class="contact-icon icon-email"></div>
                            <div class="contact-label" id="emailLabel"></div>
                            <div class="contact-chevron icon-arrow"></div>
                        </div>
                        <div class="contact-row" id="websiteRow">
                            <div class="contact-icon icon-web"></div>
                            <div class="contact-label" id="websiteLabel"></div>
                            <div class="contact-chevron icon-arrow"></div>
                        </div>
                        <div class="contact-row" id="locationRow">
                            <div class="contact-icon icon-location"></div>
                            <div class="contact-label" id="locationLabel"></div>
                            <div class="contact-chevron icon-arrow"></div>
                        </div>
                    </div>

                    <div class="works-section">
                        <div class="section-label">What I Do</div>
                        <div class="badge-group" id="badgeGroup"></div>
                    </div>

                    <div class="back-flip-hint">
                        <span class="icon-flip-left"></span>
                        <span>flip</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="#" class="btn btn-primary" id="whatsappBtn">
                💬 WhatsApp Me
            </a>
            <div class="btn-row">
                <button class="btn btn-secondary" id="copyBtn">
                    📋 Copy Link
                </button>
                <button class="btn btn-secondary" id="shareBtn">
                    📤 Share
                </button>
            </div>
            <button class="btn btn-secondary" id="downloadBtn">
                💾 Save Contact
            </button>
        </div>

        <div class="qr-section">
            <div class="qr-label">Scan to Connect</div>
            <div class="qr-code">
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#EC4899",
            whatsapp_message: "Hi Faris, I found your digital card!",
            works_with: ["SMEs", "Startups", "Brands"]
        };

        // Initialize card
        function initCard() {
            // Front face
            const nameParts = CONFIG.name.split(' ');
            const firstName = nameParts[0];
            const lastName = nameParts.slice(1).join(' ');
            document.getElementById('frontName').innerHTML = `${firstName}<br>${lastName}`;
            document.getElementById('frontRole').textContent = `${CONFIG.title} · ${CONFIG.company}`;
            
            // Avatar with initials
            const initials = CONFIG.name.split(' ').map(n => n[0]).join('').slice(0, 2);
            document.getElementById('frontAvatar').textContent = initials;
            
            // Handle/website
            const websiteDisplay = CONFIG.website.replace('https://', '').replace('http://', '');
            document.getElementById('frontHandle').textContent = websiteDisplay;

            // Back face - Contact
            document.getElementById('phoneLabel').textContent = CONFIG.phone;
            document.getElementById('emailLabel').textContent = CONFIG.email;
            document.getElementById('websiteLabel').textContent = websiteDisplay;
            document.getElementById('locationLabel').textContent = CONFIG.location;

            // Works with badges
            const badgeGroup = document.getElementById('badgeGroup');
            CONFIG.works_with.forEach(item => {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = item;
                badgeGroup.appendChild(badge);
            });
        }

        // Flip card
        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');
        
        cardWrapper.addEventListener('click', () => {
            cardInner.classList.toggle('flipped');
        });

        // Contact row clicks
        document.getElementById('phoneRow').addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = `tel:${CONFIG.phone}`;
        });

        document.getElementById('emailRow').addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = `mailto:${CONFIG.email}`;
        });

        document.getElementById('websiteRow').addEventListener('click', (e) => {
            e.stopPropagation();
            window.open(CONFIG.website, '_blank');
        });

        document.getElementById('locationRow').addEventListener('click', (e) => {
            e.stopPropagation();
            const locationQuery = encodeURIComponent(CONFIG.location);
            window.open(`https://www.google.com/maps/search/?api=1&query=${locationQuery}`, '_blank');
        });

        // WhatsApp
        document.getElementById('whatsappBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const phoneClean = CONFIG.phone.replace(/\+/g, '').replace(/\s/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            window.open(`https://wa.me/${phoneClean}?text=${message}`, '_blank');
        });

        // Copy link
        document.getElementById('copyBtn').addEventListener('click', () => {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy link');
            });
        });

        // Share
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `${CONFIG.name} - ${CONFIG.title}`,
                        text: CONFIG.bio,
                        url: window.location.href
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showToast('Failed to share');
                    }
                }
            } else {
                const currentUrl = window.location.href;
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast('Link copied to clipboard!');
                });
            }
        });

        // Download vCard
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TEL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ORG:${CONFIG.company}
TITLE:${CONFIG.title}
ADR:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved!');
        });

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Generate QR code
        function generateQR() {
            const qrData = CONFIG.website || window.location.href;
            new QRCode(document.getElementById('qrcode'), {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: CONFIG.color,
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initCard();
            generateQR();
        });

        // Keyboard accessibility for card flip
        cardWrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cardInner.classList.toggle('flipped');
            }
        });

        // Make card wrapper focusable
        cardWrapper.setAttribute('tabindex', '0');
        cardWrapper.setAttribute('role', 'button');
        cardWrapper.setAttribute('aria-label', 'Flip business card');

        // Add focus styles
        cardWrapper.addEventListener('focus', () => {
            cardWrapper.style.outline = `2px solid ${CONFIG.color}`;
            cardWrapper.style.outlineOffset = '4px';
        });

        cardWrapper.addEventListener('blur', () => {
            cardWrapper.style.outline = 'none';
        });

        // Prevent card flip when clicking action buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        });

        // Update CSS custom property for accent color if needed
        if (CONFIG.color !== '#EC4899') {
            document.documentElement.style.setProperty('--accent', CONFIG.color);
        }

        // Preload fonts
        if (document.fonts) {
            document.fonts.load('800 56px Outfit').then(() => {
                console.log('Fonts loaded');
            });
        }

        // Handle visibility change for animations
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cardInner.style.animationPlayState = 'paused';
            } else {
                cardInner.style.animationPlayState = 'running';
            }
        });

        // Analytics placeholder
        function trackEvent(action, label) {
            console.log(`Event: ${action} - ${label}`);
            // Integration point for analytics (GA4, Mixpanel, etc.)
        }

        // Track button clicks
        document.getElementById('whatsappBtn').addEventListener('click', () => trackEvent('click', 'whatsapp'));
        document.getElementById('copyBtn').addEventListener('click', () => trackEvent('click', 'copy_link'));
        document.getElementById('shareBtn').addEventListener('click', () => trackEvent('click', 'share'));
        document.getElementById('downloadBtn').addEventListener('click', () => trackEvent('click', 'download_vcard'));

        // Track card flips
        cardWrapper.addEventListener('click', () => {
            const isFlipped = cardInner.classList.contains('flipped');
            trackEvent('flip', isFlipped ? 'to_back' : 'to_front');
        });

        // Performance observer for metrics
        if ('PerformanceObserver' in window) {
            const perfObserver = new PerformanceObserver((list) => {
                for (const entry of list.getEntries()) {
                    if (entry.entryType === 'paint') {
                        console.log(`${entry.name}: ${entry.startTime}ms`);
                    }
                }
            });
            perfObserver.observe({ entryTypes: ['paint'] });
        }

        // Service worker registration placeholder
        if ('serviceWorker' in navigator) {
            // Uncomment to enable offline support
            // navigator.serviceWorker.register('/sw.js');
        }

        // Responsive QR size adjustment
        function adjustQRSize() {
            const qrElement = document.getElementById('qrcode');
            if (window.innerWidth < 400) {
                qrElement.style.transform = 'scale(0.85)';
            } else {
                qrElement.style.transform = 'scale(1)';
            }
        }

        window.addEventListener('resize', adjustQRSize);
        adjustQRSize();

        // Prevent context menu on card for cleaner UX
        cardWrapper.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Add subtle parallax effect on card hover
        if (window.matchMedia('(hover: hover)').matches) {
            cardWrapper.addEventListener('mousemove', (e) => {
                const rect = cardWrapper.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const deltaX = (x - centerX) / centerX;
                const deltaY = (y - centerY) / centerY;
                
                if (!cardInner.classList.contains('flipped')) {
                    cardInner.style.transform = `rotateY(${deltaX * 3}deg) rotateX(${-deltaY * 3}deg)`;
                }
            });

            cardWrapper.addEventListener('mouseleave', () => {
                if (!cardInner.classList.contains('flipped')) {
                    cardInner.style.transform = 'rotateY(0deg) rotateX(0deg)';
                }
            });
        }

        // Intersection observer for scroll animations
        if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.actions, .qr-section').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'opacity 0.4s ease-out, transform 0.4s ease-out';
                observer.observe(el);
            });
        }
    </script>
</body>
</html>
