<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Vibrant Bold</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* Surfaces */
            --bg-page: #0d0d0d;
            --bg-card-back: #1a1a1a;
            --bg-elevated: #1f1f22;
            --bg-chip: rgba(255, 255, 255, 0.06);

            /* Accent system */
            --accent: #EC4899;
            --accent-deep: #BE2D7E;
            --accent-soft: #F472B6;
            --accent-glow: rgba(236, 72, 153, 0.28);

            /* Front gradient */
            --grad-front: linear-gradient(135deg, #EC4899 0%, #C026A8 55%, #7C2D8E 100%);
            --grad-front-overlay: radial-gradient(120% 80% at 15% 0%, rgba(255,255,255,0.18), transparent 60%);

            /* Text */
            --text-primary: #FAFAFA;
            --text-secondary: rgba(250, 250, 250, 0.72);
            --text-muted: rgba(250, 250, 250, 0.52);
            --text-on-accent: #FFFFFF;
            --text-on-back: #F5F5F5;

            /* Strokes & dividers */
            --hairline: rgba(255, 255, 255, 0.08);
            --hairline-back: rgba(255, 255, 255, 0.06);

            /* Status / tag */
            --tag-bg: rgba(255, 255, 255, 0.14);
            --tag-text: #FFFFFF;
            --tag-live-bg: #16A34A;

            /* Motion */
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur-fast: 140ms;
            --dur-base: 220ms;
            --dur-flip: 560ms;

            /* Radii */
            --r-card: 28px;
            --r-button: 14px;
            --r-tag: 20px;
            --r-chip: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card-wrapper {
            width: 340px;
            height: 200px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-snap);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-face--front {
            background: var(--grad-front);
            border-radius: var(--r-card);
            padding: 32px 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-face--front::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--grad-front-overlay);
            pointer-events: none;
        }

        .card-face--front::after {
            content: "";
            position: absolute;
            left: -10%;
            bottom: 22%;
            width: 120%;
            height: 6px;
            background: #FAFAFA;
            opacity: 0.85;
            transform: rotate(-8deg);
            transform-origin: center;
            transition: transform var(--dur-base) var(--ease-snap);
        }

        .card-wrapper:hover .card-face--front::after {
            transform: rotate(-8deg) translateX(8px) scaleX(1.04);
        }

        .card-face--back {
            background: var(--bg-card-back);
            border-radius: var(--r-card);
            padding: 24px 20px;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .front-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 2;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 10px;
            border-radius: 20px;
            font: 700 11px/1.6 'Outfit';
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: var(--tag-bg);
            color: var(--tag-text);
        }

        .tag--live {
            background: var(--tag-live-bg);
        }

        .tag--live::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #FFFFFF;
            animation: tag-pulse 1800ms ease-in-out infinite;
        }

        @keyframes tag-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F472B6, #EC4899);
            border: 2px solid rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font: 800 24px/1 'Outfit';
            color: var(--text-on-accent);
            transition: transform var(--dur-base) var(--ease-out);
        }

        .card-wrapper:hover .avatar {
            transform: scale(1.04);
        }

        .front-content {
            position: relative;
            z-index: 2;
            margin-top: auto;
            padding-bottom: 40px;
        }

        .hero-name {
            font: 800 36px/1.1 'Outfit';
            letter-spacing: -0.02em;
            color: var(--text-on-accent);
            margin-bottom: 8px;
            text-wrap: balance;
            max-width: 100%;
        }

        .hero-title {
            font: 600 14px/1.3 'Outfit';
            color: rgba(255, 255, 255, 0.84);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hero-company {
            font: 400 14px/1.3 'Outfit';
            color: rgba(255, 255, 255, 0.72);
        }

        .front-footer {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
            font: 600 11px/1 'Outfit';
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            transition: transform var(--dur-base) var(--ease-out);
        }

        .card-wrapper:hover .front-footer {
            transform: translateX(4px);
        }

        .back-header {
            border-bottom: 1px solid var(--hairline-back);
            padding-bottom: 16px;
        }

        .back-name {
            font: 700 20px/1.3 'Outfit';
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .back-title {
            font: 400 13px/1.4 'Outfit';
            color: var(--text-muted);
        }

        .section-label {
            font: 600 11px/1 'Outfit';
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 36px 1fr 24px;
            align-items: center;
            gap: 12px;
            padding: 12px 8px;
            min-height: 44px;
            border-radius: var(--r-chip);
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out);
            cursor: pointer;
            text-decoration: none;
        }

        @media (hover: hover) {
            .contact-row:hover {
                background: var(--bg-chip);
                transform: translateX(4px);
            }

            .contact-row:hover .chev {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .contact-label {
            font: 600 12px/1 'Outfit';
            letter-spacing: 0.04em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .contact-value {
            font: 400 15px/1.3 'Outfit';
            color: var(--text-on-back);
        }

        .chev {
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity var(--dur-fast), transform var(--dur-fast);
            color: var(--accent);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-on-accent);
            font: 600 15px/1 'Outfit';
            letter-spacing: 0.01em;
            padding: 14px 20px;
            min-height: 48px;
            border-radius: var(--r-button);
            border: none;
            box-shadow: 0 4px 16px var(--accent-glow);
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-base) var(--ease-out);
            cursor: pointer;
            flex: 1;
        }

        @media (hover: hover) {
            .btn-primary:hover {
                transform: translateY(-2px);
                background: var(--accent-soft);
                box-shadow: 0 8px 24px var(--accent-glow);
            }
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: var(--accent-deep);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-on-back);
            font: 600 15px/1 'Outfit';
            padding: 14px 20px;
            min-height: 48px;
            border-radius: var(--r-button);
            border: 1.5px solid rgba(236, 72, 153, 0.55);
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out),
                        border-color var(--dur-fast) var(--ease-out);
            cursor: pointer;
            flex: 1;
        }

        @media (hover: hover) {
            .btn-secondary:hover {
                background: rgba(236, 72, 153, 0.10);
                border-color: var(--accent);
                transform: translateY(-2px);
            }
        }

        .social-icons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 4px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-chip);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out);
            color: var(--text-secondary);
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: scale(1.08);
                background: rgba(236, 72, 153, 0.15);
                color: var(--accent);
            }
        }

        .external-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 340px;
            margin: 0 auto;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            font: 600 15px/1 'Outfit';
            padding: 14px 20px;
            min-height: 48px;
            border-radius: var(--r-button);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out);
        }

        @media (hover: hover) {
            .btn-whatsapp:hover {
                background: #20BA55;
                transform: translateY(-2px);
            }
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            font: 600 15px/1 'Outfit';
            padding: 14px 20px;
            min-height: 48px;
            border-radius: var(--r-button);
            border: 1.5px solid var(--hairline);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform var(--dur-base) var(--ease-out),
                        background-color var(--dur-fast) var(--ease-out),
                        border-color var(--dur-fast) var(--ease-out);
        }

        @media (hover: hover) {
            .btn-outline:hover {
                background: var(--bg-chip);
                border-color: var(--accent);
                transform: translateY(-2px);
            }
        }

        .qr-container {
            width: 340px;
            margin: 32px auto 0;
            padding: 24px;
            background: var(--bg-card-back);
            border-radius: var(--r-card);
            text-align: center;
        }

        .qr-label {
            font: 600 13px/1 'Outfit';
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: var(--r-chip);
        }

        @media (min-width: 768px) {
            .hero-name {
                font-size: 44px;
            }

            .hero-title {
                font-size: 16px;
            }
        }

        @media (max-width: 380px) {
            .card-wrapper {
                width: 100%;
                max-width: 340px;
            }

            .external-actions {
                width: 100%;
                max-width: 340px;
            }

            .qr-container {
                width: 100%;
                max-width: 340px;
            }
        }
    </style>
</head>

    <div class="qr-container">
        <div class="qr-label">Scan QR Code</div>
        <div id="qrcode"></div>
    </div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#EC4899",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        // Initialize card
        function initializeCard() {
            // Set avatar initials
            const nameParts = CONFIG.name.split(' ');
            const initials = nameParts[0][0] + (nameParts[1] ? nameParts[1][0] : '');
            document.getElementById('avatar').textContent = initials.toUpperCase();

            // Set front content
            document.getElementById('heroName').textContent = nameParts[0] + ' ' + (nameParts[1] || '');
            document.getElementById('heroTitle').textContent = CONFIG.title;
            document.getElementById('heroCompany').textContent = CONFIG.company;

            // Set back content
            document.getElementById('backName').textContent = CONFIG.name;
            document.getElementById('backTitle').textContent = CONFIG.title;

            // Set contact values
            document.getElementById('phoneValue').textContent = CONFIG.phone.replace(/(\+60)(\d{2})(\d+)/, '$1 $2 $3');
            document.getElementById('whatsappValue').textContent = CONFIG.phone.replace(/(\+60)(\d{2})(\d+)/, '$1 $2 $3');
            document.getElementById('emailValue').textContent = CONFIG.email;
            document.getElementById('websiteValue').textContent = CONFIG.website.replace('https://', '');
            document.getElementById('locationValue').textContent = CONFIG.location;

            // Set contact links
            document.getElementById('phoneRow').href = `tel:${CONFIG.phone}`;
            document.getElementById('whatsappRow').href = `https://wa.me/${CONFIG.phone.replace(/\+/g, '')}?text=${encodeURIComponent(CONFIG.whatsapp_message)}`;
            document.getElementById('emailRow').href = `mailto:${CONFIG.email}`;
            document.getElementById('websiteRow').href = CONFIG.website;

            // Generate QR code
            const currentUrl = window.location.href;
            new QRCode(document.getElementById('qrcode'), {
                text: currentUrl,
                width: 160,
                height: 160,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Card flip functionality
        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');

        cardWrapper.addEventListener('click', function() {
            cardInner.classList.toggle('flipped');
        });

        // Save contact as vCard
        function generateVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
N:${CONFIG.name.split(' ').reverse().join(';')};;;
ORG:${CONFIG.company}
TITLE:${CONFIG.title}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR;TYPE=WORK:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        document.getElementById('saveContactBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            generateVCard();
        });

        // Share functionality
        document.getElementById('shareBtn').addEventListener('click', async function(e) {
            e.stopPropagation();
            const shareData = {
                title: `${CONFIG.name} - Digital Business Card`,
                text: `Check out ${CONFIG.name}'s digital business card`,
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        });

        // WhatsApp button
        document.getElementById('externalWhatsappBtn').addEventListener('click', function() {
            const whatsappUrl = `https://wa.me/${CONFIG.phone.replace(/\+/g, '')}?text=${encodeURIComponent(CONFIG.whatsapp_message)}`;
            window.open(whatsappUrl, '_blank');
        });

        // Copy link button
        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const originalText = this.querySelector('span').textContent;
                this.querySelector('span').textContent = 'Link Copied!';
                setTimeout(() => {
                    this.querySelector('span').textContent = originalText;
                }, 2000);
            });
        });

        // Share card button
        document.getElementById('shareCardBtn').addEventListener('click', async function() {
            const shareData = {
                title: `${CONFIG.name} - Digital Business Card`,
                text: `Check out ${CONFIG.name}'s digital business card`,
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        });

        // Social buttons (placeholder - add actual links)
        document.getElementById('linkedinBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://linkedin.com', '_blank');
        });

        document.getElementById('twitterBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://twitter.com', '_blank');
        });

        document.getElementById('instagramBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://instagram.com', '_blank');
        });

        document.getElementById('facebookBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://facebook.com', '_blank');
        });

        document.getElementById('githubBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://github.com', '_blank');
        });

        // Initialize on load
        initializeCard();
    </script>
