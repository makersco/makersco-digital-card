<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Neo Brutalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #FFFBF0;
            --card-front: #FF5C39;
            --card-back: #0a0a0f;
            --accent: #FF5C39;
            --ink: #000000;
            --ink-soft: #1a1a1a;
            --paper: #FFFBF0;
            --paper-shade: #F2EBD9;
            --border-w: 3px;
            --shadow-hard: 8px 8px 0 0 #000000;
            --shadow-hard-sm: 4px 4px 0 0 #000000;
            --radius-card: 4px;
            --radius-badge: 20px;
            --ease-snap: cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--ink);
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
        }

        .card-wrapper {
            width: 340px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 220ms var(--ease-snap);
        }

        .card-wrapper:hover {
            transform: translate(-2px, -2px);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: var(--border-w) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-hard);
        }

        .card-wrapper:hover .card-inner {
            box-shadow: 10px 10px 0 0 var(--ink);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            overflow: hidden;
        }

        .face-front {
            background: var(--card-front);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .face-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .front-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: auto;
        }

        .monogram {
            width: 44px;
            height: 44px;
            background: var(--card-back);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            position: relative;
            z-index: 2;
        }

        .monogram-text {
            font-weight: 800;
            font-size: 18px;
            color: var(--paper);
            letter-spacing: -0.02em;
        }

        .tape-label {
            position: absolute;
            top: -4px;
            left: -8px;
            width: 60px;
            height: 18px;
            background: var(--paper);
            border: 2px solid var(--ink);
            transform: rotate(-4deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 0.08em;
            z-index: 10;
        }

        .status-badge {
            background: var(--paper);
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: var(--radius-badge);
            padding: 4px 12px;
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: transform 180ms var(--ease-snap);
        }

        .status-badge:hover {
            transform: translate(-1px, -1px);
        }

        .front-footer {
            margin-top: auto;
            position: relative;
        }

        .name-hero {
            font-weight: 700;
            font-size: 32px;
            line-height: 0.95;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .title-role {
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
            margin-bottom: 2px;
        }

        .company-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--ink);
        }

        .decorative-strip {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 80px;
            height: 8px;
            background: var(--card-back);
        }

        .back-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-label {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .accent-square {
            width: 12px;
            height: 12px;
            background: var(--accent);
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 20px 70px 1fr;
            align-items: center;
            gap: 8px;
            min-height: 28px;
        }

        .contact-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .contact-label {
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .contact-value {
            font-weight: 400;
            font-size: 13px;
            letter-spacing: -0.005em;
            color: var(--paper);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .back-footer {
            margin-top: auto;
            padding-top: 12px;
            border-top: 2px solid var(--accent);
        }

        .footer-text {
            font-weight: 600;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--paper);
            text-align: center;
        }

        .actions-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 12px 20px;
            background: var(--paper);
            color: var(--ink);
            border: var(--border-w) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-hard-sm);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: transform 140ms var(--ease-snap), opacity 140ms linear;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 0 var(--ink);
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 0 var(--ink);
        }

        .btn--primary {
            background: var(--accent);
            color: var(--ink);
        }

        .btn--ghost {
            background: transparent;
            color: var(--ink);
        }

        .btn--full {
            grid-column: 1 / -1;
        }

        .qr-section {
            width: 100%;
            padding: 24px;
            background: var(--paper);
            border: var(--border-w) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-hard-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .qr-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qr-marker {
            width: 12px;
            height: 12px;
            background: var(--accent);
        }

        .qr-title {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
        }

        #qr-code {
            padding: 16px;
            background: white;
            border: var(--border-w) solid var(--ink);
            border-radius: var(--radius-card);
        }

        #qr-code canvas {
            display: block;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--ink);
            color: var(--paper);
            padding: 16px 24px;
            border: var(--border-w) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-hard-sm);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.04em;
            transform: translateX(400px);
            transition: transform 220ms var(--ease-snap);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 400px) {
            .card-wrapper {
                width: 300px;
                height: 176px;
            }

            .name-hero {
                font-size: 26px;
            }

            .title-role {
                font-size: 10px;
            }

            .company-name {
                font-size: 12px;
            }

            .contact-row {
                grid-template-columns: 18px 60px 1fr;
                gap: 6px;
            }

            .contact-value {
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <div class="face face-front">
                    <div class="front-header">
                        <div class="monogram">
                            <div class="tape-label">№ 047</div>
                            <span class="monogram-text" id="monogramText">AF</span>
                        </div>
                        <div class="status-badge">AVAILABLE FOR WORK</div>
                    </div>
                    <div class="front-footer">
                        <div class="name-hero" id="nameDisplay">AHMAD FARIS</div>
                        <div class="title-role" id="titleDisplay">FOUNDER & CEO</div>
                        <div class="company-name" id="companyDisplay">Pixel Reka Sdn Bhd</div>
                        <div class="decorative-strip"></div>
                    </div>
                </div>

                <div class="face face-back">
                    <div class="back-header">
                        <span class="section-label">CONTACT</span>
                        <div class="accent-square"></div>
                    </div>
                    <div class="contact-grid">
                        <div class="contact-row">
                            <div class="contact-icon">📧</div>
                            <span class="contact-label">EMAIL</span>
                            <span class="contact-value" id="emailDisplay">faris@pixelreka.com.my</span>
                        </div>
                        <div class="contact-row">
                            <div class="contact-icon">📱</div>
                            <span class="contact-label">PHONE</span>
                            <span class="contact-value" id="phoneDisplay">+60123456789</span>
                        </div>
                        <div class="contact-row">
                            <div class="contact-icon">🌐</div>
                            <span class="contact-label">SITE</span>
                            <span class="contact-value" id="websiteDisplay">pixelreka.com.my</span>
                        </div>
                        <div class="contact-row">
                            <div class="contact-icon">📍</div>
                            <span class="contact-label">CITY</span>
                            <span class="contact-value" id="locationDisplay">KUALA LUMPUR, MALAYSIA</span>
                        </div>
                    </div>
                    <div class="back-footer">
                        <div class="footer-text">© 2026 — PRESS THE CARD</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions-grid">
            <button class="btn btn--primary" id="flipBtn">FLIP CARD</button>
            <button class="btn" id="downloadBtn">SAVE CONTACT</button>
            <button class="btn btn--ghost" id="whatsappBtn">WHATSAPP</button>
            <button class="btn btn--ghost" id="copyBtn">COPY LINK</button>
            <button class="btn btn--full" id="shareBtn">SHARE CARD</button>
        </div>

        <div class="qr-section">
            <div class="qr-header">
                <div class="qr-marker"></div>
                <span class="qr-title">SCAN TO CONNECT</span>
                <div class="qr-marker"></div>
            </div>
            <div id="qr-code"></div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#FF5C39",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeCard();
            generateQRCode();
            attachEventListeners();
        });

        function initializeCard() {
            // Extract initials
            const nameParts = CONFIG.name.split(' ');
            const initials = nameParts[0][0] + (nameParts[1] ? nameParts[1][0] : nameParts[0][1]);
            document.getElementById('monogramText').textContent = initials.toUpperCase();

            // Display name (first and second word only for front)
            const displayName = nameParts.slice(0, 2).join(' ').toUpperCase();
            document.getElementById('nameDisplay').textContent = displayName;
            document.getElementById('titleDisplay').textContent = CONFIG.title.toUpperCase();
            document.getElementById('companyDisplay').textContent = CONFIG.company;

            // Back card details
            document.getElementById('emailDisplay').textContent = CONFIG.email;
            document.getElementById('phoneDisplay').textContent = CONFIG.phone;
            document.getElementById('websiteDisplay').textContent = CONFIG.website.replace('https://', '').replace('http://', '');
            document.getElementById('locationDisplay').textContent = CONFIG.location.toUpperCase();

            // Apply custom color
            document.documentElement.style.setProperty('--card-front', CONFIG.color);
            document.documentElement.style.setProperty('--accent', CONFIG.color);
        }

        function generateQRCode() {
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';

            const vCardData = generateVCardData();
            
            new QRCode(qrContainer, {
                text: vCardData,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function generateVCardData() {
            const vCard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `NOTE:${CONFIG.bio}`,
                `ADR;TYPE=WORK:;;${CONFIG.location}`,
                'END:VCARD'
            ].join('\n');
            
            return vCard;
        }

        function attachEventListeners() {
            const cardWrapper = document.getElementById('cardWrapper');
            const cardInner = document.getElementById('cardInner');
            const flipBtn = document.getElementById('flipBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const whatsappBtn = document.getElementById('whatsappBtn');
            const copyBtn = document.getElementById('copyBtn');
            const shareBtn = document.getElementById('shareBtn');

            // Flip card on click
            cardWrapper.addEventListener('click', function() {
                cardInner.classList.toggle('flipped');
            });

            // Flip button
            flipBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                cardInner.classList.toggle('flipped');
            });

            // Download vCard
            downloadBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                downloadVCard();
            });

            // WhatsApp
            whatsappBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                openWhatsApp();
            });

            // Copy link
            copyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                copyToClipboard();
            });

            // Share
            shareBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                shareCard();
            });
        }

        function downloadVCard() {
            const vCardData = generateVCardData();
            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            
            showNotification('Contact saved to device');
        }

        function openWhatsApp() {
            const phoneNumber = CONFIG.phone.replace(/\D/g, '');
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
            
            showNotification('Opening WhatsApp...');
        }

        function copyToClipboard() {
            const currentUrl = window.location.href;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentUrl).then(function() {
                    showNotification('Link copied to clipboard');
                }).catch(function() {
                    fallbackCopy(currentUrl);
                });
            } else {
                fallbackCopy(currentUrl);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showNotification('Link copied to clipboard');
            } catch (err) {
                showNotification('Copy failed - please copy manually');
            }
            
            document.body.removeChild(textArea);
        }

        function shareCard() {
            const shareData = {
                title: `${CONFIG.name} - Digital Business Card`,
                text: `Connect with ${CONFIG.name}, ${CONFIG.title} at ${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .then(() => showNotification('Shared successfully'))
                    .catch((err) => {
                        if (err.name !== 'AbortError') {
                            copyToClipboard();
                        }
                    });
            } else {
                copyToClipboard();
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            
            setTimeout(function() {
                notification.classList.remove('show');
            }, 2500);
        }

        // Prevent default touch behavior on buttons for better mobile experience
        document.querySelectorAll('.btn').forEach(function(btn) {
            btn.addEventListener('touchstart', function(e) {
                e.stopPropagation();
            }, { passive: true });
        });

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                const cardInner = document.getElementById('cardInner');
                if (e.target === document.body) {
                    e.preventDefault();
                    cardInner.classList.toggle('flipped');
                }
            }
        });

        // Handle visibility change to pause/resume animations
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.body.style.setProperty('--ease-snap', 'none');
            } else {
                document.body.style.setProperty('--ease-snap', 'cubic-bezier(0.2, 0.9, 0.3, 1)');
            }
        });

        // Responsive QR code regeneration on orientation change
        window.addEventListener('orientationchange', function() {
            setTimeout(generateQRCode, 300);
        });

        // Add touch feedback for card wrapper
        const cardWrapper = document.getElementById('cardWrapper');
        cardWrapper.addEventListener('touchstart', function() {
            this.style.opacity = '0.95';
        }, { passive: true });

        cardWrapper.addEventListener('touchend', function() {
            this.style.opacity = '1';
        }, { passive: true });

        // Preload hover states
        const style = document.createElement('style');
        style.textContent = `
            .btn::after,
            .card-wrapper::after,
            .status-badge::after {
                content: '';
                position: absolute;
                opacity: 0;
                pointer-events: none;
            }
        `;
        document.head.appendChild(style);

        // Analytics stub (ready for integration)
        function trackEvent(eventName, eventData) {
            console.log('Event:', eventName, eventData);
            // Integration point for analytics (GA4, Mixpanel, etc.)
        }

        // Track card interactions
        document.getElementById('cardWrapper').addEventListener('click', function() {
            trackEvent('card_flip', { flipped: document.getElementById('cardInner').classList.contains('flipped') });
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            trackEvent('vcard_download', { name: CONFIG.name });
        });

        document.getElementById('whatsappBtn').addEventListener('click', function() {
            trackEvent('whatsapp_open', { phone: CONFIG.phone });
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            trackEvent('link_copy', { url: window.location.href });
        });

        document.getElementById('shareBtn').addEventListener('click', function() {
            trackEvent('card_share', { method: navigator.share ? 'native' : 'fallback' });
        });
    </script>
</body>
</html>
