<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Faris bin Razak - Digital Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg-page: #FFFBF0;
      --card-front: #FF5C39;
      --card-back: #0a0a0f;
      --ink: #0a0a0f;
      --ink-inverse: #FFFBF0;
      --paper: #FFFBF0;
      --accent: #FF5C39;
      --accent-shadow: #C73E1F;
      --tag-bg: #FFFBF0;
      --tag-ink: #0a0a0f;
      --border: 3px solid #0a0a0f;
      --shadow-hard: 8px 8px 0 #0a0a0f;
      --shadow-hard-sm: 4px 4px 0 #0a0a0f;
      --radius-card: 0px;
      --radius-badge: 20px;
      --ease-snap: cubic-bezier(0.7, 0, 0.2, 1);
      --dur-flip: 280ms;
      --dur-press: 120ms;
      --dur-hover: 160ms;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-page);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      line-height: 1.4;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
    }

    .card-wrapper {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1.586 / 1;
      perspective: 1000px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform var(--dur-flip) var(--ease-snap);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-hard);
      transition: transform var(--dur-hover) var(--ease-snap),
                  box-shadow var(--dur-hover) var(--ease-snap);
    }

    .card-wrapper:hover .card-face {
      transform: translate(-2px, -2px);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .card-wrapper:active .card-face {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 var(--ink);
      transition-duration: var(--dur-press);
    }

    .card-front {
      background: var(--card-front);
      padding: 24px;
    }

    .card-back {
      background: var(--card-back);
      padding: 24px;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Front face elements */
    .corner-block {
      position: absolute;
      top: 24px;
      left: 24px;
      width: 32px;
      height: 32px;
      background: var(--ink);
      border: none;
    }

    .tag-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--tag-bg);
      color: var(--tag-ink);
      border: 2px solid var(--ink);
      border-radius: var(--radius-badge);
      padding: 2px 10px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-name {
      position: absolute;
      bottom: 88px;
      left: 24px;
      max-width: 80%;
      font-weight: 800;
      font-size: clamp(40px, 9vw, 64px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      color: var(--ink);
      word-wrap: break-word;
    }

    .role-line {
      position: absolute;
      bottom: 60px;
      left: 24px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.0;
    }

    .signature-stamp {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 40px;
      height: 40px;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-4deg);
    }

    .stamp-initials {
      font-weight: 800;
      font-size: 16px;
      color: var(--paper);
      letter-spacing: 0.02em;
    }

    .flip-hint {
      position: absolute;
      bottom: 28px;
      right: 24px;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* Back face elements */
    .back-header {
      height: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .company-name {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: var(--ink-inverse);
    }

    .header-square {
      width: 32px;
      height: 32px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .divider {
      width: 100%;
      height: 3px;
      background: var(--ink-inverse);
      margin: 4px 0;
    }

    .contact-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .contact-row {
      display: grid;
      grid-template-columns: 80px 1fr 32px;
      align-items: center;
      min-height: 44px;
      gap: 12px;
      cursor: pointer;
      transition: opacity 200ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .contact-row:active {
      opacity: 0.6;
    }

    .contact-label {
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      line-height: 1.0;
    }

    .contact-value {
      font-weight: 400;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--ink-inverse);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-arrow {
      font-weight: 700;
      font-size: 18px;
      color: var(--ink-inverse);
      text-align: right;
    }

    .back-footer {
      margin-top: auto;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: left;
    }

    .qr-section {
      display: grid;
      grid-template-columns: 80px 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    #qrcode {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qrcode canvas,
    #qrcode img {
      max-width: 100%;
      height: auto;
    }

    .qr-text {
      font-weight: 400;
      font-size: 13px;
      color: var(--ink-inverse);
      line-height: 1.4;
    }

    /* Action buttons */
    .action-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 12px 20px;
      background: var(--paper);
      color: var(--ink);
      border: 3px solid var(--ink);
      border-radius: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: var(--shadow-hard-sm);
      transition: transform var(--dur-hover) var(--ease-snap),
                  box-shadow var(--dur-hover) var(--ease-snap);
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--ink);
      transition-duration: var(--dur-press);
    }

    .btn--primary {
      background: var(--accent);
      color: var(--ink);
    }

    .btn--dark {
      background: var(--ink);
      color: var(--ink-inverse);
      box-shadow: 4px 4px 0 var(--accent);
    }

    .btn--dark:hover {
      box-shadow: 6px 6px 0 var(--accent);
    }

    .btn--dark:active {
      box-shadow: 0 0 0 var(--accent);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--ink);
      color: var(--ink-inverse);
      padding: 12px 24px;
      border: 3px solid var(--accent);
      box-shadow: 4px 4px 0 var(--accent);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transition: transform 300ms var(--ease-snap),
                  opacity 300ms var(--ease-snap);
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .card-wrapper {
        max-width: 340px;
      }

      .hero-name {
        font-size: clamp(32px, 9vw, 48px);
      }

      .btn-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card-wrapper" id="cardWrapper">
      <div class="card-inner" id="cardInner">
        <!-- Front Face -->
        <div class="card-face card-front">
          <div class="corner-block"></div>
          <div class="tag-badge">AVAILABLE FOR HIRE</div>
          <div class="hero-name" id="heroName">AHMAD FARIS</div>
          <div class="role-line" id="roleText">FOUNDER & CEO</div>
          <div class="signature-stamp">
            <span class="stamp-initials" id="stampInitials">AF</span>
          </div>
          <div class="flip-hint">TAP →</div>
        </div>

        <!-- Back Face -->
        <div class="card-face card-back">
          <div class="back-header">
            <div class="company-name" id="companyName">PIXEL REKA</div>
            <div class="header-square"></div>
          </div>

          <div class="divider"></div>

          <div class="contact-section">
            <div class="contact-row" data-action="email" id="emailRow">
              <span class="contact-label">EMAIL</span>
              <span class="contact-value" id="emailValue">faris@pixelreka.com.my</span>
              <span class="contact-arrow">→</span>
            </div>

            <div class="contact-row" data-action="phone" id="phoneRow">
              <span class="contact-label">PHONE</span>
              <span class="contact-value" id="phoneValue">+60 12 345 6789</span>
              <span class="contact-arrow">→</span>
            </div>

            <div class="contact-row" data-action="website" id="websiteRow">
              <span class="contact-label">WEB</span>
              <span class="contact-value" id="websiteValue">pixelreka.com.my</span>
              <span class="contact-arrow">→</span>
            </div>

            <div class="contact-row" data-action="location" id="locationRow">
              <span class="contact-label">LOCATION</span>
              <span class="contact-value" id="locationValue">Kuala Lumpur</span>
              <span class="contact-arrow">→</span>
            </div>

            <div class="qr-section">
              <div id="qrcode"></div>
              <div class="qr-text">Scan to save contact or visit website</div>
            </div>
          </div>

          <div class="back-footer" id="footerText">© PIXEL REKA — KUALA LUMPUR</div>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn btn--primary" id="downloadVcard">
        ↓ DOWNLOAD CONTACT
      </button>
      <button class="btn btn--dark" id="whatsappBtn">
        WHATSAPP MESSAGE
      </button>
      <div class="btn-group">
        <button class="btn" id="copyLinkBtn">
          COPY LINK
        </button>
        <button class="btn" id="shareBtn">
          SHARE
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Configuration
    const CONFIG = {
      name: "Ahmad Faris bin Razak",
      title: "Founder & CEO",
      company: "Pixel Reka Sdn Bhd",
      phone: "+60123456789",
      email: "faris@pixelreka.com.my",
      website: "https://pixelreka.com.my",
      location: "Kuala Lumpur, Malaysia",
      bio: "Building digital solutions for Malaysian SMEs",
      color: "#FF5C39",
      whatsapp_message: "Hi Faris, I found your digital card!"
    };

    // DOM Elements
    const cardWrapper = document.getElementById('cardWrapper');
    const cardInner = document.getElementById('cardInner');
    const heroName = document.getElementById('heroName');
    const roleText = document.getElementById('roleText');
    const companyName = document.getElementById('companyName');
    const emailValue = document.getElementById('emailValue');
    const phoneValue = document.getElementById('phoneValue');
    const websiteValue = document.getElementById('websiteValue');
    const locationValue = document.getElementById('locationValue');
    const footerText = document.getElementById('footerText');
    const stampInitials = document.getElementById('stampInitials');
    const toast = document.getElementById('toast');

    // Populate card with data
    function populateCard() {
      // Extract first and last name for hero
      const nameParts = CONFIG.name.split(' ');
      const firstName = nameParts[0];
      const lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : '';
      heroName.textContent = `${firstName.toUpperCase()} ${lastName.toUpperCase()}`.trim();

      roleText.textContent = CONFIG.title.toUpperCase();
      
      // Extract company name (remove legal entity suffix)
      const companyShort = CONFIG.company.replace(/\s+(Sdn Bhd|Bhd|Pte Ltd|Ltd|LLC|Inc)\.?$/i, '');
      companyName.textContent = companyShort.toUpperCase();

      emailValue.textContent = CONFIG.email;
      phoneValue.textContent = CONFIG.phone.replace(/(\+60)(\d{2})(\d+)/, '$1 $2 $3');
      
      // Extract domain from website
      const websiteDomain = CONFIG.website.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
      websiteValue.textContent = websiteDomain;

      // Extract city from location
      const locationCity = CONFIG.location.split(',')[0].trim();
      locationValue.textContent = locationCity;

      // Footer with company and location
      footerText.textContent = `© ${companyShort.toUpperCase()} — ${locationCity.toUpperCase()}`;

      // Generate initials for stamp
      const initials = nameParts
        .filter((part, idx) => idx === 0 || idx === nameParts.length - 1)
        .map(part => part[0])
        .join('')
        .toUpperCase();
      stampInitials.textContent = initials;
    }

    // Card flip functionality
    let isFlipped = false;
    cardWrapper.addEventListener('click', function(e) {
      // Don't flip if clicking on contact rows
      if (e.target.closest('.contact-row')) {
        return;
      }
      isFlipped = !isFlipped;
      cardInner.classList.toggle('flipped', isFlipped);
    });

    // Contact row actions
    document.getElementById('emailRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.location.href = `mailto:${CONFIG.email}`;
    });

    document.getElementById('phoneRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.location.href = `tel:${CONFIG.phone}`;
    });

    document.getElementById('websiteRow').addEventListener('click', function(e) {
      e.stopPropagation();
      window.open(CONFIG.website, '_blank');
    });

    document.getElementById('locationRow').addEventListener('click', function(e) {
      e.stopPropagation();
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(CONFIG.location)}`;
      window.open(mapsUrl, '_blank');
    });

    // Generate QR Code
    function generateQRCode() {
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      
      try {
        new QRCode(qrContainer, {
          text: CONFIG.website,
          width: 80,
          height: 80,
          colorDark: "#FFFBF0",
          colorLight: "#0a0a0f",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (error) {
        console.error('QR code generation failed:', error);
        qrContainer.innerHTML = '<div style="width:80px;height:80px;background:#FF5C39;"></div>';
      }
    }

    // Generate vCard
    function generateVCard() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `FN:${CONFIG.name}`,
        `ORG:${CONFIG.company}`,
        `TITLE:${CONFIG.title}`,
        `TEL;TYPE=CELL:${CONFIG.phone}`,
        `EMAIL:${CONFIG.email}`,
        `URL:${CONFIG.website}`,
        `ADR:;;${CONFIG.location};;;;`,
        `NOTE:${CONFIG.bio}`,
        'END:VCARD'
      ].join('\n');

      return vcard;
    }

    // Download vCard
    document.getElementById('downloadVcard').addEventListener('click', function() {
      const vcard = generateVCard();
      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('CONTACT DOWNLOADED');
    });

    // WhatsApp
    document.getElementById('whatsappBtn').addEventListener('click', function() {
      const phoneClean = CONFIG.phone.replace(/[^\d]/g, '');
      const message = encodeURIComponent(CONFIG.whatsapp_message);
      const whatsappUrl = `https://wa.me/${phoneClean}?text=${message}`;
      window.open(whatsappUrl, '_blank');
    });

    // Copy Link
    document.getElementById('copyLinkBtn').addEventListener('click', function() {
      const currentUrl = window.location.href;
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(currentUrl)
          .then(() => {
            showToast('LINK COPIED');
          })
          .catch(() => {
            fallbackCopyText(currentUrl);
          });
      } else {
        fallbackCopyText(currentUrl);
      }
    });

    function fallbackCopyText(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast('LINK COPIED');
      } catch (err) {
        showToast('COPY FAILED');
      }
      document.body.removeChild(textarea);
    }

    // Share
    document.getElementById('shareBtn').addEventListener('click', function() {
      const shareData = {
        title: `${CONFIG.name} - ${CONFIG.title}`,
        text: `Connect with ${CONFIG.name} from ${CONFIG.company}`,
        url: window.location.href
      };

      if (navigator.share) {
        navigator.share(shareData)
          .then(() => {
            showToast('SHARED');
          })
          .catch((err) => {
            if (err.name !== 'AbortError') {
              console.error('Share failed:', err);
            }
          });
      } else {
        // Fallback: copy to clipboard
        fallbackCopyText(window.location.href);
      }
    });

    // Toast notification
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      populateCard();
      generateQRCode();
    });
  </script>
</body>
</html>
