<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Neo-Brutalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #FFFBF0;
            --card-front: #FF5C39;
            --card-back: #0a0a0f;
            --ink: #0a0a0f;
            --ink-inverse: #FFFBF0;
            --accent: #FF5C39;
            --accent-shadow: #C2421F;
            --muted: #6B6359;
            --border: #0a0a0f;
            --border-width: 3px;
            --offset-shadow: 8px;
            --radius-card: 4px;
            --radius-badge: 20px;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
            --space-7: 48px;
            --ease-snap: cubic-bezier(0.2, 0.9, 0.3, 1);
            --dur-fast: 120ms;
            --dur-base: 200ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }

        .card-wrapper {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1.6 / 1;
            perspective: 1000px;
            margin: 0 auto;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 280ms var(--ease-snap);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--offset-shadow) var(--offset-shadow) 0 0 var(--border);
            transition: transform var(--dur-fast) var(--ease-snap),
                        box-shadow var(--dur-fast) var(--ease-snap);
        }

        .card-wrapper:active .card-face {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 0 var(--border);
        }

        .card-front {
            background: var(--card-front);
            color: var(--ink);
            padding: var(--space-5);
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--card-back);
            color: var(--ink-inverse);
            padding: var(--space-5);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: var(--space-4);
        }

        .badge-available {
            position: absolute;
            top: var(--space-5);
            left: var(--space-5);
            padding: 2px 10px;
            background: var(--ink);
            color: var(--ink-inverse);
            border-radius: var(--radius-badge);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            animation: pulse-badge 1800ms ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .corner-mark {
            position: absolute;
            top: var(--space-5);
            right: var(--space-5);
            width: 24px;
            height: 24px;
            background: var(--ink);
            clip-path: polygon(100% 0, 100% 100%, 0 0);
        }

        .name-block {
            position: absolute;
            left: var(--space-5);
            bottom: var(--space-5);
            right: var(--space-5);
        }

        .name-text {
            font-size: 40px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--ink);
            margin-bottom: var(--space-2);
            word-wrap: break-word;
        }

        .name-rule {
            width: 32px;
            height: 3px;
            background: var(--ink);
            margin: var(--space-2) 0;
        }

        .title-company {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            min-height: 44px;
            padding: var(--space-2) 0;
            border-bottom: 1px solid rgba(255, 251, 240, 0.12);
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-snap);
            position: relative;
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row:hover {
            transform: translateX(2px);
        }

        .contact-icon {
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .contact-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .contact-value {
            font-size: 15px;
            font-weight: 400;
            color: var(--ink-inverse);
            font-variant-numeric: tabular-nums;
        }

        .contact-arrow {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink-inverse);
            opacity: 0.6;
            transition: transform 160ms var(--ease-snap);
        }

        .contact-row:hover .contact-arrow {
            transform: translateX(4px);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            min-height: 44px;
            padding: var(--space-3) var(--space-4);
            border: var(--border-width) solid var(--ink);
            border-radius: var(--radius-card);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-snap),
                        box-shadow var(--dur-fast) var(--ease-snap);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--ink);
            box-shadow: 6px 6px 0 0 var(--ink);
        }

        .btn-primary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 0 var(--ink);
        }

        .btn-primary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 0 var(--ink);
        }

        .btn-secondary {
            background: transparent;
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--ink);
            color: var(--ink-inverse);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .btn-full {
            grid-column: 1 / -1;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-5);
            background: white;
            border: var(--border-width) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--offset-shadow) var(--offset-shadow) 0 0 var(--border);
        }

        .qr-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
        }

        #qrcode {
            padding: var(--space-3);
            background: white;
            border: var(--border-width) solid var(--ink);
            border-radius: var(--radius-card);
        }

        #qrcode canvas,
        #qrcode img {
            display: block;
            margin: 0 auto;
        }

        .bio-section {
            padding: var(--space-5);
            background: white;
            border: var(--border-width) solid var(--ink);
            border-radius: var(--radius-card);
            box-shadow: var(--offset-shadow) var(--offset-shadow) 0 0 var(--border);
        }

        .bio-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: var(--space-2);
        }

        .bio-text {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
            color: var(--ink);
        }

        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) var(--space-3);
            background: var(--ink);
            color: var(--ink-inverse);
            border-radius: var(--radius-badge);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: var(--space-3);
        }

        .toast {
            position: fixed;
            bottom: var(--space-5);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: var(--space-3) var(--space-5);
            background: var(--ink);
            color: var(--ink-inverse);
            border: var(--border-width) solid var(--ink);
            border-radius: var(--radius-card);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: 6px 6px 0 0 var(--border);
            opacity: 0;
            transition: transform 280ms var(--ease-snap),
                        opacity 280ms var(--ease-snap);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (min-width: 640px) {
            .name-text {
                font-size: 56px;
            }

            .title-company {
                font-size: 14px;
            }

            .contact-value {
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .card-wrapper {
                max-width: 340px;
            }

            .name-text {
                font-size: 32px;
            }

            .actions-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                font-size: 12px;
                padding: var(--space-3);
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <div class="card-face card-front">
                    <div class="badge-available">AVAILABLE</div>
                    <div class="corner-mark" aria-hidden="true"></div>
                    <div class="name-block">
                        <h1 class="name-text" id="cardName"></h1>
                        <div class="name-rule" aria-hidden="true"></div>
                        <p class="title-company">
                            <span id="cardTitle"></span> · <span id="cardCompany"></span>
                        </p>
                    </div>
                </div>

                <div class="card-face card-back">
                    <div class="contact-row" id="emailRow">
                        <div class="contact-icon" aria-hidden="true"></div>
                        <div class="contact-content">
                            <div class="contact-label">EMAIL</div>
                            <div class="contact-value" id="cardEmail"></div>
                        </div>
                        <div class="contact-arrow" aria-hidden="true">→</div>
                    </div>

                    <div class="contact-row" id="phoneRow">
                        <div class="contact-icon" aria-hidden="true"></div>
                        <div class="contact-content">
                            <div class="contact-label">PHONE</div>
                            <div class="contact-value" id="cardPhone"></div>
                        </div>
                        <div class="contact-arrow" aria-hidden="true">→</div>
                    </div>

                    <div class="contact-row" id="websiteRow">
                        <div class="contact-icon" aria-hidden="true"></div>
                        <div class="contact-content">
                            <div class="contact-label">WEBSITE</div>
                            <div class="contact-value" id="cardWebsite"></div>
                        </div>
                        <div class="contact-arrow" aria-hidden="true">→</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bio-section">
            <div class="bio-label">BIO</div>
            <p class="bio-text" id="cardBio"></p>
            <div class="location-badge">
                <span aria-hidden="true">📍</span>
                <span id="cardLocation"></span>
            </div>
        </div>

        <div class="actions-grid">
            <button class="btn btn-primary" id="saveContactBtn">
                <span aria-hidden="true">↓</span>
                <span>Save Contact</span>
            </button>
            <button class="btn btn-secondary" id="flipCardBtn">
                <span aria-hidden="true">⟲</span>
                <span>Flip Card</span>
            </button>
            <button class="btn btn-secondary" id="whatsappBtn">
                <span aria-hidden="true">💬</span>
                <span>WhatsApp</span>
            </button>
            <button class="btn btn-secondary" id="copyLinkBtn">
                <span aria-hidden="true">⎘</span>
                <span>Copy Link</span>
            </button>
            <button class="btn btn-secondary btn-full" id="shareBtn">
                <span aria-hidden="true">⤴</span>
                <span>Share Card</span>
            </button>
        </div>

        <div class="qr-section">
            <h2 class="qr-title">Scan to Save</h2>
            <div id="qrcode"></div>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#FF5C39",
            whatsapp_message: "Hi Faris, I found your digital card!"
        };

        let isFlipped = false;

        function initializeCard() {
            document.getElementById('cardName').textContent = CONFIG.name;
            document.getElementById('cardTitle').textContent = CONFIG.title;
            document.getElementById('cardCompany').textContent = CONFIG.company;
            document.getElementById('cardEmail').textContent = CONFIG.email;
            document.getElementById('cardPhone').textContent = CONFIG.phone;
            document.getElementById('cardWebsite').textContent = CONFIG.website.replace('https://', '').replace('http://', '');
            document.getElementById('cardBio').textContent = CONFIG.bio;
            document.getElementById('cardLocation').textContent = CONFIG.location;

            if (CONFIG.color) {
                document.documentElement.style.setProperty('--card-front', CONFIG.color);
                document.documentElement.style.setProperty('--accent', CONFIG.color);
            }
        }

        function flipCard() {
            const cardInner = document.getElementById('cardInner');
            isFlipped = !isFlipped;
            cardInner.classList.toggle('flipped');
        }

        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');

            return vcard;
        }

        function downloadVCard() {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved to downloads');
        }

        function openWhatsApp() {
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phoneNumber = CONFIG.phone.replace(/\D/g, '');
            const url = `https://wa.me/${phoneNumber}?text=${message}`;
            window.open(url, '_blank');
        }

        function copyLink() {
            const currentUrl = window.location.href;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast('Link copied to clipboard');
                }).catch(() => {
                    fallbackCopyLink(currentUrl);
                });
            } else {
                fallbackCopyLink(currentUrl);
            }
        }

        function fallbackCopyLink(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('Link copied to clipboard');
            } catch (err) {
                showToast('Failed to copy link');
            }
            document.body.removeChild(textArea);
        }

        function shareCard() {
            const shareData = {
                title: `${CONFIG.name} - ${CONFIG.title}`,
                text: `${CONFIG.bio}\n\n${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(() => {
                    copyLink();
                });
            } else {
                copyLink();
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        function generateQRCode() {
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';
            
            const vcard = generateVCard();
            
            new QRCode(qrcodeContainer, {
                text: vcard,
                width: 180,
                height: 180,
                colorDark: '#0a0a0f',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function handleContactRowClick(type) {
            switch(type) {
                case 'email':
                    window.location.href = `mailto:${CONFIG.email}`;
                    break;
                case 'phone':
                    window.location.href = `tel:${CONFIG.phone}`;
                    break;
                case 'website':
                    window.open(CONFIG.website, '_blank');
                    break;
            }
        }

        document.getElementById('cardWrapper').addEventListener('click', flipCard);
        document.getElementById('flipCardBtn').addEventListener('click', (e) => {
            e.preventDefault();
            flipCard();
        });
        document.getElementById('saveContactBtn').addEventListener('click', downloadVCard);
        document.getElementById('whatsappBtn').addEventListener('click', openWhatsApp);
        document.getElementById('copyLinkBtn').addEventListener('click', copyLink);
        document.getElementById('shareBtn').addEventListener('click', shareCard);

        document.getElementById('emailRow').addEventListener('click', () => handleContactRowClick('email'));
        document.getElementById('phoneRow').addEventListener('click', () => handleContactRowClick('phone'));
        document.getElementById('websiteRow').addEventListener('click', () => handleContactRowClick('website'));

        document.addEventListener('DOMContentLoaded', () => {
            initializeCard();
            generateQRCode();
        });
    </script>
</body>
</html>
